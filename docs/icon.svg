<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Shield shape -->
  <path d="M 256 64 L 128 96 L 128 256 C 128 352 192 416 256 448 C 320 416 384 352 384 256 L 384 96 Z" 
        fill="#2d3142" stroke="#fca311" stroke-width="8"/>
  
  <!-- Aquila symbol (simplified Imperial Eagle) -->
  <g transform="translate(256, 256) scale(0.8)">
    <!-- Center body -->
    <ellipse cx="0" cy="0" rx="20" ry="30" fill="#fca311"/>
    <!-- Wings -->
    <path d="M -20 -10 Q -60 -20 -80 0 Q -60 20 -20 10 Z" fill="#fca311"/>
    <path d="M 20 -10 Q 60 -20 80 0 Q 60 20 20 10 Z" fill="#fca311"/>
    <!-- Head -->
    <circle cx="0" cy="-35" r="12" fill="#fca311"/>
    <!-- Skull emblem -->
    <g transform="translate(0, 35) scale(0.6)">
      <ellipse cx="0" cy="0" rx="15" ry="18" fill="#e5e5e5"/>
      <circle cx="-6" cy="-5" r="3" fill="#0f0f1e"/>
      <circle cx="6" cy="-5" r="3" fill="#0f0f1e"/>
      <path d="M -5 8 L -2 5 L 0 8 L 2 5 L 5 8" stroke="#0f0f1e" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fca311">
    KILL TEAM
  </text>
</svg>
