      w: 7
    weapons:
    - name: Pistol
      type: Ranged
      a: 4
      bs_ws: 4+
      d: 2/3
      rules:
      - Rng 8"
    - name: Crude melee weapon
      type: Melee
      a: 4
      bs_ws: 4+
      d: 2/3
      rules: []
    rules:
    - name: Group Activation
      description: Whenever this operative is expended, you must then activate one
        other ready friendly CHAOS CULT DEVOTEE operative (if able) before your opponent
        activates. When that other operative is expended, your opponent then activates
        as normal (in other words, you cannot activate more than two operatives in
        succession with this rule).
      cost: 0AP
