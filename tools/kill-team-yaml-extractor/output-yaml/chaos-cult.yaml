    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Diabolical stave (ranged)
      type: Ranged
      a: 4
      bs_ws: 4+
      d: 3/6
      rules:
      - Rng 2"
      - Stun
    - name: Pistol
      type: Ranged
      a: 4
      bs_ws: 4+
      d: 2/3
      rules:
      - Rng 8"
    - name: Diabolical stave (melee)
      type: Melee
      a: 4
      bs_ws: 4+
      d: 3/6
      rules:
      - Shock
      - Stun
    rules: []
  - name: Blessed Blade
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Commune blade
      type: Melee
      a: 4
      bs_ws: 4+
      d: 4/6
      rules:
      - Lethal 5+
    rules:
    - name: Cut Them Down
      description: Whenever an enemy operative performs the Fall Back action while
        within control range of this operative, you can use this rule. If you do,
        inflict D3+1 damage on that enemy operative before it moves. If that enemy
        operative is within control range of two of these operatives, inflict 2D3+2
        damage instead.
      cost: 0AP
    - name: Attuned In Purpose
      description: Whenever this operative is activated, you can activate another
        ready friendly BLESSED BLADE operative within 6" of it at the same time. Complete
        their activations action by action in any order.
      cost: 0AP
  - name: Chaos Devotee
    stats:
      apl: 2
      mv: 6"
