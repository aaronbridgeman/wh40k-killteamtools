team:
  name: Chaos Cult
  version: v1.5
  last_updated: 23 July 2025
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: Exaltation In Pain
    cost: 1CP
    description: You can ignore any changes to the Hit stat of friendly CHAOS CULT
      operatives' weapons from being injured. Whenever an operative is shooting a
      friendly CHAOS CULT operative that's wounded, you can re-roll one of your defence
      dice.
  - name: Fervent Onslaught
    cost: 1CP
    description: Friendly CHAOS CULT operatives' melee weapons have the Accurate 1
      weapon rule, or the Accurate 2 weapon rule if that friendly operative is a MUTANT
      or TORMENT operative.
  - name: Creatures Of Nightmare
    cost: 1CP
    description: Whenever determining control of a marker, treat the total APL stat
      of enemy operatives that contest it as 1 lower if at least one of those enemy
      operatives is within 2" of friendly CHAOS CULT MUTANT or CHAOS CULT TORMENT
      operatives. Note this isn't a change to the APL stat, so any changes are cumulative
      with this.
  - name: Sickening Aura
    cost: 1CP
    description: Whenever an enemy operative is within 2" of friendly CHAOS CULT MUTANT
      or CHAOS CULT TORMENT operatives, worsen the Hit stat of that enemy operative's
      weapons by 1. This isn't cumulative with being injured.
  firefight_ploys:
  - name: Faithful Follower
    cost: 1CP
    description: Use this firefight ploy when a friendly CHAOS CULT DARK COMMUNE operative
      is selected as the valid target of a Shoot action or to fight against during
      the Fight action. Select one other friendly CHAOS CULT operative (excluding
      DARK COMMUNE ) visible to and within 3" of that DARK COMMUNE operative to become
      the valid target or to be fought against (as appropriate) instead (even if it
      wouldn't normally be valid for this). If it's the Fight action, treat that other
      operative as being within the fighting operative's control range for the duration
      of that action. If it's the Shoot action, that other operative is only in cover
      or obscured if the original target was. This ploy has no effect if it's the
      Shoot action and the ranged weapon has the Blast or Torrent weapon rule.
  - name: Abhorrent Mutation
    cost: 1CP
    description: Use this firefight ploy when a friendly CHAOS CULT operative (excluding
      DARK COMMUNE ) is activated. Select an ACCURSED GIFT for that operative to gain.
      This is in addition to any ACCURSED GIFTS it already has. Each friendly operative
      cannot be selected for this ploy more than once per battle, and if that operative
      turns into a different one (see Mutation faction rule), it still has that
  - name: Frenzied Demise
    cost: 1CP
    description: Use this firefight ploy when a friendly CHAOS CULT MUTANT or CHAOS
      CULT TORMENT operative is incapacitated, before it's removed from the killzone.
      Inflict D3 damage (or D6 damage instead if that friendly operative is a TORMENT
      ) on one enemy operative visible to and within 2" of that friendly operative.
  - name: Unleash The Daemon
    cost: 1CP
    description: Use this firefight ploy during a friendly CHAOS CULT MUTANT or CHAOS
      CULT TORMENT operative's activation, before or after it performs an action.
      During that activation, that operative can perform two Fight actions, and one
      of them can be free.
