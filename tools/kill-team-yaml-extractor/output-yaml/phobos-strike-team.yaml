    - name: '* Detonate'
      description: Don't select a valid target. Instead, shoot against each operative
        within 2" of your Explosives marker, unless Heavy terrain is wholly intervening
        between that operative and that marker. Each of those operatives cannot be
        in cover or obscured. Roll each sequence separately in an order of your choice.
        This weapon cannot be selected if your Explosives marker isn't in the killzone.
        At the end of the action, remove your Explosives marker from the killzone.
        In a killzone
      cost: 0AP
    - name: that uses the close quarters rules (e.g. Killzone
      description: Tomb World), this weapon has the Lethal 5+ weapon rule.
      cost: 0AP
    - name: Plant Explosives
      description: This operative carries your Explosives marker. It can perform the
        Pick Up Marker action on that marker, and whenever it performs the Place Marker
        action on that marker, it can immediately perform a free Dash action.
      cost: 0AP
