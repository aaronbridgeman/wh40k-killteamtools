    - name: Fists
      type: Melee
      a: 4
      bs_ws: 3+
      d: 3/4
      rules: []
    rules:
    - name: Tactical Advantage
      description: "You can do each of the following once per battle: \u25CF When\
        \ rolling-off to decide initiative, if this operative is in the killzone,\
        \ you can re-roll your dice. \u25CF You can use a firefight ploy for 0CP if\
        \ this is the specified PHOBOS STRIKE TEAM operative (including Command Re-roll\
        \ if the attack or defence dice was rolled for this operative), or the Patient\
        \ Ambush firefight ploy for 0CP if this operative is ready and not within\
        \ control range of enemy operatives."
      cost: 0AP
