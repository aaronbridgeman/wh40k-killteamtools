team:
  name: Phobos Strike Team
  version: v1.2
  last_updated: 19 November 2025
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Guerrilla Warfare
    cost: 1CP
    description: 'Friendly PHOBOS STRIKE TEAM operatives can perform the following
      unique action:'
  - name: Guerrilla Warfare 1Ap
    cost: 1CP
    description: "\U0001F7E2 Change this operative's order. \U0001F534 An operative\
      \ cannot perform this action while within control range of an enemy operative."
  - name: And They Shall Know No Fear
    cost: 1CP
    description: You can ignore any changes to the stats of friendly PHOBOS STRIKE
      TEAM operatives from being injured (including their weapons' stats).
  - name: Deadly Shots
    cost: 1CP
    description: Whenever a friendly PHOBOS STRIKE TEAM operative is shooting during
      an activation in which it hasn't performed the Charge , Fall Back or Reposition
      action, or against an operative that isn't in cover and is more than 6" from
      it, that friendly operative's ranged weapons have the Balanced weapon rule.
      Note that for the first requirement, that operative isn't restricted from performing
      those actions after shooting.
  - name: Lethal Assaults
    cost: 1CP
    description: Whenever a friendly PHOBOS STRIKE TEAM operative is fighting, its
      melee weapons have the Balanced weapon rule. If that friendly operative is doing
      so during an activation in which it performed the Charge action, its melee weapons
      also have the Lethal 5+ weapon rule.
  firefight_ploys:
  - name: Patient Ambush
    cost: 1CP
    description: Use this firefight ploy when it's your turn to activate a friendly
      operative. You can skip that activation.
  - name: Critical Shot
    cost: 1CP
    description: Use this firefight ploy when you resolve a critical success for a
      friendly PHOBOS STRIKE TEAM operative that's shooting with a bolt weapon. Inflict
      D3 additional damage.
  - name: Transhuman Physiology
    cost: 1CP
    description: Use this firefight ploy when an operative is shooting a friendly
      PHOBOS STRIKE TEAM operative, in the Roll Defence Dice step. You can retain
      one of your normal successes as a critical success instead.
  - name: Stealth Assault
    cost: 1CP
    description: Use this firefight ploy when a friendly PHOBOS STRIKE TEAM operative
      that has a Conceal order is activated, is given an Engage order, performs the
      Charge and then the Fight action, and you're resolving your first attack dice
      from this activation. After doing so, you can immediately resolve another of
      your attack dice (before your opponent). The operative cannot have performed
      any other actions during this activation (but can do so after resolving this
      ploy).
  operatives:
  - name: Infiltrator Sergeant
    stats:
      apl: 3
      mv: 7"
      sv: 3+
      w: 13
    weapons:
    - name: Marksman bolt carbine
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
