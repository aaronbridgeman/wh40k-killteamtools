    - name: Strategic Oversight
      description: In the Ready step of each Strategy phase, when you gain CP, if
        this operative is in the killzone and not within control range of enemy
      cost: 0AP
    - name: operatives, you can use this rule. If you do, roll one D6
      description: on a 4+, you gain one additional CP.
      cost: 0AP
    - name: Comms Array
      description: Once per turning point, during a friendly PHOBOS STRIKE TEAM operative's
        activation or counteraction, before or after it performs an action, if this
        operative is in the killzone, you can change one strategy ploy you've used
        this turning point (it doesn't cost you any CP to do so).
      cost: 0AP
  - name: Infiltrator Helix Adept
    stats:
      apl: 3
      mv: 7"
      sv: 3+
      w: 12
    weapons:
    - name: Marksman bolt carbine
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Lethal 5+
    - name: Fists
      type: Melee
      a: 4
      bs_ws: 3+
      d: 3/4
      rules: []
    rules:
    - name: Medic!
      description: The first time during each turning point that another friendly
        PHOBOS STRIKE TEAM operative would be incapacitated while visible to and within
        3" of this operative, you can use this rule, providing neither this nor that
        operative is within control range of an enemy operative. If you do, that friendly
        operative isn't incapacitated, has D3 wounds remaining and cannot be incapacitated
        for the remainder of the action. After that action, that friendly operative
        can immediately perform a free Dash action, but must end that move within
        this operative's control range. Subtract 1 from this and that operative's
        APL stats until the end of their next activations respectively, and if this
        rule was used during that friendly operative's activation, that activation
        ends. You cannot use this rule if this operative is incapacitated, or if it's
        a Shoot action and this operative would be a primary or secondary target.
      cost: 1AP
    - name: Helix Gauntlet
      description: "\U0001F7E2 Select one friendly PHOBOS STRIKE TEAM operative within\
        \ this operative's control range to regain up to D3+3 lost wounds. It cannot\
        \ be an operative that the Medic! rule was used on during this turning point.\
        \ \U0001F534 This operative cannot perform this action while within control\
        \ range of an enemy operative."
      cost: 0AP
