        step of each Strategy phase, when you gain CP, if your Homing Beacon marker
        is in the killzone, roll one D6 if it's more than 6" from your drop zone;
        roll two D6 instead if it's within your opponent's territory; roll three D6
        instead if it's within 6" of your opponent's drop zone. If any result is a
        4+, you gain one additional CP.
