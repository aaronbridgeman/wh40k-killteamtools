    rules:
    - name: XV26 Drone Controller
      description: STRATEGIC GAMBIT whenever this operative is in the kilizone. Select
        one friendly XV26 STEALTH BATTLESUIT DRONE operative in the killzone. Until
        the end of that operative's next activation, ignore the first two bullet points
        of its Drone rule (this takes precedence over that rule).
      cost: 0AP
    - name: For the Greater Good
      description: Whenever determining the value of Accurate X for the Kauyon faction
        rule, if this operative is in the killzone, add 1 to the result if 2 or more
        friendly XV26 STEALTH BATTLESUIT operatives (excluding DRONE ) are incapacitated
        (to a maximum of Accurate 3). Note that you must have a minimum of Accurate
        1 to use this rule. Kill Team Reference Sheet by James And The Giant Squig
        - v1.1 (updated 29 Apr 2026) XV26 STEALTH BATTLESUITS
