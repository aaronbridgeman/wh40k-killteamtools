team:
  name: Xv26 Stealth Battlesuits
  version: v1.1
  last_updated: 29 Apr 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Patient Hunters
    cost: 1CP
    description: Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting
      against or fighting against an expended enemy operative, that friendly operative's
      weapons have the Balanced weapon rule and its ranged weapons have the Saturate
      weapon rule.
  - name: Bonds Of Unity
    cost: 1CP
    description: "Whenever a friendly XV26 STEALTH BATTLESUIT operative is activated\
      \ (excluding DRONE ), if it's visible to and within 6\" of another friendly\
      \ XV26 STEALTH BATTLESUIT operative (excluding DRONE ), you can ignore any changes\
      \ to that first friendly operative's APL stat and select one of the following:\
      \ \u25CF Ignore any changes to that first friendly operative's Move stat from\
      \ being injured until the end of that activation. \u25CF Ignore any changes\
      \ to the Hit stat of that first friendly operative's weapons from being injured\
      \ until the end of that activation."
  - name: Prepare Ambush
    cost: 1CP
    description: Place one of your Ambush markers wholly within your territory and
      more than 2" from enemy operatives. Whenever a friendly XV26 STEALTH BATTLESUIT
      operative is shooting an enemy operative that's within 2" of that marker, you
      can use this rule. If you do, remove that marker and that friendly operative's
      ranged weapons have the Seek weapon rule until the end of the action. In the
      Ready step of the next Strategy phase, if that marker is still in the killzone,
      remove that marker.
  - name: Holowave Countermeasures
    cost: 1CP
    description: Whenever an operative is shooting a friendly XV26 STEALTH BATTLESUIT
      operative more than 6" from it, in the Roll Attack Dice step, the attacker must
      discard one of their unresolved normal successes (or one of their critical successes
      if there are none). This isn't cumulative with being obscured.
  firefight_ploys:
  - name: Vectored Retro-Thrusters
    cost: 1CP
    description: Use this firefight ploy when an enemy operative ends the Charge action
      within control range of a friendly XV26 STEALTH BATTLESUIT operative (excluding
      DRONE ). Interrupt that action to use this rule. If you do, that friendly operative
      can immediately perform a free Fall Back action, but it cannot move more than
      3" during that action. Then, that enemy operative can immediately perform a
      free Reposition action using any remaining move distance it had from that first
      Charge action, and can do so even if it's performed an action that prevents
      it from performing the Reposition action.
  - name: Ghostshroud
    cost: 1CP
    description: Use this firefight ploy at the end of a friendly XV26 STEALTH BATTLESUIT
      operative's activation. If that operative has an Engage order, change it to
      Conceal. You cannot use this ploy for each friendly operative more than once
      per battle.
  - name: Engage Jet Pack
    cost: 1CP
    description: Use this firefight ploy when a friendly XV26 STEALTH BATTLESUIT operative
      (excluding DRONE ) is activated or counteracts. Until the end of that activation/counteraction,
      you can ignore the vertical distance they move during one climb and one drop.
  - name: Saviour Protocols
    cost: 1CP
    description: Use this firefight ploy when a friendly XV26 STEALTH BATTLESUIT operative
      (excluding DRONE ) is selected as the valid target of a Shoot action. Select
      one friendly XV26 STEALTH BATTLESUIT DRONE operative visible to and within 3"
      of that first friendly operative to become the valid target instead (even if
      it wouldn't normally be valid for this). That friendly DRONE operative is only
      in cover or obscured if the original target was. This ploy has no effect if
      the ranged weapon has the Blast or Torrent weapon rule.
