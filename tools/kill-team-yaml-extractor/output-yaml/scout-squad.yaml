team:
  name: Scout Squad
  version: v1.8
  last_updated: 29 Apr 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Adaptable Training
    cost: 1CP
    description: You can change the order of up to D3 friendly SCOUT SQUAD operatives
      that are more than 4" from enemy operatives.
  - name: Ambush
    cost: 1CP
    description: "Whenever a friendly SCOUT SQUAD operative is shooting or fighting\
      \ during its activation, if its order was changed from Conceal to Engage at\
      \ the start of that activation, or it wasn't visible to enemy operatives at\
      \ the start of that activation: \u25CF Its weapons have the Balanced weapon\
      \ rule. \u25CF If the target is expended, its weapons have the Ceaseless weapon\
      \ rule instead."
  - name: Guerilla Engagement
    cost: 1CP
    description: Whenever an enemy operative is shooting a friendly SCOUT SQUAD operative,
      if that friendly operative is in cover and more than 6" from enemy operatives
      it's visible to, you can re-roll one of your defence dice.
  - name: Stealth Relocation
    cost: 1CP
    description: Up to D3 friendly SCOUT SQUAD operatives that have a Conceal order
      and are more than 4" from enemy operatives can immediately perform a free Dash
      action.
  firefight_ploys:
  - name: Astartes Training
    cost: 1CP
    description: "Use this firefight ploy during a friendly SCOUT SQUAD operative's\
      \ activation. Until the end of that activation, that operative can do one of\
      \ the following: \u25CF Perform two Fight actions. \u25CF Perform two Shoot\
      \ actions if an Astartes shotgun, bolt pistol or boltgun is selected for at\
      \ least one of them. \u25CF Perform two Shoot actions with a heavy bolter, missile\
      \ launcher or sniper rifle, but 1 additional AP must be spent for the second\
      \ action."
  - name: Covert Position
    cost: 1CP
    description: Use this firefight ploy during a friendly SCOUT SQUAD operative's
      activation. Until the start of its next activation, while that operative has
      a Conceal order and is in cover, it cannot be selected as a valid target, taking
      precedence over all other rules (e.g. Seek, Vantage terrain) except being within
      2".
  - name: Emboldened Aspirant
    cost: 1CP
    description: Use this firefight ploy when a friendly SCOUT SQUAD operative performs
      the Shoot or Fight action, after any re-rolls. If it's the first friendly operative
      to perform either of those actions during this turning point, or if the enemy
      operative in that action (primary target, if relevant) has a higher Wounds stat
      than that friendly SCOUT SQUAD operative, you can retain one of your normal
      successes as a critical success instead.
  - name: Raw Physiology
    cost: 1CP
    description: Use this firefight ploy during a friendly SCOUT SQUAD operative's
      activation, before or after it performs an action. Until the start of its next
      activation, add 1" to its Move stat and you can ignore any changes to that operative's
      stats from being injured (including its weapon's stats).
