      bs_ws: 3+
      d: 5/6
      rules: []
    - name: Power klaw
      type: Melee
      a: 4
      bs_ws: 3+
      d: 5/7
      rules:
      - Brutal
      - Shock
    rules:
    - name: Krumpin' Time
      description: "This operative can perform two Fight actions during its activation.\
        \ GET IT DUN! 1AP \U0001F7E2 SUPPORT. Select one other friendly KOMMANDO operative\
        \ (excluding BOMB SQUIG ) visible to and within 6\" of this operative. Until\
        \ the end of that operative's next activation add 1 to its APL stat. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative, or while counteracting."
      cost: 0AP
  - name: Bomb Squig
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 5
    weapons:
    - name: Explosives
      type: Melee
      a: 6
      bs_ws: 4+
      d: 4/5
      rules:
      - Blast 1"
      - Limited 1
      - Explosive *
    - name: Bite
      type: Melee
      a: 3
      bs_ws: 4+
      d: 4/5
      rules: []
    rules:
    - name: '* Explosive'
      description: This operative can perform the Shoot action with this weapon while
        within control range of an enemy operative. Don't select a valid target, instead
        this operative is always the primary target and cannot be in cover or obscured.
      cost: 0AP
    - name: Boom!
      description: Whenever this operative is incapacitated during a battle in which
        it hasn't used its explosives, roll one D6, or 2D6 if you wish. If any result
        is a 4+, this operative performs a free Shoot action with its explosives before
        it's removed from the killzone.
      cost: 0AP
    - name: Stoopid
      description: In the Firefight Phase, whenever you determine this operative's
        order, you cannot select Conceal. This operative cannot perform any actions
        other than Charge , Dash , Fight , Reposition and Shoot , or use any weapons
        that aren't on its data card.
      cost: 0AP
    - name: Expendable
      description: "This operative is ignored for your opponent's kill/ elimination\
        \ op (when it's incapacitated, and when determining your starting number of\
        \ operatives). It's also ignored for victory conditions and scoring VPs if\
        \ either require operatives to \u2018escape', \u2018survive' or be incapacitated\
        \ by enemy operatives (if it escapes/survives/is incapacitated, determining\
        \ how many operatives must escape/survive/be incapacitated, etc.)."
      cost: 0AP
