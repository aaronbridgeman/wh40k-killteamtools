    - name: Grappling Hook
      description: "\U0001F7E2 Selected a visible point on a terrain feature for this\
        \ operative. Remove this operative from the killzone and set it back up within\
        \ 1\" horizontally of that point in a location it can be placed, not within\
        \ control range of enemy operatives, and with that point visible to it. The\
        \ operative cannot perform the Operate Hatch action during this action. \U0001F534\
        \ This action is treated as a Reposition action. This operative cannot perform\
        \ this action while within control range of an enemy operative, or during\
        \ an activation in which it performed the Charge or Fall Back action (or vice\
        \ versa)."
      cost: 0AP
