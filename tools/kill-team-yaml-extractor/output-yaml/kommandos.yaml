team:
  name: Kommando
  version: v1.3
  last_updated: 29 Apr 2026
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: Sssshhhh!
    cost: 1CP
    description: Each friendly KOMMANDO operative that's not a valid target for enemy
      operatives, or has a Conceal order and is more than 6" from enemy operatives,
      can immediately perform a free Dash action. You cannot use this ploy during
      the first turning point.
  - name: Dakka! Dakka! Dakka!
    cost: 1CP
    description: Friendly KOMMANDO operatives' ranged weapons have the Punishing weapon
      Rule.
  - name: Waaagh!
    cost: 1CP
    description: Friendly KOMMANDO operatives' melee weapons have the Balanced weapon
      rule.
  - name: Skulk About
    cost: 1CP
    description: Whenever an enemy operative is shooting a friendly KOMMANDO operative
      that has a Conceal order, you can retain one of your defence dice as a normal
      success without rolling it (in addition to a cover save, if any).
  firefight_ploys:
  - name: Just A Scratch
    cost: 1CP
    description: Use this firefight ploy when an attack dice inflicts Normal Damage
      on a friendly KOMMANDO operative (excluding BOMB SQUIG and GROT ). Ignore that
      inflicted damage.
  - name: "Krump \u2018Em!"
    cost: 1CP
    description: Use this firefight ploy at the end of the Firefight phase. Select
      one friendly KOMMANDO operative. It can immediately perform a free Fight action.
  - name: Kunnin' But Brutal
    cost: 1CP
    description: Use this firefight ploy when a friendly KOMMANDO operative that has
      a Conceal order is fighting during an activation in which it's performed the
      Charge action, you're resolving the first attack dice and it's a strike with
      a normal success. Treat that normal success as a critical success instead.
  - name: Shake It Off
    cost: 1CP
    description: Use this firefight ploy when a friendly KOMMANDO operative is activated,
      or when its APL stat is changed. Until the start of the next turning point,
      you can ignore any changes to its APL stat.
  operatives:
