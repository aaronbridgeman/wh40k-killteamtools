team:
  name: Farstalker Kinband
  version: v1.4
  last_updated: 28 Jan 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Cut-Throats
    cost: 1CP
    description: Add 1 to the Atk stat of friendly FARSTALKER KINBAND operatives'
      melee weapons (to a maximum of 5).
  - name: Rogue
    cost: 1CP
    description: "Whenever an operative is shooting a friendly FARSTALKER KINBAND\
      \ operative: \u25CF Ignore the Saturate weapon rule. \u25CF If you can retain\
      \ any cover saves, you can retain one additional cover save, or you can retain\
      \ one cover save as a critical success instead. This isn't cumulative with improved\
      \ cover saves from Vantage terrain."
  - name: Prey
    cost: 1CP
    description: Whenever a friendly FARSTALKER KINBAND operative is shooting during
      an activation in which it hasn't performed the Charge , Fall Back or Reposition
      action, its ranged weapons have the Balanced and Severe weapon rules; if the
      weapon already has the Balanced weapon rule, it has the Ceaseless and Severe
      weapon rules instead. Note that operative isn't restricted from performing those
      actions after shooting.
  - name: Bound
    cost: 1CP
    description: During each friendly FARSTALKER KINBAND operative's activation, you
      can ignore the first vertical distance of 2" they move during one climb.
  firefight_ploys:
  - name: Savage Ambush
    cost: 1CP
    description: Use this firefight ploy during the Fight action when a ready friendly
      FARSTALKER KINBAND operative that has Light or Heavy terrain within its control
      range is selected to fight against. In the Resolve Attack Dice step of that
      sequence, you resolve the first attack dice (i.e. defender instead of attacker).
  - name: Slip Away
    cost: 1CP
    description: Use this firefight ploy during a friendly FARSTALKER KINBAND operative's
      activation, before or after it performs an action. During that activation, that
      operative can perform the Fall Back action for 1 less AP.
  - name: Poach
    cost: 1CP
    description: Use this firefight ploy during a friendly FARSTALKER KINBAND operative's
      activation. Until the end of that activation, that operative doesn't have to
      control a marker to perform the Pick Up Marker or mission actions that usually
      require this (taking precedence over that action's conditions - it only needs
      to contest the marker).
  - name: Vengeance For The Kinband
    cost: 1CP
    description: Use this firefight ploy when a friendly FARSTALKER KINBAND operative
      is incapacitated by an enemy operative. Until the end of the battle, whenever
      another friendly FARSTALKER KINBAND operative is shooting against, fighting
      against or retaliating against that enemy operative, that other friendly operative's
      weapons have the Relentless weapon rule. You cannot use this ploy again during
      the battle until that enemy operative is incapacitated.
  operatives:
  - name: Kill-Broker
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 9
    weapons:
    - name: Kroot rifle
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules: []
    - name: Pulse weapon
      type: Melee
      a: 4
      bs_ws: 4+
      d: 4/5
      rules: []
    - name: Ritual blade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 4/5
      rules: []
    rules:
    - name: Call The Kill
      description: STRATEGIC GAMBIT if this operative is in the killzone. Select one
        enemy operative to be your mark for the turning point. Whenever a friendly
        FARSTALKER KINBAND operative is shooting against, fighting against or retaliating
        against your mark, that friendly operative's weapons have the Balanced weapon
        rule. Whenever your mark is incapacitated, you can select a new enemy operative
        to be your mark for the turning point (and can continue to do so during this
        turning point).
      cost: 0AP
    - name: Victory Shriek
      description: Whenever your mark is incapacitated, you can select one friendly
        FARSTALKER KINBAND operative within 6" of this operative. Until the end of
        the battle, that operative's weapons have the Balanced weapon rule. Each friendly
        operative can only be selected for this rule once per battle.
      cost: 0AP
  - name: Bow-Hunter
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Accelerator bow (Fused arrow)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 4/5
      rules:
      - Piercing 1
    - name: Accelerator bow (Glide arrow)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Silent
    - name: Accelerator bow (Voltaic arrow)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/5
      rules:
      - Blast 1"
    - name: Blade
      type: Melee
      a: 3
      bs_ws: 3+
      d: 3/5
      rules: []
    rules: []
  - name: Cold-Blood
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 9
    weapons:
    - name: Kroot rifle
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules: []
    - name: Blade
      type: Melee
      a: 3
      bs_ws: 3+
      d: 3/5
      rules: []
    rules:
    - name: Hardy
      description: Whenever an attack dice would inflict Critical Dmg on this operative,
        you can choose for that attack dice to inflict Normal Dmg instead.
      cost: 0AP
    - name: Cold-blooded
      description: Whenever this operative is shooting against, fighting against or
        retaliating against a wounded enemy operative, this operative's weapons have
        the Lethal 5+ weapon rule; if that enemy operative is also injured, this operative's
        weapons also have the Rending weapon rule.
      cost: 0AP
  - name: Cut-Skin
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Cut-skin's blades
      type: Melee
      a: 4
      bs_ws: 3+
      d: 3/5
      rules:
      - Ceaseless
      - Lethal 5+
    rules:
    - name: Vicious Duellist
      description: Whenever this operative is fighting or retaliating, for each attack
        dice your opponent discards as a fail, inflict 1 damage on the enemy operative
        in that sequence.
      cost: 0AP
    - name: Savage Assault
      description: The first time this operative performs the Fight action during
        each of its activations, if neither it nor the enemy operative in that sequence
        is incapacitated, this operative can immediately perform a free Fight action
        afterwards, but it can only fight against that enemy operative (and only if
        it's still valid to fight against). This takes precedence over action restrictions.
      cost: 0AP
  - name: Heavy Gunner
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Dvorgite skinner
      type: Ranged
      a: 5
      bs_ws: 2+
      d: 3/3
      rules:
      - Rng 6"
      - Heavy (Reposition only)
      - Piercing 2
      - Torrent 2"
    - name: Londaxi tribalest
      type: Melee
      a: 5
      bs_ws: 4+
      d: 4/5
      rules:
      - Heavy (Reposition only)
      - Piercing 1
      - Rending
    - name: Blade
      type: Melee
      a: 3
      bs_ws: 3+
      d: 3/5
      rules: []
    rules: []
  - name: Hound
    stats:
      apl: 2
      mv: 8"
      sv: 5+
      w: 7
    weapons:
    - name: Ripping fangs
      type: Melee
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Rending
    rules:
    - name: Beast
      description: This operative cannot perform any actions other than Charge , Dash
        , Fall Back , Fight , Gather , Guard , Reposition , Pick Up Marker and Place
        Marker . It cannot use any weapons that aren't on its datacard.
      cost: 0AP
    - name: Bad-tempered
      description: Whenever an enemy operative performs the Fight action, if this
        operative is a valid operative to fight against, you can force them to select
        this operative to fight against instead. Whenever an enemy operative ends
        the Charge action within control range of another friendly FARSTALKER KINBAND
        operative within 3" of this operative, if this operative isn't within control
        range of enemy operatives, this operative can immediately perform a free Charge
        action (you can change its order to Engage to do so), but must end that move
        within control range of that enemy operative.
      cost: 1AP
    - name: Gather
      description: "\U0001F7E2 Perform a free Dash or Reposition action with this\
        \ operative. During that move, you can perform a free Pick Up Marker or Place\
        \ Marker action with this operative (you can determine control during that\
        \ action to do so), and any remaining move distance it had from the Dash or\
        \ Reposition action can be used after it does so."
      cost: 0AP
  - name: Long-Sight
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Kroot hunting rifle (Concealed)
      type: Ranged
      a: 4
      bs_ws: 2+
      d: 3/3
      rules:
      - Heavy
      - Devastating 3
      - Silent
      - Concealed Position *
    - name: Kroot hunting rifle (Mobile)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules: []
    - name: Kroot hunting rifle (Stationary)
      type: Ranged
      a: 4
      bs_ws: 2+
      d: 3/3
      rules:
      - Heavy
      - Devastating 3
    - name: Blade
      type: Melee
      a: 3
      bs_ws: 3+
      d: 3/5
      rules: []
    rules:
    - name: '* Concealed Position'
      description: This operative can only use this weapon the first time it's performing
        the Shoot action during the battle.
      cost: 1AP
    - name: "\U0001F7E2 Until the start of this operative's next activation"
      description: "\u25CF The concealed and stationary profiles of its Kroot hunting\
        \ rifle have the Lethal 5+ weapon rule. \u25CF Whenever it's shooting with\
        \ its Kroot hunting rifle, enemy operatives cannot be obscured. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative."
      cost: 0AP
  - name: Pistolier
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Dual Kroot pistols (Focused)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/5
      rules:
      - Rng 8"
      - Ceaseless
      - Lethal 5+
    - name: Dual Kroot pistols (Salvo)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/5
      rules:
      - Rng 8"
      - Salvo *
    - name: Blade
      type: Melee
      a: 3
      bs_ws: 3+
      d: 3/5
      rules: []
    rules:
    - name: '* Salvo'
      description: Select up to two different valid targets that aren't within control
        range of friendly operatives. Shoot with this weapon against both of them
        in an order of your choice (roll each sequence separately).
      cost: 0AP
    - name: Quick Draw
      description: Once per turning point, when an enemy operative is performing the
        Shoot action and this operative is selected as the valid target (or if it
        will be a secondary target from the Blast weapon rule), if this operative
        is ready, you can interrupt that action to use this rule. If you do, this
        operative can immediately perform a free Shoot action with its dual Kroot
        pistols (focused) against that enemy operative (you can change its order to
        Engage to do so), but that enemy operative must be a valid target.
      cost: 0AP
  - name: Stalker
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Kroot scattergun
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/3
      rules:
      - Rng 6"
    - name: Stalker's blade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 3/5
      rules:
      - Balanced
      - Rending
    rules:
    - name: Stalker
      description: This operative can perform the Charge action while it has a Conceal
        order.
      cost: 2AP
    - name: Stealth Attack
      description: "\U0001F7E2 Perform a free Charge action with this operative, but\
        \ don't exceed its Move stat (i.e. don't add 2\"). Then immediately perform\
        \ a free Fight action with this operative. The first time you strike during\
        \ that action, you can immediately resolve another of your successes as a\
        \ strike (before your opponent). \U0001F534 This operative cannot perform\
        \ this action while it has an Engage order, while within control range of\
        \ an enemy operative, or if it isn't within 1\" of Light or Heavy terrain."
      cost: 0AP
  - name: Tracker
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 8
    weapons:
    - name: Kroot rifle
      type: Ranged
      a: 4
      bs_ws: 4+
      d: 3/4
      rules: []
    - name: Blade
      type: Melee
      a: 3
      bs_ws: 3+
      d: 3/5
      rules: []
    rules:
    - name: From The Eye Above
      description: "\U0001F7E2 SUPPORT . Select one other friendly FARSTALKER KINBAND\
        \ operative visible to and within 6\" of this operative. Until the end of\
        \ that operative's next activation, add 1 to its APL stat. \U0001F534 This\
        \ operative cannot perform this action while within control range of an enemy\
        \ operative."
      cost: 0AP
  - name: Warrior
    stats:
