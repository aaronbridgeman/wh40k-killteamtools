    - name: Blade
      type: Melee
      a: 3
      bs_ws: 3+
      d: 3/5
      rules: []
    rules:
    - name: Ready for Anything
      description: Once per turning point, during a friendly WARRIOR operative's activation,
        you can use the Meat, Piercing Shot or Toxin Shot rule for that operative.
        Doing so doesn't count for its once per turning point limit.
      cost: 0AP
