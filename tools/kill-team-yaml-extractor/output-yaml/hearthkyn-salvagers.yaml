        \ from the killzone."
      cost: 1AP
    - name: Knux Smash
      description: "\U0001F7E2 Select one enemy operative within this operative's\
        \ control range. You can move that enemy operative up to 3\" to a location\
        \ it can be placed. Then inflict D3+1 damage on it (even if you don't move\
        \ it); if the D3 result is a 3, also subtract 1 from that enemy operative's\
        \ APL stat until the end of its next activation. This operative can then immediately\
        \ perform a free Charge action (even if it's already performed the Charge\
        \ action during that activation), but cannot move more than 3\" during that\
        \ action. \U0001F534 Cannot perform this action unless an enemy operative\
        \ is within control range."
      cost: 0AP
