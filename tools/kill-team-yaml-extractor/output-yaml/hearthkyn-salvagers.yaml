      description: The first time during each turning point that another friendly
        HEARTHKYN SALVAGER operative would be removed from the killzone as incapacitated
        while visible to and within 3" of this operative, you can use this rule, providing
        neither this nor that operative is within control range of an enemy operative.
        If you do, that friendly operative isn't incapacitated and has 1 wound remaining.
        That friendly operative can then immediately perform a free Dash action, but
        must end that move within this operative's control range. Subtract 1 from
        this and that operative's APL stats until the end of their next activations
        respectively, and if this rule was used during that friendly operative's activation,
        that activation ends. You cannot use this rule if this operative is incapacitated.
      cost: 1AP
    - name: Medikit
      description: "\U0001F7E2 Select one friendly HEARTHKYN SALVAGER operative within\
        \ this operative's control range to regain up to 2D3 lost wounds. It cannot\
        \ be an operative that the Medic! rule was used on during this turning point.\
