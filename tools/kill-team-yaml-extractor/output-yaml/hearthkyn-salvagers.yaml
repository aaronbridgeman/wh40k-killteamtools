team:
  name: Hearthkyn Salvagers
  version: v1.5
  last_updated: 29 Apr 2026
  archetypes:
  - Recon
  - Security
  strategy_ploys:
  - name: Need Keeps
    cost: 1CP
    description: "Select one objective marker or one of your mission markers. \u25CF\
      \ Whenever determining control of that marker, treat the total APL stat of friendly\
      \ HEARTHKYN SALVAGER operatives that contest it as 1 higher if at least one\
      \ friendly HEARTHKYN SALVAGER operative contests that marker. Note this isn't\
      \ a change to the APL stat, so any changes are cumulative with this. \u25CF\
      \ Whenever a friendly HEARTHKYN SALVAGER operative is within 3\" of that marker,\
      \ add 1 to the Atk stat of its melee weapons (to a maximum of 4); if the weapon\
      \ already has an Atk stat of 4, it has the Balanced weapon rule."
  - name: Toil Earns
    cost: 1CP
    description: Select one objective marker or one of your mission markers. Whenever
      an enemy operative is within 3" of that marker, treat it as having one additional
      Grudge token.
  - name: Wrought Defence
    cost: 1CP
    description: Whenever an operative is shooting a friendly HEARTHKYN SALVAGER operative,
      if you rolled one or less successes (including any re-rolls), you can retain
      one of your fails as a normal success instead of discarding it.
  - name: Proximate Firepower
    cost: 1CP
    description: Whenever a friendly HEARTHKYN SALVAGER operative is shooting an enemy
      operative within 6" of it, improve the Hit stat of that friendly operative's
      ranged weapons by 1 (to a maximum of 3+). This can allow you to apply or remove
      the Hit stat change during an action (this takes precedence over the core rules).
  firefight_ploys:
  - name: The Ancestors Are Watching
    cost: 1CP
    description: Use this firefight ploy during a friendly HEARTHKYN SALVAGER operative's
      activation. Until the end of that activation, that operative can perform either
      a free Shoot or a free Fight action and you can ignore any changes to that operative's
      weapon stats from being injured.
  - name: Worth It
    cost: 1CP
    description: Use this firefight ploy when a friendly HEARTHKYN SALVAGER operative
      is incapacitated. It can perform a free mission action before it's removed from
      the killzone.
  - name: Sturdy
    cost: 1CP
    description: Use this firefight ploy when an operative is shooting a friendly
      HEARTHKYN SALVAGER operative, when you collect your defence dice. Change the
      attacker's retained critical successes to normal successes (any weapon rules
      they've already resolved aren't affected, e.g. Piercing Crits).
  - name: Engage To Acquire
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      HEARTHKYN SALVAGER operative, if it's shooting against or fighting against an
      enemy operative that controls an objective marker or one of your mission markers.
      You can re-roll any of your attack dice.
