      description: This operative can use frag, krak, smoke and stun grenades (see
        universal equipment). Doing so doesn't count towards any limited uses you
        have (i.e. if you also select those grenades from equipment for other operatives).
        Whenever this operative is using a frag or krak grenade, improve the Hit stat
        of that weapon by 1.
