team:
  name: Tempestus Aquilon
  version: v1.3
  last_updated: 25 June 2025
  archetypes:
  - Recon
  - Seek And Destroy
  strategy_ploys:
  - name: Sudden Offensive
    cost: 1CP
    description: Count the number of friendly TEMPESTUS AQUILON operatives that aren't
      incapacitated, then halve the result (rounding up) to give you x. Until the
      end of their activation, friendly TEMPESTUS AQUILON operatives' weapons have
      the Balanced weapon rule if they are the first friendly operatives activated
      this turning point equal to x. For example, if you have five operatives, the
      first three friendly operatives activated will benefit.
  - name: Maintain Momentum
    cost: 1CP
    description: Whenever a friendly TEMPESTUS AQUILON operative is shooting against
      or fighting against a ready enemy operative, its weapons have the Severe weapon
      rule.
  - name: Eye Above
    cost: 1CP
    description: "Select one enemy operative. That operative and all other enemy operatives\
      \ within 3\" of it gain one of your Detected tokens until the end of the turning\
      \ point. Whenever an enemy operative with a Detected token: \u25CF Is shooting\
      \ a friendly TEMPESTUS AQUILON operative, you can re-roll one of your defence\
      \ dice. \u25CF Is fighting or retaliating against a friendly TEMPESTUS AQUILON\
      \ operative, one of your blocks can be allocated to block two unresolved successes\
      \ (instead of one)."
  - name: Drop And Secure
    cost: 1CP
    description: "Select one marker. \u25CF Until the Ready step of the next turning\
      \ point, when determining control of that marker, treat the total APL stat of\
      \ friendly TEMPESTUS AQUILON operatives that contest it as 1 higher, as long\
      \ as at least one friendly TEMPESTUS AQUILON operative actually contests it.\
      \ \u25CF Whenever a friendly TEMPESTUS AQUILON operative is within 3\" of that\
      \ marker, add 1 to the Atk stat of its melee weapons (to a maximum of 4)."
  firefight_ploys:
  - name: Hot Drop
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      TEMPESTUS AQUILON operative that's wholly within your opponent's territory,
      or either landed or dropped from Vantage terrain at least 2" higher than the
      killzone floor during this activation. If the target is within 6" of it, you
      can re-roll any of your attack dice.
  - name: Adjust Coordinates
    cost: 1CP
    description: Use this firefight ploy when a friendly TEMPESTUS AQUILON operative
      lands. You can set it up within 5" of one of your Drop markers (measuring horizontal
      distance only), taking precedence over the normal distance requirement. It cannot
      perform the Dash , Fight or Shoot actions during this turning point.
  - name: Tempestus Exemplars
    cost: 1CP
    description: Use this firefight ploy during a friendly TEMPESTUS AQUILON operative's
      activation (excluding SERVO-SENTRY and any operative with an APL stat greater
      than 2). During that activation it can perform the Pick Up Marker , Place Marker
      or a mission action for 1 less AP.
  - name: Progena
    cost: 1CP
    description: Use this firefight ploy when a friendly TEMPESTUS AQUILON operative
      (excluding SERVO-SENTRY ) is activated. It regains 2D3 lost wounds, and during
      that activation you can ignore any changes to its APL stat.
