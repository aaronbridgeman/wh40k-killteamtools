    - name: Tempestus Veteran
      description: Once per battle, you can either use a firefight ploy for 0CP if
        this is the specified TEMPESTUS AQUILON operative, or the Command Re-roll
        firefight ploy for 0CP this is the operative the attack or defence dice was
        rolled for.
      cost: 1AP
    - name: Command
      description: "\U0001F7E2 SUPPORT . Select one other friendly TEMPESTUS AQUILON\
        \ operative (excluding SERVO-SENTRY ) visible to and within 6\" of this operative.\
        \ Until the end of that operative's next activation, add 1 to its APL stat.\
        \ \U0001F534 This operative cannot perform this action while within control\
        \ range of an enemy operative."
      cost: 0AP
