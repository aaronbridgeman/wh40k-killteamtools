    rules:
    - name: '* Salvo'
      description: Select up to two different valid targets that aren't within control
        range of friendly operatives. Shoot with this weapon against both of them
        in an order of your choice (roll each sequence separately).
      cost: 0AP
    - name: Gunfight
      description: Whenever an enemy operative within 8" of this operative shoots
        this operative, keep track of each attack dice that's discarded as a fail.
        After the action, before incapacitated operatives are removed (including this
        one, if relevant), this operative can perform a free Shoot action (change
        its order to Engage to do so), but it can only target that enemy operative
        with its hot-shot laspistols (focused), and you only roll a number of attack
        dice equal to the opponent's discarded attack dice plus one (to a maximum
        of four).
      cost: 0AP
