    rules:
    - name: Cast the Runes
      description: After selecting this operative, before the battle, roll three D6
        and put them to one side. For each result of 1-4, you can use the Command
        Re-roll firefight ploy for 0CP once during the turning point that matches
        the result. For each result of 5-6, you gain 1CP. For example, if you roll
        2, 2 and 5, you gain 1CP and twice during the second turning point you can
        use Command Re-roll for 0CP.
      cost: 1AP
    - name: Call The Storm
      description: "\U0001F7E2 PSYCHIC . Remove your Storm marker from the killzone\
        \ (if any), then place it in the killzone. \U0001F7E2 PSYCHIC . Alternatively,\
        \ instead of resolving the above effect, select one friendly WOLF SCOUT operative.\
        \ Until the start of this operative's next activation, until it's incapacitated\
        \ or until it performs this action again (whichever comes first), whenever\
        \ that friendly operative is within your STORM and more than 3\" from the\
        \ active operative, it's obscured. \U0001F534 This operative cannot perform\
        \ this action while within control range of an enemy operative."
      cost: 0AP
  - name: Trapmaster
