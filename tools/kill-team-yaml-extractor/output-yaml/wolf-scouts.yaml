    - name: Combat blade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 4/5
      rules: []
    rules:
    - name: Storm-veiled Execution
      description: Whenever
      cost: 0AP
    - name: this operative is within your STORM
      description: "\u25CF It can perform the Guard action regardless of the killzone\
        \ (see close quarters rules, Kill Team Core Book). \u25CF It can perform the\
        \ Guard action while it has a Conceal order, but if it does, it cannot perform\
        \ more than one Shoot action for the rest of the turning point (i.e. it cannot\
        \ Shoot both during the interruption and during counteract)."
      cost: 1AP
    - name: Hunter'S Senses
      description: "\U0001F7E2 Select one of the following rules for this operative's\
        \ instigator bolt carbine to"
      cost: 0AP
    - name: have until the start of its next activation
      description: "\u25CF Severe. \u25CF Saturate, and whenever this operative is\
        \ shooting with that weapon, enemy operatives cannot be obscured. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative"
      cost: 0AP
