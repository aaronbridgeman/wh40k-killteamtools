      d: 4/5
      rules:
      - Rng 9"
      - Piercing Crits 1
    - name: Combat blade
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/5
      rules: []
    rules:
    - name: Spiritual Chirurgy
      description: You can ignore any changes to the stats of friendly WOLF SCOUT
        operatives (excluding FENRISIAN WOLF ) from being injured (including their
        weapons' stats). Note that friendly operatives have this rule if you select
        this operative for the battle (even if it's incapacitated later).
      cost: 1AP
    - name: Healing Balms
      description: "\U0001F7E2 Select one friendly WOLF SCOUT operative within this\
        \ operative's control range to regain up to D3+3 lost wounds. \U0001F534 This\
        \ operative cannot perform this action while within control range of an enemy\
        \ operative."
      cost: 0AP
  - name: Fenrisian Wolf
    stats:
      apl: 2
      mv: 8"
      sv: 5+
      w: 9
    weapons:
    - name: Fangs
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/5
      rules:
      - Rending
    rules:
    - name: Instinctive Predator
      description: This operative cannot perform any actions other than Charge , Dash
        , Fall Back , Fight , Guard and Reposition . It cannot use any weapons that
        aren't on its datacard. This operative can perform the Charge action while
        it has a Conceal order.
      cost: 0AP
    - name: Pounce
      description: Once per battle STRATEGIC GAMBIT . If this operative's APL stat
        is 2 or more, this operative can perform a free Charge , Fall Back or Reposition
        action. If it does, until the end of its next activation, subtract 1 from
        its APL stat and it cannot perform any of the aforementioned actions.
      cost: 0AP
