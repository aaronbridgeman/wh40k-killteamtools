team:
  name: Wolf Scouts
  version: v1.2
  last_updated: 29 Apr 2026
  archetypes:
  - Recon
  - Seek And Destroy
  strategy_ploys:
  - name: Cloaked By The Storm
    cost: 1CP
    description: Whenever an operative is shooting a friendly WOLF SCOUT operative
      that's within your STORM , you can re-roll one of your defence dice.
  - name: Tempestuous Wrath
    cost: 1CP
    description: Whenever a friendly WOLF SCOUT operative is fighting or retaliating,
      if it's within your STORM or was within your STORM at the start of the activation,
      its melee weapons have the Balanced weapon rule.
  - name: Storm'S Bite
    cost: 1CP
    description: Whenever a friendly WOLF SCOUT operative is fighting against an enemy
      operative that's within your STORM , subtract 1 from the Atk stat of that enemy
      operative's melee weapons (to a minimum of 3).
  - name: Savage Fighters
    cost: 1CP
    description: Whenever a friendly WOLF SCOUT operative finishes retaliating, if
      it wasn't incapacitated, you can inflict D3+1 damage on the enemy operative
      in that sequence.
  firefight_ploys:
  - name: Acute Senses
    cost: 1CP
    description: Use this firefight ploy when a friendly WOLF SCOUT operative performs
      the Shoot action and you're selecting a valid target. Until the end of that
      action, that friendly operative's ranged weapons have the Range 6" and Seek
      Light weapon rules and enemy operatives cannot be obscured.
  - name: Counterattack
    cost: 1CP
    description: Use this firefight ploy at the end of an enemy operative's activation,
      or after an enemy operative performs the Fight action. One friendly WOLF SCOUT
      operative can immediately perform a free Fight action, but you cannot select
      any other enemy operative to fight against during that action.
  - name: Touched By Lokyar
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      WOLF SCOUT operative (excluding FENRISIAN WOLF ), if it's fighting more than
      5" from other friendly operatives. You can re-roll any of your attack dice.
  - name: Transhuman Physiology
    cost: 1CP
    description: Use this firefight ploy when an operative is shooting a friendly
      WOLF SCOUT operative (excluding FENRISIAN WOLF ), in the Roll Defence Dice step.
      You can retain one of your normal successes as a critical success instead.
  operatives:
  - name: Pack Leader
    stats:
      apl: 3
      mv: 7"
      sv: 3+
      w: 13
    weapons:
    - name: Plasma pistol (Standard)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/5
      rules:
      - Rng 8"
      - Piercing 1
    - name: Plasma pistol (Supercharge)
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 4/5
      rules:
      - Rng 8"
      - Hot
      - Lethal 5+
      - Piercing 1
    - name: Power weapon
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/6
      rules:
      - Lethal 5+
    rules:
    - name: Lupine Guile
      description: Once per battle, after rolling off to decide initiative, if this
        operative is in the Killzone, you can re-roll your dice.
      cost: 0AP
    - name: Grizzled Veteran
      description: The first time this operative would be incapacitated during the
        battle, it's not incapacitated, has 1 wound remaining and cannot be incapacitated
        for the remainder of the action. All remaining attack dice are discarded (including
        yours if this operative is fighting or retaliating). You cannot use the Counterattack
        firefight ploy or inflict damage as a result of the Savage Fighters strategy
        ploy at the end of that action.
      cost: 0AP
  - name: Fangbearer
    stats:
      apl: 3
      mv: 7"
      sv: 3+
      w: 13
    weapons:
    - name: Absolvor bolt pistol
      type: Ranged
      a: 4
