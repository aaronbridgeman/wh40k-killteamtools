    - name: Combat blade
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/5
      rules: []
    rules:
    - name: Haywire Mine
      description: This operative is carrying your Haywire Mine marker. It can perform
        the Pick Up Marker action on that marker, but that marker cannot be placed
        within another operative's control range (if this operative is incapacitated
        while carrying that marker and that marker cannot be placed, it's removed
        with this operative).
      cost: 0AP
    - name: Proximity Mine
      description: The first time your Haywire Mine marker is within another operative's
        control range, remove that marker, subtract 1 from that operative's APL stat
        until the end of its next activation, and inflict 2D3+3 damage on it (or D3+6
        if that marker is within 6" horizontally of your Storm marker); if it isn't
        incapacitated, end its action (if any), even if that action's effects aren't
        fulfilled. If it cannot be placed, move it the minimum amount to do so. Note
        that this operative is ignored for these effects (i.e. it cannot set it off
        or take damage from that marker).
      cost: 0AP
