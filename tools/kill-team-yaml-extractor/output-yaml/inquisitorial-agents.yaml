      w: 5
    weapons: []
    rules:
    - name: Consecrated Tome
      description: This operative can have an INQUISITORIAL TOME rule (see INTERROGATOR
        ). Note it keeps that rule even if that friendly INTERROGATOR operative is
        removed from the killzone.
      cost: 0AP
    - name: Expendable
      description: "This operative is ignored for your opponent's kill/ elimination\
        \ op (when it's incapacitated, and when determining your starting number of\
        \ operatives). It's also ignored for victory conditions and scoring VPs if\
        \ either require operatives to \u2018escape', \u2018survive' or be incapacitated\
        \ by enemy operatives (if it escapes/survives/is incapacitated, determining\
        \ how many operatives must escape/survive/be incapacitated, etc.)."
      cost: 0AP
    - name: Machine
      description: "\u25CF This operative cannot perform any actions other than Charge\
        \ , Dash , Fall Back and Reposition . \u25CF It cannot retaliate or assist\
        \ in a fight. \u25CF Whenever determining control of a marker, treat this\
        \ operative's APL stat as 1 lower. Note this isn't a change to its APL stat,\
        \ so any changes are cumulative with this. \u25CF Whenever this operative\
        \ has a Conceal order and is in cover, it cannot be selected as a valid target,\
        \ taking precedence over all other rules (e.g. Seek, Vantage terrain) except\
        \ being within 2\"."
      cost: 0AP
    - name: Group Activation
      description: Whenever this operative is expended, you must then activate a ready
        friendly INQUISITORIAL AGENT INTERROGATOR operative (if able) before your
        opponent activates. The same is true in reverse ( INTERROGATOR followed by
        TOME-SKULL ). When that other operative is expended, your opponent then activates
        as normal. Kill Team Reference Sheet by James And The Giant Squig - Version
        1.6 (updated 26 Feb 2026)
      cost: 0AP
