team:
  name: Inquisitorial Agents
  version: v1.6
  last_updated: 26 Feb 2026
  archetypes:
  - Any
  strategy_ploys:
  - name: Denounce
    cost: 1CP
    description: Select one enemy operative and roll one D3. In the Firefight phase
      of this turning point, that enemy operative cannot be activated or perform actions
      until it's the last enemy operative to be activated, or your opponent has activated
      a number of enemy operatives equal to the result of the D3 (whichever comes
      first). This ploy costs you 1 additional CP for each previous time you've used
      it during the battle (e.g. 1CP the first time you would use it, 2CP the second
      time, etc.).
  - name: Intense Scrutiny
    cost: 1CP
    description: Whenever you're selecting a valid target for a friendly INQUISITORIAL
      AGENT operative, enemy operatives within 4" of it cannot be in cover (instead
      of 2"). While this can allow such operatives to be targeted (assuming they're
      visible), it doesn't remove their cover save (if any), unless the friendly INQUISITORIAL
      AGENT operative is within 2" as normal.
  - name: Quarry
    cost: 1CP
    description: Select one enemy operative to be your quarry for the turning point.
      Whenever a friendly INQUISITORIAL AGENT operative is shooting against, fighting
      against or retaliating against your quarry, that friendly operative's weapons
      have the Ceaseless weapon rule. Whenever your quarry is incapacitated, you can
      select a new enemy operative to be your quarry (and can continue to do so during
      this turning point).
  - name: Irrefutable Jurisdiction
    cost: 1CP
    description: Whenever an operative is shooting a friendly INQUISITORIAL AGENT
      operative that's within 3" of an objective marker, you can re-roll one of your
      defence dice. If that friendly operative contests that marker, you can re-roll
      any of your defence dice results of one result instead (e.g. results of 2).
  firefight_ploys:
  - name: Absolute Authority
    cost: 1CP
    description: Use this firefight ploy during the battle, when an opponent uses
      a strategy or firefight ploy (excluding Command Re-roll or one that costs 0CP).
      Their ploy isn't used, the CP is refunded and they cannot use that ploy again
      during this turning point. This ploy cannot be used to stop the same ploy more
      than once per battle.
  - name: Relentless In Pursuit
    cost: 1CP
    description: Use this firefight ploy when an enemy operative within 2" of a ready
      friendly INQUISITORIAL AGENT operative performs an action in which it moves.
      After it moves, that friendly INQUISITORIAL AGENT operative can either perform
      a free Reposition action, but must end that move within 2" of that enemy operative,
      or a free Charge action, but must end that move within control range of that
      enemy operative. If neither is possible, that friendly operative cannot perform
      those actions, this ploy isn't used and the CP spent on it is refunded.
  - name: The Emperor'S Will
    cost: 1CP
    description: Use this firefight ploy when a friendly INQUISITORIAL AGENT operative
      is activated. Until the end of that operative's activation, you can ignore any
      changes to its stats (including its weapons' stats).
  - name: Intimidating Presence
    cost: 1CP
    description: Use this firefight ploy when an enemy operative visible to and within
      3" of a friendly INQUISITORIAL AGENT operative (or 6" if a friendly MYSTIC operative)
      performs the Pick Up Marker or a mission action (excluding Operate Hatch ).
      Your opponent must spend 1 additional AP for that enemy operative to perform
      that action (if they cannot or choose not to, the AP spent on it is refunded).
  operatives:
  - name: Tome-Skull
    stats:
      apl: 2
