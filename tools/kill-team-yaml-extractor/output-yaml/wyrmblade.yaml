team:
  name: Wyrmblade
  version: v1.2
  last_updated: 19 November 2025
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: The Day Is At Hand
    cost: 1CP
    description: "Whenever a friendly WYRMBLADE operative is activated, if its order\
      \ is changed from Conceal to Engage, until the end of that activation: \u25CF\
      \ Its ranged weapons have the Rending weapon rule. \u25CF Add 1 to the Atk stat\
      \ of its melee weapons (to a maximum of 5)."
  - name: Crossfire
    cost: 1CP
    description: Whenever a friendly WYRMBLADE operative is shooting an operative
      that another friendly WYRMBLADE operative has already shot during this turning
      point, that friendly operative's ranged weapons have the Accurate 1 weapon rule.
  - name: One With The Shadows
    cost: 1CP
    description: Whenever an operative is shooting a friendly WYRMBLADE operative
      that has a Conceal order, if Light terrain is intervening, that friendly operative
      is obscured (unless the intervening Light terrain is within 1" of either operative).
  - name: Divert And Disappear
    cost: 1CP
    description: Up to three friendly WYRMBLADE operatives can immediately perform
      a free Dash or Charge action in an order of your choice (choose separately for
      each, and for the latter, it cannot move more than 3"). If a WYRMBLADE CULT
      AGENT operative is selected for this ploy, it counts as two operatives, and
      it can perform a free Fall Back action instead (it cannot move more than 3");
      if it does, subtract 1 from its APL stat until the end of its next activation.
  firefight_ploys:
  - name: Slink Into Darkness
    cost: 1CP
    description: Use this firefight ploy at the end of a friendly WYRMBLADE operative's
      activation. If that operative has an Engage order, change it to Conceal. You
      cannot use this ploy for each friendly operative more than once per battle.
  - name: Coiled Serpent
    cost: 1CP
    description: Use this firefight ploy when a friendly WYRMBLADE operative is shooting
      or fighting, after rolling your attack dice. If that friendly operative's order
      was changed from Conceal to Engage at the start of that activation and this
      is the first time it's performed either the Shoot or Fight action during that
      activation, you can retain one of your normal successes as a critical success
      instead. Note this ploy cannot come into effect more than once per activation
      (you cannot use it during both the Shoot and Fight action in the same activation).
  - name: Unquestioning Loyalty
    cost: 1CP
    description: Use this firefight ploy when a friendly WYRMBLADE CULT AGENT or WYRMBLADE
      LEADER operative is selected as the valid target of a Shoot action or to fight
      against during the Fight action. Select one other friendly WYRMBLADE NEOPHYTE
      operative (excluding LEADER ) visible to and within 3" of that first friendly
      operative to become the valid target or to be fought against (as appropriate)
      instead (even if it wouldn't normally be valid for this). If it's the Fight
      action, treat that other operative as being within the fighting operative's
      control range for the duration of that action. If it's the Shoot action, that
      other operative is only in cover or obscured if the original target was. This
      ploy has no effect if it's the Shoot action and the ranged weapon has the Blast
      or Torrent weapon rule. If it's the Shoot action, that other operative is only
      in cover or obscured if the original target was.
  - name: A Plan Generations In The Making
    cost: 1CP
    description: Use this firefight ploy when a friendly WYRMBLADE NEOPHYTE operative
      is incapacitated. It can perform a free mission action before it's removed from
      the killzone.
