    - name: Expert Swordsman
      description: This operative can perform two Fight actions during its activation.
        Whenever this operative ends the Fight action, if it's no longer within control
        range of enemy operatives, it can immediately perform a free Charge action
        (even if it's already performed the Charge action during that activation),
        but it cannot move more than 3" during that action. Doing so doesn't prevent
        it from performing the Dash action afterwards during that activation.
      cost: 0AP
    - name: Bladed Stanc e
      description: Whenever this operative is fighting or retaliating, you can resolve
        one of your successes before the normal order. If you do, that success must
        be used to block.
      cost: 0AP
    - name: Quicksilver Strike
      description: Once per turning point, after an enemy operative performs an action
        in which it moves or is set up, you can interrupt to use this rule. If you
        do, this operative can immediately perform a free Charge action (you can change
        its order to do so), but it cannot move more than 3", and it must end that
        move within control range of that enemy operative. If this isn't possible,
        the interruption is cancelled and this rule hasn't been used.
      cost: 0AP
