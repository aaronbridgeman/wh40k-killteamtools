    rules:
    - name: Creeping Shadow
      description: This operative can perform the Charge action while it has a Conceal
        order. Whenever this operative performs the Fight action, it can immediately
        perform a free Dash or Fall Back action afterwards (for the latter, it cannot
        move more than 3"), even if it's performed an action that prevents it from
        performing those actions.
      cost: 1AP
    - name: Assassinate
      description: "\U0001F7E2 Select one enemy operative this operative isn't visible\
        \ to. Perform a free Charge action with this operative, but don't exceed its\
        \ Move stat (i.e. don't add 2\"), and it must end that move within control\
        \ range of that enemy operative. Then immediately perform a free Fight action\
        \ with this operative against that enemy operative. The first time you strike\
        \ during that action, you can immediately resolve another of your successes\
        \ as a strike (before your opponent). \U0001F534 This operative cannot perform\
        \ this action while it has an Engage order, or while within control range\
        \ of an enemy operative."
      cost: 1AP
    - name: Familiar'S Soulsight
      description: "\U0001F7E2 Select one enemy operative visible to this operative.\
        \ Until the end of the battle, or until this action is performed again by\
        \ a friendly operative (whichever comes first), that enemy operative gains\
        \ one of your Soulsight tokens. Whenever this operative is fighting or retaliating\
        \ against an enemy operative that has one of your Soulsight tokens, its Sanctus\
        \ bio-dagger has the Brutal and Balanced weapon rules. \U0001F534 This operative\
        \ cannot perform this action while within control range of an enemy operative."
      cost: 0AP
