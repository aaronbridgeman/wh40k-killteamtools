        \ is shooting against, fighting against or retaliating against an enemy operative\
        \ that has one of your Alight tokens, that friendly operative's weapons have\
        \ the Ceaseless weapon rule. \U0001F534 This operative cannot perform this\
        \ action while within control range of an enemy operative."
      cost: 0AP
