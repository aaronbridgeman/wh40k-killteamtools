  strategy_ploys:
  - name: Aetherial Warding
    cost: 1CP
    description: Whenever an operative is shooting a friendly WARPCOVEN operative,
      weapons with the Piercing 1 weapon rule have the Piercing Crits 1 weapon rule
      instead.
  - name: Fate Itself Is My Weapon
    cost: 1CP
    description: Roll two D6 and reserve them (put them to one side). In the following
      Firefight phase, whenever an operative is shooting, fighting or retaliating,
      after you or your opponent roll their attack dice, but before re-rolls, you
      can use one of your reserved dice to replace one of the D6 rolled for that sequence
      (yours or your opponent's); that replacement dice cannot be re-rolled or retained
      as a success or critical success if it's not, and is discarded at the end of
      that sequence. Then, if the combined result of both reserved dice was less than
      9, discard the other dice. You cannot use more than one reserved dice per sequence.
      Discard any remaining reserved dice at the end of the turning point.
  - name: Brotherhood Of Sorcerers
    cost: 1CP
    description: Friendly WARPCOVEN SORCERER operatives' PSYCHIC weapons have the
      Balanced weapon rule, or Ceaseless instead if another friendly WARPCOVEN SORCERER
      operative is within 9" of that operative.
  - name: Savage Herd
    cost: 1CP
    description: Friendly WARPCOVEN TZAANGOR operatives' melee weapons have the Accurate
      1 weapon rule. Whenever a friendly WARPCOVEN TZAANGOR operative is assisted
      by a friendly WARPCOVEN operative, or is fighting while visible to and within
      6" of a friendly WARPCOVEN SORCERER operative, that friendly WARPCOVEN TZAANGOR
      operative's melee weapons also have the Severe weapon rule.
  firefight_ploys:
  - name: All Is Dust
    cost: 1CP
    description: Use this firefight ploy when an attack dice inflicts Normal Dmg on
      a WARPCOVEN RUBRIC MARINE operative. That attack dice inflicts 1 damage instead.
  - name: Capricious Plan
    cost: 1CP
    description: Use this firefight ploy at the end of a friendly WARPCOVEN SORCERER
      operative's activation. That friendly operative can immediately perform a free
      Dash action (even if it's performed an action that prevents it from performing
      the Dash action), or you can change its order instead.
  - name: Psychic Cabal
    cost: 1CP
    description: Use this firefight ploy when a friendly WARPCOVEN SORCERER operative
      is activated. Select one other friendly WARPCOVEN SORCERER operative visible
      to and within 9" of that operative, then select one of that other friendly operative's
      PSYCHIC unique actions or PSYCHIC ranged weapons for that first friendly operative
      to have until the end of its activation. You cannot select a PSYCHIC ranged
      weapon that has been used by that other friendly operative during this turning
      point, and that other friendly operative cannot use the selected weapon during
      this turning point.
  - name: Mutant Herd
    cost: 1CP
    description: Use this firefight ploy when a friendly WARPCOVEN TZAANGOR operative
      is activated. Select one other ready friendly WARPCOVEN TZAANGOR operative visible
      to and within 2" of it to activate at the same time. Complete their activations
      action by action in any order.
