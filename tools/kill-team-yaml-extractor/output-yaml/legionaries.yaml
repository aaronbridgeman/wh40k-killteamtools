    - name: Grisly Mark
      description: "\U0001F7E2 Place your Grisly marker within this operative's control\
        \ range. \u25CF Whenever an enemy operative is within 3\" of your Grisly marker,\
        \ your opponent must spend 1 additional AP for that enemy operative to perform\
        \ the Pick Up Marker and mission actions. \u25CF Whenever determining control\
        \ of a marker, treat the total APL stat of enemy operatives that contest it\
        \ as 1 lower if at least one of those enemy operatives is within 3\" of your\
        \ Grisly marker. Note this isn't a change to the APL stat, so any changes\
        \ are cumulative with this. \U0001F534 This operative can only perform this\
        \ action once per battle, and cannot perform it while within control range\
        \ of an enemy operative."
      cost: 0AP
