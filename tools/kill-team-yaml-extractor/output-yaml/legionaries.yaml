team:
  name: Legionaries
  version: v1.3
  last_updated: 29 October 2025
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Blood For The Blood God
    cost: 1CP
    description: Whenever a friendly LEGIONARY operative (excluding KHORNE ) is fighting,
      the first time you strike during that sequence, inflict 1 additional damage
      (to a maximum of 7). Add 1 to both Dmg stats of LEGIONARY KHORNE operatives'
      melee weapons (to a maximum of 7).
  - name: Implacable
    cost: 1CP
    description: Whenever an operative is shooting a friendly LEGIONARY operative,
      weapons with the Piercing 1 weapon rule have the Piercing Crits 1 weapon rule
      instead. You can ignore any changes to the stats of friendly LEGIONARY NURGLE
      operatives from being injured (including their weapons' stats).
  - name: Quicksilver Speed
    cost: 1CP
    description: Whenever a friendly LEGIONARY operative that performed an action
      in which it moved during this turning point is fighting, worsen the Hit stat
      of the enemy operative's melee weapons by 1. Whenever an operative is shooting
      a friendly LEGIONARY SLAANESH operative more than 6" from it that performed
      an action in which it moved during this turning point, worsen the Hit stat of
      the enemy operative's weapons by 1. In all cases for this ploy, this isn't cumulative
      with being injured.
  - name: Fickle Fates
    cost: 1CP
    description: Whenever a friendly LEGIONARY operative is shooting a ready enemy
      operative, that friendly operative's ranged weapons have the Balanced weapon
      rule. Whenever an operative is shooting a ready friendly LEGIONARY TZEENTCH
      operative, in the Roll Defence Dice step, if you retain any critical successes,
      you can retain one of your fails as a normal success instead of discarding it.
  firefight_ploys:
  - name: Unending Bloodshed
    cost: 1CP
    description: Use this firefight ploy when a friendly LEGIONARY KHORNE operative
      is incapacitated while fighting or retaliating. You can strike the enemy operative
      in that sequence with one of your unresolved successes before it's removed from
      the killzone.
  - name: Malignant Aura
    cost: 1CP
    description: Use this firefight ploy when a friendly LEGIONARY NURGLE operative
      is performing the Shoot action, when you select a valid target. Until the end
      of that action, whenever that friendly operative is shooting an enemy operative
      within 3" of it (i.e. including secondary targets, if any), that friendly operative's
      ranged weapons have the Piercing 1 weapon rule.
  - name: Sickening Captivation
    cost: 1CP
    description: Use this firefight ploy during a friendly LEGIONARY SLAANESH operative's
      activation, before or after it performs an action. Select one enemy operative
      visible to and within 4" of that friendly operative. Until the end of that enemy
      operative's next activation, subtract 1 from its APL stat.
  - name: Mutability And Change
    cost: 1CP
    description: Use this firefight ploy when a friendly LEGIONARY TZEENTCH operative
      is activated. Until the end of that operative's activation, add 1 to its APL
      stat, but it cannot perform the same action more than once during that activation..
      If it's a WARRIOR operative, that operative's Marks of Chaos keyword cannot
      be changed during this turning point (see Infernal Pact additional rule).
