    - name: Group Activation
      description: Whenever this operative is expended, you must then activate one
        other ready friendly GELLERPOX INFECTED MUTANT operative (if able) before
        your opponent activates. When that other operative is expended, your opponent
        then activates as normal (in other words, you cannot activate more than two
        operatives in succession with this rule).
      cost: 0AP
    - name: Gellercaust Masks
      description: Whenever an attack dice would inflict Critical Dmg on this operative,
        you can choose for that attack dice to inflict Normal Dmg instead.
      cost: 0AP
