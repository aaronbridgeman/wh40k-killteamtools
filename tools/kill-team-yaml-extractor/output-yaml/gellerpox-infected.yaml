team:
  name: Gellerpox Infected
  version: v1.4
  last_updated: 29 October 2025
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Plagueridden Determination
    cost: 1CP
    description: Whenever an operative is shooting a friendly GELLERPOX INFECTED operative
      (excluding MUTOID VERMIN ) that has an Engage order, you can re-roll one of
      your defence dice.
  - name: Blessings Of Infection
    cost: 1CP
    description: "Whenever a friendly GELLERPOX INFECTED operative is fighting or\
      \ retaliating, you can do one of the following: \u25CF If you roll three or\
      \ more fails, you can discard one of them to retain another as a normal success\
      \ instead. \u25CF If you roll three or more successes, you can discard one of\
      \ your fails to retain one of your normal successes as a critical success instead."
  - name: Drawn To The Hum
    cost: 1CP
    description: Select one objective marker. Whenever a friendly GELLERPOX INFECTED
      operative performs the Reposition or Charge action during its activation, you
      can use this rule. If you do, add 1" to its Move stat until the end of that
      activation, but it must end that move within 2" of that objective marker.
  - name: Rust Emanations
    cost: 1CP
    description: Whenever a friendly GELLERPOX INFECTED NIGHTMARE HULK operative is
      fighting, your opponent cannot retain results of 3 as successes.
  firefight_ploys:
  - name: Revolting Technology
    cost: 1CP
    description: Use this firefight ploy when an enemy operative is shooting a friendly
      GELLERPOX INFECTED operative. That operative's ranged weapons have the Hot weapon
      rule until the end of that sequence; if the weapon already has that weapon rule,
      when your opponent rolls one D6 for that weapon rule, you can add or subtract
      1 from the result. Note that for the latter you can see the result of your opponent's
      roll for the Hot weapon rule before deciding to use this ploy.
  - name: Barge
    cost: 1CP
    description: "Use this firefight ploy during a friendly GELLERPOX INFECTED NIGHTMARE\
      \ HULK operative's activation or counteraction, before or after it performs\
      \ an action. During that activation/counteraction: \u25CF It can move through\
      \ enemy operatives and within control range of them. \u25CF It can perform the\
      \ Charge and Reposition actions while within control range of an enemy operative,\
      \ and can leave that operative's control range to do so (but then normal requirements\
      \ for that move apply)."
  - name: Putrescent Demise
    cost: 1CP
    description: Use this firefight ploy when a friendly GELLERPOX INFECTED operative
      (excluding MUTOID VERMIN ) is incapacitated, before it's removed from the killzone.
      Inflict 1 damage (or D3 damage instead if that friendly operative is a NIGHTMARE
      HULK ) on each enemy operative visible to and within 2" of that friendly operative.
  - name: Frightening Onslaught
    cost: 1CP
    description: Use this firefight ploy after a friendly GELLERPOX INFECTED NIGHTMARE
      HULK operative performs the Fight action, if it isn't incapacitated. It can
      immediately perform a free Fight action (you don't have to select the same enemy
      operative to fight against). This takes precedence over action restrictions.
  operatives:
  - name: Vulgrar Thrice-Cursed
    stats:
      apl: 2
      mv: 5"
      sv: 5+
      w: 21
    weapons:
    - name: Pyregut (Standard)
      type: Ranged
      a: 5
      bs_ws: 2+
      d: 3/3
      rules:
      - Rng 6"
      - Saturate
      - Torrent 2"
    - name: Pyregut (Deluge)
      type: Ranged
      a: 5
      bs_ws: 2+
      d: 3/3
      rules:
      - Rng 4"
      - Saturate
      - Seek Light
    - name: Fleshmelded weapons
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/5
      rules:
      - Engineered *
    rules:
    - name: '* Engineered'
      description: At the end of the Select Operatives step, if this operative is
        selected for deployment, select up to two of the following improvements or
        weapon rules
      cost: 0AP
    - name: for this weapon to have for the battle
      description: Add 1 to the Normal Dmg stat, add 1 to the Critical Dmg stat, Balanced,
        Brutal, Lethal 5+, Rending.
      cost: 0AP
    - name: Spread the Glorious Gifts
      description: Once per battle STRATEGIC GAMBIT . Select one objective marker
        this operative controls to gain one of your Techno-curse tokens. It cannot
        be an objective marker within control range of an enemy operative. Whenever
        that objective marker is within control range of an enemy operative, that
        operative is affected by your selected TECHNO-CURSE rule and an additional
        rule determined by your TECHNO-CURSE , as shown below. You cannot use this
        STRATEGIC GAMBIT while this operative is within control range of an enemy
        operative.
      cost: 0AP
    - name: "\u25CF Barrelwarp"
      description: No additional effect.
      cost: 0AP
    - name: "\u25CF Screaming Rustspikes"
      description: This TECHNO-CURSE inflicts 2 damage on that enemy operative (instead
        of 1).
      cost: 0AP
    - name: "\u25CF Viral Vox-static"
      description: Whenever that enemy operative is activated, subtract 1 from its
        APL stat until the end of its activation.
      cost: 0AP
  - name: Bloatspawn
    stats:
      apl: 2
      mv: 5"
      sv: 5+
      w: 20
    weapons:
    - name: Mutant tentacles
      type: Ranged
      a: 5
