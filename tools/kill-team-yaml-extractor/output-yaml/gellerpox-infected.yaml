      - Torrent 1"
    - name: Mutant claw & tentacles (Slashing)
      type: Ranged
      a: 6
      bs_ws: 4+
      d: 3/4
      rules: []
    - name: Mutant claw & tentacles (Swiping)
      type: Melee
      a: 4
      bs_ws: 4+
      d: 3/4
      rules:
      - Swipe *
    rules:
    - name: '* Swipe'
      description: Whenever this operative performs the Fight action and you select
        this weapon profile, if it isn't incapacitated, it can immediately perform
        a free Fight action afterwards, but you must select this weapon profile and
        it can only fight against each enemy operative within its control range once
        per activation or counteraction using this weapon profile. This takes precedence
        over action restrictions, and you can continue to perform free Fight actions
        until this operative is incapacitated or has fought against every enemy operative
        within its control range.
      cost: 0AP
    - name: Tentacled Grasp
      description: Whenever an enemy operative would perform the Fall Back action
        while within control range of this operative, you can use this rule. If you
        do, roll one D6, adding 1 to the result if that enemy operative has a Wounds
        stat of 8
      cost: 0AP
    - name: or less
      description: on a 4+, that enemy operative cannot perform that action during
        that activation/counteraction (the AP spent on it isn't refunded).
      cost: 0AP
