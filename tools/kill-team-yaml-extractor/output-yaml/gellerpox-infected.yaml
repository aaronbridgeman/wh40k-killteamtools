      a: 5
      bs_ws: 4+
      d: 5/6
      rules: []
    rules:
    - name: Horrifying Shrieking
      description: Whenever an enemy operative is within 3" of this operative, your
        opponent must spend 1 additional AP for that enemy operative to perform the
        Pick Up Marker and mission actions. Whenever determining control of a marker,
        treat the total APL stat of enemy operatives that contest it as 1 lower if
        at least one of those enemy operatives is within 3" of this operative. Note
        this isn't a change to the APL stat, so any changes are cumulative with this.
      cost: 0AP
