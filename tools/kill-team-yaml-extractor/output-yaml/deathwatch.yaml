team:
  name: Deathwatch
  version: v1.3
  last_updated: 28 Jan 2026
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Mission Tactics
    cost: 1CP
    description: Select Conceal or Engage. Whenever a friendly DEATHWATCH operative
      is shooting against or fighting against an enemy operative that has that order,
      that friendly operative's weapons have the Balanced weapon rule.
  - name: The Long Vigil
    cost: 1CP
    description: Whenever an operative is shooting a friendly DEATHWATCH operative
      that's wholly within your territory, you can re-roll one of your defence dice.
  - name: The Shield That Slays
    cost: 1CP
    description: Whenever a friendly DEATHWATCH operative is wholly within your opponent's
      territory, Normal Dmg of 4 or more inflicts 1 less damage on it.
  - name: They Shall Know No Fear
    cost: 1CP
    description: You can ignore any changes to the stats of friendly DEATHWATCH operatives
      from being injured (including their weapons' stats).
  firefight_ploys:
  - name: Suffer Not The Alien
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      DEATHWATCH operative, if it's shooting against or fighting against an operative
      that doesn't have the CHAOS or IMPERIUM keyword. You can re-roll any of your
      attack dice.
  - name: Auspicator Tracking
    cost: 1CP
    description: Use this firefight ploy when a friendly DEATHWATCH operative is counteracting,
      before it performs any actions. You can change its order.
  - name: Advanced Auspex Scan
    cost: 1CP
    description: Use this firefight ploy when a friendly DEATHWATCH operative performs
      the Shoot action. Until the end of the activation/ counteraction, its ranged
      weapons have the Saturate weapon rule and enemy operatives cannot be obscured.
  - name: Transhuman Physiology
    cost: 1CP
    description: Use this firefight ploy when an operative is shooting a friendly
      DEATHWATCH operative, in the Roll Defence Dice step. You can retain one of your
      normal successes as a critical success instead.
