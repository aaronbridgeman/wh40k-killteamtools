        xenophase blade. Whenever this operative is fighting or retaliating, you can
        resolve one of your successes before the normal order. If you do, that success
        must be used to block.
      cost: 0AP
    - name: '* Phase Sweep'
      description: Whenever this operative performs the Fight action with this weapon
        profile, if it isn't incapacitated, it can immediately perform a free Fight
        action afterwards, but you must select this weapon profile and it can only
        fight against each enemy operative within its control range once per activation
        or counteraction using this weapon profile. This takes precedence over action
        restrictions, and you can continue to perform free Fight actions until this
        operative is incapacitated or has fought against every enemy operative within
        its control range.
