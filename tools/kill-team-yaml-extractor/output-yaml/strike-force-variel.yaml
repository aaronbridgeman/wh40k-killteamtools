team:
  name: Strike Force Variel
  version: v1.1
  last_updated: 05 Feb 2026
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: Combat Doctrine
    cost: 1CP
    description: "Select one COMBAT DOCTRINE from those presented below. Whenever\
      \ a friendly STRIKE FORCE VARIEL operative is x, its weapons have the Balanced\
      \ weapon rule. X is the COMBAT DOCTRINE you selected. \u25CF Devastator Doctrine\
      \ : Shooting an operative more than 6\" from it. \u25CF Tactical Doctrine :\
      \ Shooting an operative within 6\" of it. \u25CF Assault Doctrine : Fighting\
      \ or retaliating."
  - name: And They Shall Know No Fear
    cost: 1CP
    description: You can ignore any changes to the stats of friendly STRIKE FORCE
      VARIEL operatives from being injured (including their weapons' stats).
  - name: Grim Resolve
    cost: 1CP
    description: Whenever determining control of a marker, treat the total APL stat
      of friendly operatives that contest it as 1 higher if friendly operatives controlled
      that marker at the start of the Firefight phase. Note this is not a change to
      the APL, so any changes are cumulative with this.
  - name: Indomitus
    cost: 1CP
    description: Whenever an operative is shooting a friendly STRIKE FORCE VARIEL
      operative, if you roll two or more fails, you can discard one of them to retain
      another as a normal success instead.
  firefight_ploys:
  - name: Transhuman Physiology
    cost: 1CP
    description: Use this firefight ploy when an operative is shooting a friendly
      STRIKE FORCE VARIEL operative, in the Roll Defence Dice step. You can retain
      one of your normal successes as a critical success instead.
  - name: Shock Assault
    cost: 1CP
    description: "Use this firefight ploy when a friendly STRIKE FORCE VARIEL operative\
      \ is performing the Fight action during an activation in which it performed\
      \ the Charge action, at the start of the Resolve Attack Dice step. Until the\
      \ end of that action: \u25CF Its melee weapon has the Shock weapon rule. \u25CF\
      \ The first time you strike during that sequence, inflict 1 additional damage\
      \ (to a maximum of 7)."
  - name: Wrath Of Vengeance
    cost: 1CP
    description: Use this firefight ploy when a friendly STRIKE FORCE VARIEL operative
      is counteracting. It can perform an additional 1AP action for free during that
      counteraction, but both actions must be different.
