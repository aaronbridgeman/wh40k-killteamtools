      bs_ws: 3+
      d: 4/5
      rules:
      - Severe
      - Poison *
      - Toxic *
    rules:
    - name: Grandfather's Blessing
      description: Whenever an enemy operative that has one of your Poison tokens
        loses one or more wounds within 7" of this operative, this operative regains
        up to an equal number of lost wounds (to a maximum of 3 lost wounds per turning
        point, and only if this operative isn't incapacitated).
      cost: 0AP
