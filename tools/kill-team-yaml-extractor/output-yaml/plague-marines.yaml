team:
  name: Plague Marines
  version: v1.7
  last_updated: 29 Apr 2026
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Contagion
    cost: 1CP
    description: "Subtract 2\" from the Move stat of an enemy operative and worsen\
      \ the Hit stat of its weapons by 1 (this isn't cumulative with being injured)\
      \ whenever any of the following are true: \u25CF It has one of your Poison tokens\
      \ and is visible to (or vice versa) and within 3\" of friendly PLAGUE MARINE\
      \ operatives. \u25CF It's visible to (or vice versa) and within 3\" of a friendly\
      \ PLAGUE MARINE ICON BEARER operative."
  - name: Lumbering Death
    cost: 1CP
    description: Whenever a friendly PLAGUE MARINE operative is shooting or fighting
      during an activation in which it hasn't moved more than 3", or whenever it's
      retaliating, its weapons have the Ceaseless weapon rule
  - name: Cloud Of Flies
    cost: 1CP
    description: Place one of your Cloud of Flies markers in the killzone. Whenever
      an operative is shooting a friendly PLAGUE MARINE operative that's more than
      3" from it, if that friendly operative is wholly within 1" of that marker, that
      friendly operative is obscured. In the Ready step of the next Strategy phase,
      remove that marker.
  - name: Nurglings
    cost: 1CP
    description: Select one enemy operative within 3" of a friendly PLAGUE MARINE
      operative, or one enemy operative that has one of your Poison tokens and is
      within 7" of a friendly PLAGUE MARINE operative. Until the end of the selected
      operative's next activation, subtract 1 from its APL stat.
  firefight_ploys:
  - name: Virulent Poison
    cost: 1CP
    description: Use this firefight ploy during a friendly PLAGUE MARINE operative's
      activation or counteraction, before or after it performs an action. One enemy
      operative within 3" of, or visible to and within 7" of, that operative gains
      one of your Poison tokens (if it doesn't already have one).
  - name: Poisonous Demise
    cost: 1CP
    description: Use this firefight ploy when a friendly PLAGUE MARINE operative is
      incapacitated, before it's removed from the killzone. Each enemy operative visible
      to and within 3" of that operative gains one of your Poison tokens (if they
      don't already have one); for each of those enemy operatives that already has
      one of your Poison tokens (including if they gained one during this action),
      inflict 1 damage on them instead.
  - name: Sickening Resilience
    cost: 1CP
    description: Use this firefight ploy when an attack dice inflicts damage on a
      friendly PLAGUE MARINE operative. Until the end of the activation/counteraction,
      for the purposes of the Disgustingly Resilient rule for that operative, always
      subtract 1 from the damage inflicted (to a minimum of 2) - you don't need to
      roll.
  - name: Curse Of Rot
    cost: 1CP
    description: Use this firefight ploy when a friendly PLAGUE MARINE operative is
      fighting against or shooting against an enemy operative within 3" of it (or
      within 7" of it if that enemy operative has one of your Poison tokens), after
      your opponent rolls their attack or defence dice. For each result of 3 they
      roll, inflict 1 damage on that enemy operative, that result cannot be retained
      as a success and they cannot re-roll it.
  operatives:
