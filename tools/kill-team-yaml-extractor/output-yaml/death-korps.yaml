team:
  name: Death Korps
  version: v1.5
  last_updated: 29 Apr 2026
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Siege Warfare
    cost: 1CP
    description: Friendly DEATH KORPS operatives ranged weapons have the Saturate
      and Accurate 1 weapon rules.
  - name: Take Cover
    cost: 1CP
    description: Whenever an operative is shooting a friendly DEATH KORPS operative,
      if you can retain any cover saves, improve that friendly operative's Save stat
      by 1.
  - name: Clear The Line
    cost: 1CP
    description: Friendly DEATH KORPS operatives' melee weapons have the Accurate
      1 weapon rule. Whenever a friendly DEATH KORPS operative is fighting wholly
      within your territory, or whenever it's retaliating, its melee weapons also
      have the Severe weapon rule.
  - name: Regroup
    cost: 1CP
    description: SUPPORT . Select one friendly DEATH KORPS operative that's more than
      3" from enemy operatives. Each other friendly DEATH KORPS operative within 5"
      of that operative and not within control range of enemy operatives can immediately
      perform a free Dash action in an order of your choice, but each that does so
      must end that move closer to that operative. Note that a Comms Device from universal
      equipment only affects the second distance of this rule. You cannot use this
      ploy and the Chronometer faction equipment STRATEGIC GAMBIT in the same turning
      point.
  firefight_ploys:
  - name: Inspirational Leadership
    cost: 1CP
    description: SUPPORT . Use this firefight ploy during a friendly DEATH KORPS WATCHMASTER
      or DEATH KORPS CONFIDANT operative's activation, before or after it performs
      an action. It issues a GUARDSMAN ORDER .
  - name: Combined Arms
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      DEATH KORPS operative, if it's shooting an enemy operative that's been shot
      by another friendly DEATH KORPS operative during this turning point. You can
      re-roll any of your attack dice.
  - name: In Life, Shame
    cost: 1CP
    description: Use this firefight ploy when a friendly DEATH KORPS operative is
      activated and given an Engage order. It receives every GUARDSMAN ORDER . This
      takes precedence over the normal rule that operatives cannot benefit from more
      than one GUARDSMAN ORDER at once.
  - name: In Death, Atonement
    cost: 1CP
    description: Use this firefight ploy when a ready friendly DEATH KORPS operative
      is incapacitated, if it isn't within control range of enemy operatives. Before
      it's removed from the killzone, it can immediately perform one free action and
      you can change its order to do so. Note that that friendly operative is injured
      for the duration of that action.
