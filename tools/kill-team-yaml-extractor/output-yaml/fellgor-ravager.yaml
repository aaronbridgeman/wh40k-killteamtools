team:
  name: Fellgor Ravager
  version: v1.4
  last_updated: 19 November 2025
  archetypes:
  - Recon
  - Seek And Destroy
  strategy_ploys:
  - name: Violent Temperament
    cost: 1CP
    description: Whenever a friendly FELLGOR RAVAGER operative is fighting or retaliating,
      after rolling your attack dice, you can use this rule. If you do, you must re-roll
      all of your attack dice (you cannot only re-roll some).
  - name: Ambush
    cost: 1CP
    description: Whenever a friendly FELLGOR RAVAGER operative is activated, if its
      order is changed from Conceal to Engage, it's ambushing for that activation.
      Whenever a friendly FELLGOR RAVAGER operative that's ambushing is fighting,
      you can retain one of your normal successes as a critical success instead. Note
      that an operative that has one of your Frenzy tokens cannot ambush.
  - name: Pelting Firepower
    cost: 1CP
    description: Whenever a friendly FELLGOR RAVAGER operative is shooting an enemy
      operative that's been shot by another friendly FELLGOR RAVAGER operative during
      this turning point, that first friendly operative's ranged weapons have the
      Ceaseless weapon rule; if the enemy operative has been shot by more than one
      other friendly FELLGOR RAVAGER operative during this turning point, that first
      friendly operative's ranged weapons have the Relentless weapon rule instead.
  - name: Reckless Determination
    cost: 1CP
    description: Whenever an enemy operative is shooting an expended friendly FELLGOR
      RAVAGER operative, if you cannot retain any cover saves, you can retain one
      of your defence dice as a normal success without rolling it.
  firefight_ploys:
  - name: Ruthless Rampage
    cost: 1CP
    description: Use this firefight ploy after a friendly FELLGOR RAVAGER operative
      performs the Fight action, if it's no longer within control range of enemy operatives.
      That friendly operative can immediately perform a free Charge action (even if
      it's already performed the Charge action during that activation), but cannot
      move more than 3" during that action.
  - name: Wild Rage
    cost: 1CP
    description: Use this firefight ploy when a friendly FELLGOR RAVAGER operative
      is activated. Until the end of that operative's activation, add 1" to its Move
      stat.
  - name: Animalistic Fury
    cost: 1CP
    description: Use this firefight ploy when a friendly FELLGOR RAVAGER operative
      is fighting or retaliating and you strike with a critical success. Inflict 1
      additional damage with that strike.
  - name: Bloodsense
    cost: 1CP
    description: Use this firefight ploy during a friendly FELLGOR RAVAGER operative's
      activation, when it incapacitates an enemy operative within its control range.
      Select one other ready friendly FELLGOR RAVAGER operative that's visible to
      and within 3" of the incapacitated enemy operative. When that first friendly
      operative is expended, you can activate that other friendly operative before
      your opponent activates. When that other operative is expended, your opponent
      then activates as normal.
