team:
  name: Novitiate
  version: v1.4
  last_updated: 29 Apr 2026
  archetypes:
  - Recon
  - Security
  strategy_ploys:
  - name: Ardent Vengeance
    cost: 1CP
    description: Whenever a friendly NOVITIATE operative is shooting against, fighting
      against or retaliating against an expended enemy operative, that friendly operative's
      weapons have the Punishing weapon rule.
  - name: Defenders Of The Faith
    cost: 1CP
    description: Whenever an operative is shooting against, fighting against or retaliating
      against a friendly NOVITIATE operative that contests an objective marker, in
      the Resolve Attack Dice step of that sequence, you can halve the damage inflicted
      (rounding up) and to a minimum of 2) on that friendly operative from one success.
  - name: Blessed Rejuvenation
    cost: 1CP
    description: Whenever you spend Faith points, at the end of that action, the friendly
      operative you spent them on can regain up to D3 lost wounds. Note this ploy
      has no effect if that friendly operative was incapacitated during that action,
      or if the ACT OF FAITH doesn't cost any Faith points, e.g. Auto-chastisers equipment.
  - name: Righteous Advance
    cost: 1CP
    description: Up to one third of the friendly NOVITIATE operatives in the killzone
      (rounding down, to a minimum of 1) can immediately perform a free Dash action
      in an order of your choice, but each that does so must end that move closer
      to its closest enemy operative, its closest objective marker or your opponent's
      drop zone (you can choose separately for each). You cannot use this ploy during
      the first turning point.
  firefight_ploys:
  - name: Glorious Martyrdom
    cost: 1CP
    description: Use this firefight ploy when a friendly NOVITIATE operative is incapacitated,
      before it's removed from the killzone. For each enemy operative visible to and
      within 2" of it, you gain 1 Faith point and inflict D3 damage on that enemy
      operative (roll separately for each).
  - name: Blazing Inferno
    cost: 1CP
    description: "Use this firefight ploy when a friendly NOVITIATE operative is shooting\
      \ with a Ministorum flamer and you inflict damage with any critical successes.\
      \ The target gains one of your Blaze tokens (if it doesn't already have one).\
      \ Whenever an operative that has one of your Blaze tokens is activated: \u25CF\
      \ Inflict D3 damage on it. \u25CF Its controlling player can subtract 1 from\
      \ that operative's APL stat until the end of that activation to remove that\
      \ token. Note that this must be done before that operative performs any actions\
      \ during that activation."
  - name: Blinding Aura
    cost: 1CP
    description: Use this firefight ploy when an enemy operative is performing the
      Shoot action and selects a friendly NOVITIATE operative as the valid target.
      Until the end of that activation/ counteraction, while that friendly operative
      is more than 2" from that enemy operative, your opponent cannot select it as
      a valid target. If there are no other valid targets that your opponent can select,
      that action ends (it's not cancelled, so that operative has still performed
      it). Note this ploy has no effect if it's not the selected operative, e.g. if
      it's a secondary target from the Blast weapon rule.
  - name: Guided By Faith
    cost: 1CP
    description: Use this firefight ploy when a friendly NOVITIATE operative is performing
      the Shoot action and you're selecting a ranged weapon. Until the end of that
      action, whenever that operative is shooting an operative within 6" of it, that
      weapon has the Seek Light weapon rule.
