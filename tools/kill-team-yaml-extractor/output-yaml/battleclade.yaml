team:
  name: Battleclade
  version: v1.3
  last_updated: 29 Apr 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Noospheric Possession
    cost: 1CP
    description: SUPPORT . Whenever a friendly BATTLECLADE SERVITOR operative is within
      6" of a friendly BATTLECLADE AUTO-PROXY or BATTLECLADE SERVITOR UNDERSEER operative,that
      friendly SERVITOR operative's weapons have the Accurate 1 weapon rule. For the
      purposes of this SUPPORT rule and the Comms Device equipment, the AUTO-PROXY
      or SERVITOR UNDERSEER operative must control your Comms Device marker to add
      3" to its distance requirement for this rule.
  - name: Duty Of Reclamation
    cost: 1CP
    description: Once per action, you can use the Command Reroll firefight ploy for
      0CP if the attack or defence dice was rolled for a friendly BATTLECLADE operative
      that contests an objective marker or one of your mission markers.
  - name: Incantation Of The Iron Soul
    cost: 1CP
    description: 'Whenever an attack dice inflicts damage of 3 or more on a friendly
      BATTLECLADE operative, roll one D6: on a 4+, subtract 1 from that inflicted
      damage.'
  - name: Prioritised Acquisition
    cost: 1CP
    description: "Select one objective marker or one of your mission markers. \u25CF\
      \ Whenever determining control of that marker, treat the total APL stat of friendly\
      \ BATTLECLADE operatives that contest it as 1 higher if at least one friendly\
      \ BATTLECLADE operative contests that marker. Note this isn't a change to the\
      \ APL stat, so any changes are cumulative with this. \u25CF Whenever a friendly\
      \ BATTLECLADE operative is within 3\" of that marker, add 1 to the Atk stat\
      \ of its melee weapons (to a maximum of 4)."
  firefight_ploys:
  - name: System Exorcism
    cost: 1CP
    description: Use this firefight ploy when you would activate a friendly BATTLECLADE
      operative. Remove one rules effect or stat change your opponent has applied
      to it (e.g. Poison token, -1APL, cannot be activated or perform actions, etc.),
      then activate it. This ploy cannot allow it to regain lost wounds, ignore the
      effects of being injured or remove mission pack rules.
  - name: Remote Access
    cost: 1CP
    description: "Use this firefight ploy during a friendly BATTLECLADE TECH-PRIEST\
      \ operative's activation. Once during that activation, you can use one of the\
      \ following rules: \u25CF That operative doesn't require a marker to be within\
      \ its control range to perform a mission action that usually requires this (this\
      \ takes precedence over that action's conditions). Instead, the marker must\
      \ be within 4\" of it and no enemy operatives can contest that marker. However,\
      \ you can ignore enemy operatives within control range of other friendly BATTLECLADE\
      \ operatives when determining this. \u25CF That operative doesn't require a\
      \ hatchway's access point to be within its control range to perform an Operate\
      \ Hatch action. Instead, that access point must be within 4\" of it."
  - name: Auto-Ferric Supplication
    cost: 1CP
    description: Use this firefight ploy when an operative is shooting a friendly
      BATTLECLADE TECH-PRIEST operative, at the start of the Roll Attack Dice step.
      Until the end of the sequence, ignore the Piercing weapon rule.
  - name: Servile Surrogacy
    cost: 1CP
    description: Use this firefight ploy when a friendly BATTLECLADE TECH-PRIEST operative
      is selected as the valid target of a Shoot action or to fight against during
      the Fight action. Select one friendly BATTLECLADE SERVITOR operative visible
      to and within 3" of that first friendly operative to become the valid target
      or to be fought against (as appropriate) instead (even if it wouldn't normally
      be valid for this). If it's the Fight action, treat that SERVITOR operative
      as being within the fighting operative's control range for the duration of that
      action. If it's the Shoot action, that SERVITOR operative is only in cover or
      obscured if the original target was. This ploy has no effect if it's the Shoot
      action and the ranged weapon has the Blast or Torrent weapon rule.
  operatives:
