    rules:
    - name: Mechanosuture Array
      description: Once per turning point, when another friendly BATTLECLADE operative
        would be incapacitated while visible to and within 3" of this operative, you
        can use this rule, providing neither this nor that operative is within control
        range of an enemy operative. If you do, that friendly operative isn't incapacitated,
        has 1 wound remaining and cannot be incapacitated for the remainder of the
        action. After that action, that friendly operative can immediately perform
        a free Dash action, but must end that move within this operative's control
        range. If this rule was used during that friendly operative's activation,
        that activation ends. You cannot use this rule if this operative is incapacitated,
        or if it's a Shoot action and this operative would be a primary or secondary
        target.
      cost: 1AP
    - name: Expedient Repair
      description: "\U0001F7E2 Select one friendly BATTLECLADE operative within this\
        \ operative's control range to regain up to D3+3 lost wounds. It cannot be\
        \ an operative that the Mechanosuture Array rule was used on during this turning\
        \ point. \U0001F534 This operative cannot perform this action while within\
        \ control range of an enemy operative."
      cost: 0AP
