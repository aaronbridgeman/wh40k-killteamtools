    rules:
    - name: Network Override
      description: "\U0001F7E2 SUPPORT . Select one friendly BATTLECLADE SERVITOR\
        \ operative within 6\" of either this operative or a friendly BATTLECLADE\
        \ AUTO-PROXY operative to immediately NETWORK COUNTERACT (you don't have to\
        \ TRANSFER POWER to do so) or perform a free Dash action. Continue this operative's\
        \ activation after doing so. For the purposes of the Comms Device universal\
        \ equipment, the operative the distance is being determined from must control\
        \ that marker. \U0001F534 This operative can perform this action twice during\
        \ its activation, but cannot perform this action while within control range\
        \ of an enemy operative."
      cost: 0AP
