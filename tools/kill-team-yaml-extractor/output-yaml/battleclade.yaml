      bs_ws: 4+
      d: 3/4
      rules:
      - Severe
      - Shock
    rules:
    - name: Seeker of Divine Arcana
      description: STRATEGIC GAMBIT . You can immediately change this operative's
        order and/or it can immediately perform a free Omniscanner , Fall Back , Place
        Marker , Pick Up Marker, Reposition or mission action. If it's the Fall Back
        or Reposition action and this operative isn't carrying a marker, it must end
        that move either within your drop zone (if this isn't possible, then as close
        as possible to it), or with an objective marker or one of your mission markers
        within its control range.
      cost: 1AP
    - name: Omniscanner
      description: "\U0001F7E2 Select one enemy operative visible to or within 8\"\
        \ of this operative to gain one of your Omniscanner tokens. Whenever a friendly\
        \ BATTLECLADE operative is shooting against, fighting against or retaliating\
        \ against an enemy operative that has one of your Omniscanner tokens, that\
        \ friendly operative's weapons have the Ceaseless weapon rule. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative."
      cost: 0AP
