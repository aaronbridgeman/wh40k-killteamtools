      rules: []
    rules:
    - name: Melta Mine
      description: This operative is carrying your Melta Mine marker. It can perform
        the Pick Up Marker action on that marker, and whenever it performs the Place
        Marker action on that marker, it can immediately perform a free Dash action.
        That marker cannot be placed within an enemy operative's control range (if
        this operative is incapacitated while carrying that marker and that marker
        cannot be placed, it's removed with this operative).
      cost: 0AP
    - name: Proximity Mine
      description: The first time your Melta Mine marker is within another operative's
        control range, remove that marker and inflict 2D6+3 damage on that operative;
        if it isn't incapacitated, end its action (if any), even if that action's
        effects aren't fulfilled. If it cannot be placed, move it the minimum amount
        to do so. Note that this operative is ignored for these effects (i.e. it cannot
        set it off or take damage from that marker).
      cost: 0AP
    - name: Blast Padding
      description: Whenever an operative is shooting this operative with a weapon
        that has the Blast or Torrent weapon rule (excluding weapons that have a sweeping
        profile), you can re-roll one of your defence dice. In addition, this operative
        isn't affected by the x" Devastating x weapon rule (i.e. Devastating with
        a distance) unless they are the target during that sequence.
      cost: 0AP
