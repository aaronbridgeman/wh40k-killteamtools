team:
  name: Kasrkin
  version: v1.5
  last_updated: 29 Apr 2026
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Elimination Pattern
    cost: 1CP
    description: Whenever a friendly KASRKIN operative is shooting with a hot-shot
      weapon against an operative that cannot retain any cover saves or is being scanned
      (see RECON-TROOPER ), that weapon has the Piercing Crits 1 weapon rule, or Piercing
      1 instead if it's a hot-shot volley gun.
  - name: Engage From Cover
    cost: 1CP
    description: Whenever an operative is shooting a friendly KASRKIN operative that's
      in cover, you can re-roll one of your defence dice.
  - name: Clearance Sweep
    cost: 1CP
    description: Place your Clearance Sweep marker in the killzone. Whenever a friendly
      KASRKIN operative within 5" horizontally of that marker is shooting an operative
      also within 5" horizontally of that marker, that friendly operative's weapons
      have the Ceaseless weapon rule. In the Ready step of the next Strategy phase,
      remove that marker.
  - name: Relocate
    cost: 1CP
    description: Select one friendly KASRKIN operative that's more than 3" from enemy
      operatives. That operative, and each other friendly KASRKIN operative that's
      both within 3" of that operative and more than 3" from enemy operatives, can
      immediately perform a free Dash action in an order of your choice. You cannot
      use this ploy during the first turning point.
  firefight_ploys:
  - name: Seize The Initiative
    cost: 1CP
    description: Use this firefight ploy at the start of the Firefight phase. One
      friendly KASRKIN operative can immediately perform a 1AP action for free, but
      it cannot move during that action. You cannot use this ploy if you're the player
      with initiative.
  - name: Cover Retreat
    cost: 1CP
    description: Use this firefight ploy when a friendly KASRKIN operative performs
      the Fall Back action while visible to and within 6" of another friendly KASRKIN
      operative that's not within control range of enemy operatives. After that friendly
      operative has finished moving, but before that Fall Back action ends, that other
      friendly operative can immediately perform a free Shoot action (you can change
      its order to Engage to do so).
  - name: Neutralise Target
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      KASRKIN operative, if it's shooting an operative that either cannot retain any
      cover saves or is being scanned (see RECON-TROOPER ). You can re-roll any of
      your attack dice.
  - name: Give No Ground
    cost: 1CP
    description: Use this firefight ploy during a friendly KASRKIN operative's activation,
      or at the end of the Firefight phase. Select one of your mission markers or
      an objective marker. Until the end of that activation or until the start of
      the next turning point respectively, if the total APL of friendly KASRKIN operatives
      that contest that marker is 2, and the total APL of enemy operatives that contest
      it is the same, friendly KASRKIN operatives control that marker.
