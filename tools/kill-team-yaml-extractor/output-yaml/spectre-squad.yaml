team:
  name: Spectre Squad
  version: v1.0
  last_updated: 06 May 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Disappear
    cost: 1CP
    description: 'One friendly SPECTRE SQUAD operative can immediately perform a free
      Reposition action. It cannot end that move closer to enemy operatives or your
      opponent''s drop zone (unless it ends that move wholly within your drop zone)
      and it cannot perform that action again during the turning point. In a killzone
      that uses the close quarters rules (e.g. Killzone: Tomb World), ignore Wall
      terrain when determining closer.'
  - name: Hidden Engagement
    cost: 1CP
    description: Whenever a friendly SPECTRE SQUAD operative is shooting, if it's
      in cover from the target's perspective, that friendly operative's weapons have
      the Balanced weapon rule. Note that your opponent still determines the targeting
      lines for this (i.e. they decide which point of their operative's base targeting
      lines are drawn from).
  - name: Ambushing Volley
    cost: 1CP
    description: Whenever a friendly SPECTRE SQUAD operative is activated, if it's
      more than 3" from enemy operatives and isn't a valid target for enemy operatives
      before determining its order, its ranged weapons (excluding the suppressive
      profile of an autostubber) have the Devastating 1 weapon rule until the end
      of that activation.
  - name: Patience
    cost: 1CP
    description: "In the Firefight phase of this turning point, you can do one of\
      \ the following: \u25CF When it's your turn to activate a friendly operative,\
      \ you can skip that activation. You cannot do this until after your opponent's\
      \ first activation. \u25CF When a friendly SPECTRE SQUAD operative performs\
      \ the Shoot or Fight action during its activation, if it's the last friendly\
      \ operative to be activated during this turning point, its weapons have the\
      \ Relentless weapon rule for that action"
  firefight_ploys:
  - name: Dodge
    cost: 1CP
    description: Use this firefight ploy during a friendly SPECTRE SQUAD operative's
      activation, before or after it performs an action. During that activation, that
      operative can perform the Fall Back action for 1 less AP.
  - name: Silent Killers
    cost: 1CP
    description: Use this firefight ploy during a friendly SPECTRE SQUAD operative's
      activation before or after it performs an action, if it has a Conceal order
      and isn't a valid target for enemy operatives. Until the end of that activation,
      it can perform the Charge action while it has a Conceal order, and the first
      time it strikes you can inflict 3 additional damage, but cannot resolve any
      other successes during that sequence.
  - name: Sharp Reactions
    cost: 1CP
    description: Use this firefight ploy after an enemy operative that has a Conceal
      order performs an action during its activation, if it's within 8" of a friendly
      SPECTRE SQUAD operative. You can use the Elite Fieldcraft faction rule to interrupt
      that activation with that friendly SPECTRE SQUAD operative regardless of that
      enemy operative's order (taking precedence over the normal rules).
  - name: Prepared Defence
    cost: 1CP
    description: "Use this firefight ploy when a friendly SPECTRE SQUAD operative\
      \ that has a Conceal order or is ready is retaliating. You can do one of the\
      \ following: \u25CF At the start of the Resolve Attack Dice step, you can resolve\
      \ one of your successes before the normal order. If you do, that success must\
      \ be used to block. \u25CF When you block, that block can be allocated to block\
      \ two unresolved successes (instead of one). You cannot use this ploy during\
      \ an activation in which you've interrupted with the Elite Fieldcraft faction\
      \ rule."
