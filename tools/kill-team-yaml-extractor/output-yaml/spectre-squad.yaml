    rules:
    - name: Pre-Deploy
      description: In the Set Up Operatives step, this operative can be set up outside
        of your drop zone. It must be set up in a location it can be placed, wholly
        within your territory and more than 2" from markers and equipment terrain
        features.
      cost: 0AP
    - name: Expendable
      description: "This operative cannot perform any actions other than Signal .\
        \ It cannot counteract, retaliate or assist in a fight. This operative cannot\
        \ contest markers or areas of the killzone, and is ignored for your opponent's\
        \ kill/elimination op (when it's incapacitated, and when determining your\
        \ starting number of operatives). It's also ignored for victory conditions\
        \ and scoring VPs if either require operatives to \u2018escape', \u2018survive'\
        \ or be incapacitated by enemy operatives (if it escapes/survives/is incapacitated,\
        \ determining how many operatives must escape/survive/be incapacitated, etc.).\
        \ Operatives can move through this operative. Your opponent can ignore this\
        \ operative's control range at any time. Whenever a friendly SPECTRE SQUAD\
        \ operative is performing the Shoot action and you're selecting a valid target,\
        \ you can ignore this operative's control range. Note that control range wouldn't\
        \ be mutual when ignored."
      cost: 1AP
    - name: Signal
      description: "\U0001F7E2 Select one other friendly SPECTRE SQUAD operative within\
        \ 6\" of this operative. Until the end of that operative's next activation,\
        \ add 1 to its APL stat. \U0001F534 Cannot perform this action while within\
        \ control range of an enemy operative."
      cost: 0AP
