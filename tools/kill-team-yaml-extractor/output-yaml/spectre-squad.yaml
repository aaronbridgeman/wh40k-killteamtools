      - Lethal 5+
    - name: Gun butt
      type: Ranged
      a: 3
      bs_ws: 4+
      d: 2/3
      rules: []
    rules:
    - name: Medic!
      description: The first time during each turning point that another friendly
        SPECTRE SQUAD operative (excluding VOX-RELAY BEACON ) would be incapacitated
        while visible to and within 3" of this operative, you can use this rule, providing
        neither this nor that operative is within control range of an enemy operative.
        If you do, that friendly operative isn't incapacitated, has 1 wound remaining
        and cannot be incapacitated for the remainder of the action. After that action,
        that friendly operative can immediately perform a free Dash action, but must
        end that move within this operative's control range. Subtract 1 from this
        and that operative's APL stats until the end of their next activations respectively,
        and if this rule was used during that friendly operative's activation, that
        activation ends. You cannot use this rule if this operative is incapacitated,
        or if it's a Shoot action and this operative would be a primary or secondary
        target.
      cost: 0AP
    - name: Medikit
      description: "\U0001F7E2 Select one friendly SPECTRE SQUAD operative (excluding\
        \ VOX-RELAY BEACON ) within this operative's control range to regain up to\
        \ 2D3 lost wounds. It cannot be an operative that the Medic! rule was used\
        \ on during this turning point. \U0001F534 Cannot perform this action while\
        \ within control range of an enemy operative"
      cost: 0AP
