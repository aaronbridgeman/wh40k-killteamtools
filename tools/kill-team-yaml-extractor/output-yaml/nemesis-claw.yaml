team:
  name: Nemesis Claw
  version: v1.6
  last_updated: 29 Apr 2026
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: The Black Hunt
    cost: 1CP
    description: Whenever a friendly NEMESIS CLAW operative is shooting against, fighting
      against or retaliating against a wounded enemy operative, you can re-roll one
      of your attack dice.
  - name: Preysight
    cost: 1CP
    description: Whenever a friendly NEMESIS CLAW operative performs the Shoot action,
      you can use this rule. If you do, until the end of that action, that friendly
      operative's ranged weapons have the Range 6" and Seek Light weapon rules.
  - name: Return To Darkness
    cost: 1CP
    description: 'One friendly NEMESIS CLAW operative can immediately perform a free
      Fall Back or Reposition action, but it must end that move with Heavy terrain
      within its control range, or any part of its base underneath Vantage terrain.
      In addition, it cannot move more than 4" during that action and it cannot end
      that move closer to enemy operatives (in a killzone that uses the close quarters
      rules, e.g. Killzone: Gallowdark, ignore Wall terrain when determining this).'
  - name: We Have Come For You
    cost: 1CP
    description: Whenever a friendly NEMESIS CLAW operative is activated, if the first
      action it performs during that activation is the Charge action, when it ends
      its move during that action, you can inflict D3 damage on one enemy operative
      within its control range.
  firefight_ploys:
  - name: Death To The False Emperor
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      NEMESIS CLAW operative, if it's shooting against, fighting against or retaliating
      against an enemy operative that has the IMPERIUM keyword. That friendly operative's
      weapons have the Ceaseless weapon rule until the end of the sequence; if that
      enemy operative also has the ADEPTUS ASTARTES keyword, that friendly operative's
      weapons have the Relentless weapon rule until the end of that sequence instead.
  - name: Dirty Fighter
    cost: 1CP
    description: Use this firefight ploy when a friendly NEMESIS CLAW operative is
      retaliating, at the start of the Resolve Attack Dice step. You can resolve one
      of your successes before the normal order. If you do, you cannot resolve any
      other successes during that sequence.
  - name: Proclivity Of Murder
    cost: 1CP
    description: Use this firefight ploy after a friendly NEMESIS CLAW operative incapacitates
      an enemy operative within its control range. That friendly operative can immediately
      perform a free Charge or Dash action (for the former, it cannot move more than
      3"), even if it's performed an action that prevents it from performing the Charge
      or Dash action.
  - name: Vox Scream
    cost: 1CP
    description: "\u2018Use this firefight ploy when your opponent would activate\
      \ an enemy operative that's visible to a friendly NEMESIS CLAW operative. Roll\
      \ one D6; if the result is higher than that enemy operative's APL stat, your\
      \ opponent cannot activate it during this activation; if the result is less\
      \ than or equal to that enemy operative's APL stat, this ploy isn't used, the\
      \ CP spent on it is refunded and you cannot use this ploy again during this\
      \ turning point. If there are no other enemy operatives eligible to be activated,\
      \ this ploy has no effect."
