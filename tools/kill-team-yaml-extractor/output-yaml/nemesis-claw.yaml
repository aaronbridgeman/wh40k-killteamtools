    - name: Prescience
      description: PSYCHIC . In the Ready step of each Strategy phase, you gain D3
        Prescience points. At the end of each turning point, discard your Prescience
        points. You can spend your Prescience points in the Firefight phase as follows
        (you cannot use each of the following rules more than once
      cost: 0AP
    - name: "\u25CF Foreboding"
      description: PSYCHIC . Whenever it's your turn to activate a friendly operative,
        you can spend 1 of your Prescience points to skip that activation.
      cost: 0AP
    - name: "\u25CF Portent"
      description: PSYCHIC. Whenever an attack dice inflicts Normal Dmg on this operative,
        you can spend 1 of your Prescience points to ignore that inflicted Damage.
        You cannot gain or spend your Prescience points if this operative is incapacitated.
      cost: 1AP
    - name: Premonition
      description: "\U0001F7E2 PSYCHIC . Spend 1 of your Prescience points to gain\
