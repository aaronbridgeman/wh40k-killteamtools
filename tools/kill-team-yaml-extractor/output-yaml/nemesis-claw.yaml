      description: "\U0001F7E2 Select one objective marker this operative controls\
        \ to gain one of your Terrorchem tokens. It cannot be an objective marker\
        \ within control range of an enemy operative, or one that already has one\
        \ of your Terrorchem tokens. The first time that objective marker is within\
        \ control range of an enemy operative that doesn't have one of your Terrorchem\
        \ tokens, that operative gains that Terrorchem token, then inflicts 2D3 damage\
        \ on it (if it's during an action, at the end of that action). \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative."
      cost: 0AP
