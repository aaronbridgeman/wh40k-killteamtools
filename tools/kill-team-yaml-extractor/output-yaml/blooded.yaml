team:
  name: Blooded
  version: v1.3
  last_updated: 29 Apr 2026
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: Bitter Demise
    cost: 1CP
    description: Whenever a friendly BLOODED operative is incapacitated, before it's
      removed from the killzone, roll one D3; on a 3 (or 2+ if that friendly operative
      has one of your blooded tokens), inflict damage equal to the result on one enemy
      operative visible to and within 2" of that operative.
  - name: Glory Kill
    cost: 1CP
    description: Select one enemy operative. Until the end of the turning point, whenever
      a friendly BLOODED operative is shooting against, fighting against or retaliating
      against that enemy operative, its weapons have the Ceaseless weapon rule, or
      Relentless if that shooting, fighting or retaliating operative has one of your
      Blooded tokens.
  - name: Malevolent Grit
    cost: 1CP
    description: Whenever an operative is shooting a friendly BLOODED operative that
      has one of your Blooded tokens or is wholly within your opponent's territory,
      you can re-roll one of your defence dice.
  - name: Reckless Aspirant
    cost: 1CP
    description: Whenever a friendly BLOODED operative that's wholly within your opponent's
      territory and doesn't have one of your Blooded tokens is shooting or fighting,
      its weapons have the Accurate 1 weapon rule. Whenever a friendly BLOODED operative
      that has one of your blooded tokens is wholly within your opponent's territory,
      its weapons have the Punishing rule.
  firefight_ploys:
  - name: Callous Disregard
    cost: 1CP
    description: Use this firefight ploy when a friendly BLOODED operative performs
      the Shoot action and you're selecting a valid target. Having other Friendly
      BLOODED operatives within an enemy operative's control range doesn't prevent
      that enemy operative from being selected. Until the end of that action, whenever
      you discard an attack dice as a fail, inflict damage equal to the dice result
      on one friendly operative of your choice within control range of the target.
  - name: Dark Favour
    cost: 1CP
    description: Use this firefight ploy when a friendly BLOODED operative that has
      one of your Blooded tokens is selected as the valid target of a Shoot action
      or to fight against during the Fight action. Select one other friendly BLOODED
      operative visible to and within 3" of that first friendly operative to become
      the valid target or to be fought against (as appropriate) instead (even if it
      normally wouldn't be valid for this). If it's the Fight action, treat that other
      operative as being within the fighting operative's control range for the duration
      of that action. If it's the Shoot action, that other operative is only in cover
      or obscured if the original target was. This ploy has no effect if it's the
      Shoot action and the ranged weapon has the Blast or Torrent special rule.
  - name: Moment Of Respite
    cost: 1CP
    description: Use this firefight ploy during the activation of a friendly BLOODED
      operative that's under the GAZE OF THE GODS before or after it performs an action.
      Until the end of that operative's activation, add 1 to its APL stat.
  - name: Reward Earned
    cost: 1CP
    description: Use this firefight ploy when an enemy operative is incapacitated
      by a friendly BLOODED operative within 2" of it that has one of your Blooded
      tokens. You gain one Blooded token.
