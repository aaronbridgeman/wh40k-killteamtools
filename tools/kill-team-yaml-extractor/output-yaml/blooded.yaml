        select those grenades from equipment for other operatives). Whenever it's
        doing so, improve the Hit stat of that weapon by 1.
      cost: 0AP
    - name: Explosive Demise
      description: When this operative is incapacitated, before it's removed from
        the killzone, you can use this rule. If you do, roll two D6, or one D6 if
        this operative is within control range of an enemy operative. If any result
        is a 4+, inflict D3+2 damage on each operative visible to and within 2" of
        this operative. If this operative hasn't used its diabolyk bomb during the
        battle, inflict D6+2 damage instead.
