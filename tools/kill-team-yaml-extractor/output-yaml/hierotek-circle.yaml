    - name: Staff of light (melee)
      type: Melee
      a: 4
      bs_ws: 4+
      d: 3/5
      rules:
      - Rending
    rules:
    - name: have
      description: "Lethal 5+, Rending, Saturate, Severe. Note that if you select\
