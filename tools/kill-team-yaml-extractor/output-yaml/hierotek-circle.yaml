      cost: 0AP
  - name: Psychomancer
    stats:
      apl: 3
      mv: 6"
      sv: 3+
      w: 14
    weapons:
    - name: Abyssal lance (ranged)
      type: Melee
      a: 5
      bs_ws: 3+
      d: 2/2
      rules:
      - Blast 2"
      - 2" Devastating 1
      - Piercing 2
    - name: Abyssal lance (melee)
      type: Melee
      a: 4
      bs_ws: 4+
      d: 4/4
      rules:
      - Devastating 1
    rules:
    - name: Harbinger Of Despair
      description: "\U0001F7E2 Place your Despair marker visible to this operative,\
        \ or on Vantage terrain of a terrain feature that's visible to this operative.\
        \ When this operative is next activated, is incapacitated or this action is\
        \ performed again by a friendly operative (whichever comes first), remove\
        \ that marker. \U0001F7E2 Whenever an enemy operative is within 2\" of your\
        \ Despair marker, your opponent must spend 1 additional AP for that enemy\
        \ operative to perform the Pick Up Marker and mission actions. Whenever determining\
        \ control of a marker, treat the total APL stat of enemy operatives that contest\
        \ it as 1 lower if at least one of those enemy operatives is within 2\" of\
        \ your Despair marker. Note this isn't a change to the APL stat, so any changes\
        \ are cumulative with this. \U0001F534 This operative cannot perform this\
        \ action while within control range of an enemy operative."
      cost: 1AP
    - name: Nightmare Shroud
      description: "\U0001F7E2 Until the start of this operative's next activation,\
        \ until it's incapacitated or until this action is performed again by a friendly\
        \ operative (whichever comes first), whenever an enemy operative within 4\"\
        \ of this operative is shooting, fighting or retaliating, your opponent cannot\
        \ re-roll their attack dice and cannot retain attack dice as, or change attack\
        \ dice to, critical successes (critical successes must be retained as normal\
        \ successes instead). \U0001F534 This operative cannot perform this action\
        \ while within control range of an enemy operative."
      cost: 1AP
    - name: Vision Of Madness
      description: "\U0001F7E2 Select one enemy operative visible to this operative.\
        \ Until the start of this operative's next activation, until it's incapacitated\
        \ or until this action is performed again by a friendly operative (whichever\
        \ comes first), that selected operative gains one of your Madness tokens.\
        \ \U0001F7E2 Whenever your opponent would activate an enemy operative that\
        \ has one of your Madness tokens, you can"
      cost: 0AP
    - name: roll one D6
      description: "if the result is equal to or higher than that enemy operative's\
        \ APL, they cannot activate it during this activation. If that operative is\
        \ successfully activated, or there are no other enemy operatives eligible\
        \ to be activated, remove its Madness token. \U0001F534 This operative cannot\
        \ perform this action while within control range of an enemy operative."
      cost: 0AP
