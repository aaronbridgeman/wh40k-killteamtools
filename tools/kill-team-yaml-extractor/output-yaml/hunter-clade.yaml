team:
  name: Hunter Clade
  version: v1.4
  last_updated: 23 July 2025
  archetypes:
  - Recon
  - Seek And Destroy
  strategy_ploys:
  - name: Debilitating Irradiation
    cost: 1CP
    description: Whenever an enemy operative is shooting against, fighting against
      or retaliating against a friendly HUNTER CLADE VANGUARD operative, if that enemy
      operative is under the effects of the Rad-Saturation rule (see VANGUARD operatives),
      subtract 1 from the Normal Dmg stat of its weapons (to a min. of 3).
  - name: Neurostatic Interference
    cost: 1CP
    description: Whenever an enemy operative within 6" of a friendly HUNTER CLADE
      INFILTRATOR operative is shooting, fighting or retaliating, your opponent cannot
      re-roll their attack dice.
  - name: Scouting Protocol
    cost: 1CP
    description: Each friendly HUNTER CLADE RANGER operative that has a Conceal order
      and is more than 6" from enemy operatives can immediately perform a free Dash
      action (in any order). You cannot use this ploy during the first turning point.
  - name: Accelerant Agents
    cost: 1CP
    description: During each friendly HUNTER CLADE RUSTSTALKER operative's activation,
      it can perform two Fight actions, and one of them can be free.
  firefight_ploys:
  - name: Control Edict
    cost: 1CP
    description: Use this firefight ploy when it's your turn to activate a friendly
      operative. Select one friendly HUNTER CLADE LEADER operative and one other ready
      friendly HUNTER CLADE operative visible to and within 3" of that LEADER operative;
      activate one of them as normal. When that first friendly operative you activate
      is expended, you can activate the other friendly operative before your opponent
      activates. When that other operative is expended, your opponent then activates
      as normal. Whenever you use this ploy, you cannot select more than one HUNTER
      CLADE SICARIAN operative.
  - name: Scrapcode Overload
    cost: 1CP
    description: Use this firefight ploy when a friendly HUNTER CLADE INFILTRATOR
      operative is activated. Alternatively, use this firefight ploy when a friendly
      HUNTER CLADE INFILTRATOR operative, or an enemy operative within 3" of that
      friendly operative, would perform the Pick Up Marker or a mission action (excluding
      Operate Hatch ). Until the start of that friendly operative's next activation,
      whenever determining control of a marker, treat the total APL stat of enemy
      operatives that contest it as 1 lower if at least one of those enemy operatives
      is within 3" of that friendly operative. Note this isn't a change to the APL
      stat, so any changes are cumulative with this, and this can change control of
      a marker before performing the action.
  - name: Command Override
    cost: 1CP
    description: Use this firefight ploy when you activate a friendly HUNTER CLADE
      operative. Select a DOCTRINA IMPERATIVE for that operative to have instead of
      its current one (if any) until the Ready step of the next Strategy phase.
  - name: Omnissiah'S Imperative
    cost: 1CP
    description: "Use this firefight ploy during a friendly HUNTER CLADE operative's\
      \ activation. Alternatively, use it when an enemy operative is shooting a friendly\
      \ HUNTER CLADE operative, at the end of the Roll Attack Dice step. Until the\
      \ Ready step of the next Strategy phase, that operative has an additional rule\
      \ determined by its DOCTRINA IMPERATIVE : \u25CF Protector : This operative's\
      \ ranged weapons have the Severe weapon rule. \u25CF Conqueror : Whenever this\
      \ operative is fighting, after resolving your first attack dice, you can immediately\
      \ resolve another (before your opponent). \u25CF Bulwark : Improve this operative's\
      \ Save stat by 1. In addition, whenever an operative is shooting this operative,\
      \ you can collect and roll an additional defence dice. \u2018If you use this\
      \ ploy during a Shoot action, this operative's Save stat is changed immediately\
      \ (this takes precedence over the core rules). \u25CF Aggressor : Ignore first\
      \ vertical 2\" this operative moves during one climb up. \u25CF Neutral : None.\
      \ Note that you can use this ploy after rolling attack or defence dice for this\
      \ operative, or before or after retaining or re-rolling those dice."
