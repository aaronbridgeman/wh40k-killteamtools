      - Rending
    rules:
    - name: Canticle of Destruction
      description: Whenever a friendly HUNTER CLADE RUSTSTALKER operative within 3"
        of this operative is fighting, the first time you strike with a critical success
        during that sequence, inflict 1 additional damage.
      cost: 0AP
    - name: Wasteland Stalker
      description: Whenever an operative is shooting this operative, if you can retain
        any cover saves, you can retain one additional cover save, or you can retain
        one cover save as a critical success instead. This isn't cumulative with improved
        cover saves from Vantage terrain.
      cost: 0AP
    - name: Control Protocol
      description: You can use the Command Override firefight ploy for 0CP if the
        specified friendly HUNTER CLADE operative is visible to this operative.
      cost: 0AP
