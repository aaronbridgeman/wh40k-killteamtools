      - Shock
    rules:
    - name: Canticle of Shroudpsalm
      description: Whenever a friendly HUNTER CLADE INFILTRATOR operative is within
        3" of this operative, has a Conceal order and is in cover, that friendly operative
        cannot be selected as a valid target, taking precedence over all other rules
        (e.g. Seek, Vantage terrain) except being within 2".
      cost: 0AP
    - name: Control Protocol
      description: You can use the Command Override firefight ploy for 0CP if the
        specified friendly HUNTER CLADE operative is visible to this operative.
      cost: 0AP
  - name: Sicarian Ruststalker Princeps
    stats:
      apl: 2
