    d: 3/5
    rules:
    - Blast 2"
  - name: Barblauncher Rng 8" (Stationary)
    type: Ranged
    a: 5
    bs_ws: 4+
    d: 3/5
    rules:
    - Blast 2"
    - Ceaseless
    - Heavy
  - name: Claws & teeth
    type: Melee
    a: 3
    bs_ws: 4+
    d: 2/3
    rules: []
  rules:
  - name: Behaviour
    description: This NPO will move to an ideal position to shoot the enemy. When
      activated, if it can perform the Shoot action during that activation, give it
      an Engage order. If it cannot, give it a Conceal order. 1. Fall Back to cover.
      If possible, to a location where there's a valid target that isn't obscured,
      if not, to a location where there's an objective marker visible to this NPO.
      2. Shoot . 3. Reposition to cover. If possible, to a location where there's
      a valid target that isn't obscured, if not, to a location that's appropriate
      to better win the mission (a subsequent Dash action can fulfil these, if able).
      4. Dash to cover. If possible, to a location where there's a valid target that
      isn't obscured, if not, to a location that's appropriate to better win the mission.
    cost: 0AP
- name: C'Tan Shard Of The Nightbringer
  stats:
    apl: 3
    mv: 6"
    sv: 3+
    w: 14
  weapons:
  - name: Gaze of death
    type: Ranged
    a: 4
    bs_ws: 3+
    d: 5/0
    rules:
    - Rng 6"
    - Devastating 5
    - Severe
  - name: Scythe of the Nightbringer
    type: Melee
    a: 4
    bs_ws: 4+
    d: 4/5
    rules:
    - Severe
    - Shock
    - Stun
  rules:
  - name: Behaviour
    description: This NPO will move towards the enemy to fight them, but will shoot
      if it can't. 1. Fight . 2. Charge the closest player operative via the shortest
      possible route. 3. Shoot . 4. Reposition towards the closest player operative.
    cost: 0AP
  - name: Mighty Foe
    description: This operative cannot have a Conceal order and cannot be in cover,
      obscured, readied or expended (meaning it can activate multiple times per turning
      point and the turning point will end when all other operatives are expended).
    cost: 0AP
  - name: Whenever it's the NPOs' turn to activate, roll one D6
    description: on a 4+, activate this NPO (or skip the activation if it isn't in
      the killzone); on a 1-3, activate another ready NPO (or skip the activation
      if there aren't any in the killzone). This operative can perform two Fight actions
      during its activation, but cannot move more than 12" per turning point.
    cost: 0AP
  - name: Necrodermis
    description: This operative cannot be injured and its stats cannot be changed.
      Whenever an operative is shooting this operative, worsen the x of the Piercing
      weapon rule by 1 (if any). Note that Piercing 1 would therefore be ignored.
    cost: 0AP
  - name: Indomitable Reanimation
    description: Whenever this operative is incapacitated, before it's removed from
      the killzone, place a Reanimation marker underneath the centre of its base.
      Then remove it as incapacitated, also removing any tokens and rules effects
      it had (eg. Poison token). In the Ready step of the next Strategy phase, roll
    cost: 0AP
  - name: D3-1. After that many activations have been completed
    description: "\u25CF Set up this operative with an Engage order on the centre\
      \ of that Reanimation marker. If there are any operatives that prevent this,\
      \ set them up as though this operative ended a move there, (see Domineering\
      \ Presence below). \u25CF This operative regains all lost wounds. \u25CF Remove\
      \ that Reanimation marker."
    cost: 0AP
  - name: Domineering Presence
    description: This operative can move through parts of terrain features (including
      Wall terrain features) as if they were not there (taking precedence over the
      terrain feature's rules) but must end those moves in a location it can be placed.
      When this operative moves through Light terrain, remove that terrain from the
      killzone unless it's attached to Heavy terrain. This operative can move through
      operatives, and can end its move and be set up over their bases. If it does,
      remove those operatives from the killzone and set them up in a location they
      can be placed within control range of this operative (if possible) and as close
      to their previous position as possible.Whenever another operative is on Vantage
      terrain, if it's visible to and within 2" horizontally of this operative (or
      vice versa), it's within this operative's control range.
    cost: 0AP
