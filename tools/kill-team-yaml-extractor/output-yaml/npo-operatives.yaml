  rules:
  - name: Weapon Sentinel
    description: Whenever you're selecting a valid target, if this operative has a
      Conceal order, it cannot use Light terrain for cover. While this can allow this
      operative to be targeted (assuming it's visible), it doesn't remove its cover
      save (if any).
    cost: 0AP
  - name: Steadfast
    description: Whenever determining control of a marker, you can treat this operative's
      APL stat as 3. If you do, this takes precedence over all other rules, meaning
      any changes to its APL stat are ignored for this.
    cost: 0AP
  - name: '* Dimensional Banishment'
    description: After this operative uses this weapon, if you inflicted damage or
      retained any critical successes, if the target wasn't incapacitated, roll
    cost: 0AP
  - name: 2D6
    description: if the result is higher than the target's remaining wounds, the target
      is incapacitated.
    cost: 0AP
  - name: Behaviour
    description: See NECRON WARRIOR . Finally, if it has twin gauss reapers, it will
      always use the sweeping profile if it would target more than one player operative.
      1. Fight . 2. Shoot . 3. Reposition . If possible, to a location where there's
      a valid target that isn't obscured, if not, to a location that's appropriate
      for the NPOs to better win the mission (a subsequent Dash action can fulfil
      these, if able). 4. Dash . If possible, to a location where there's a valid
      target that isn't obscured, if not, to a location that's appropriate for the
      NPOs to better win the mission.
    cost: 0AP
