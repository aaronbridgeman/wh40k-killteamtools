- name: Canoptek Scarab Swarm
  stats:
    apl: 2
    mv: 6"
    sv: 5+
    w: 10
  weapons:
  - name: Feeder mandibles
    type: Melee
    a: 5
    bs_ws: 4+
    d: 1/2
    rules: []
  rules:
  - name: Behaviour
    description: This NPO will move towards the enemy to fight them, but will seek
      cover on its way. When activated, if it can perform either of its first two
      actions during that activation, give it an Engage order. If it cannot, give
      it a Conceal order. It will perform the Operate Hatch action where necessary
      to fulfil its behaviour. 1. Fight . 2. Charge the closest player operative via
      the shortest possible route. 3. Reposition towards the closest player operative,
      to cover if possible (a subsequent Dash action can fulfil this, if able). 4.
      Dash towards the closest player operative, to cover if possible. Kill Team Reference
      Sheet by James And The Giant Squig - v1.0 (updated 19 November 2025) TYPHON
      MISSION PACK THREAT PRINCIPLE
    cost: 0AP
  - name: When making decisions for NPOs, use the threat principle
    description: 'go with the option that''s worst for you. This can determine which
      ready NPO activates, how an NPO moves, shoots and fights, how to resolve their
      dice, etc. There are a few examples below (containing decisions in order of
      priority) that you can use as a guide, but if one option feels worse for you
      - in particular to stop you winning the mission - go with that. If you still
      cannot decide, randomly choose one. ACTIVATION PRIORITY Multiple NPOs are ready,
      so the player(s) activate the NPO that: 1. Can perform the Shoot or Fight action
      (as determined by its behaviour), and is the most threatening to do so (e.g.
      is more likely to incapacitate a player operative, is more likely to prevent
      the player(s) winning, etc.). 2. Is not in cover from a player operative. 3.
      Is closer to a player operative. SETTING UP NPOS NPOs must be set up as specified
      by the mission, but if there are multiple valid'
    cost: 0AP
  - name: options, the player(s) set up each NPO so that it's
    description: 1. More likely to prevent the player(s) winning. 2. Better able to
      perform the Charge , Shoot or Fight action (as determined by the higher priority
      of the NPOs behaviour). 3. Not a valid target. FIGHT ACTION An NPO performs
      the Fight action and multiple player operatives are within its
    cost: 0AP
  - name: control range. It fights the player operative that
    description: 1. It's more likely to incapacitate. 2. Is more likely to help the
      player(s) win. 3. Is ready. SHOOT ACTION An NPO performs the Shoot action and
      multiple player operatives are valid
    cost: 0AP
  - name: targets. It shoots the player operative that
    description: 1. It's more likely to incapacitate. 2. Is not obscured. 3. Is not
      in cover. 4. Is closest. 5. Is ready. NPO DATACARDS
    cost: 0AP
