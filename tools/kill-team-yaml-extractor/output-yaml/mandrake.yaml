team:
  name: Mandrake
  version: v1.2
  last_updated: 28 Jan 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Blade In The Dark
    cost: 1CP
    description: Each friendly MANDRAKE operative can perform the Charge action while
      it has a Conceal order if it starts or ends that action WITHIN SHADOW .
  - name: Creeping Horror
    cost: 1CP
    description: After each enemy operative's activation, before the next operative
      is activated, you can perform a free Dash action with one friendly MANDRAKE
      operative that has a Conceal order if it starts and ends that action WITHIN
      SHADOW . You cannot use this ploy during the first turning point, and each friendly
      operative can only be selected for this ploy once per turning point.
  - name: Gloaming Shroud
    cost: 1CP
    description: Whenever an operative is shooting a friendly MANDRAKE operative that's
      WITHIN SHADOW , you can retain one of your defence dice as a normal success
      without rolling it (in addition to a cover save, if any).
  - name: Inescapable Nightmare
    cost: 1CP
    description: Whenever a friendly MANDRAKE operative is shooting, fighting or retaliating,
      if it's WITHIN SHADOW you can re-roll one of your attack dice.
  firefight_ploys:
  - name: Nowhere To Hide
    cost: 1CP
    description: Use this firefight ploy during a friendly MANDRAKE operative's activation,
      when it performs an action in which it moves. Until the end of that activation,
      that operative can move through parts of terrain features as if they weren't
      there, but it cannot move more than its Move stat if it's the Charge action
      and must end those moves in a location it can be placed.
  - name: Shadow'S Bite
    cost: 1CP
    description: Use this firefight ploy when an enemy operative performs the Fight
      action in an activation in which it's performed the Charge action, and selects
      a friendly MANDRAKE operative WITHIN SHADOW to fight against. In the Resolve
      Attack Dice step of that sequence, you resolve the first attack dice (i.e, defender
      instead of attacker).
  - name: Slither Out Of Sight
    cost: 1CP
    description: Use this firefight ploy at the end of any operative's activation.
      Select one friendly MANDRAKE operative that has an Engage order and is WITHIN
      SHADOW . Change that operative's order to conceal.
  - name: Soul Feast
    cost: 1CP
    description: Use this firefight ploy when a friendly MANDRAKE operative is shooting
      against, fighting against or retaliating against an enemy operative within 6"
      of it, at the end of the Resolve Attack Dice Step. That friendly operative regains
      a number of lost wounds equal to that enemy operative's APL stat, multiplied
      by the number of your attack dice that inflicted damage during that sequence.
      Excess attack dice are ignored (i.e, if the enemy operative is incapacitated
      before remaining attack dice are resolved). You cannot use this ploy if that
      friendly MANDRAKE operative is incapacitated.
  operatives:
  - name: Nightfiend
    stats:
      apl: 2
      mv: 7"
      sv: 5+
      w: 9
    weapons:
    - name: Baleblast
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Soulstrike *
    - name: Huskblade
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/6
      rules:
      - Lethal 5+
      - Shock
    rules:
    - name: Harrowing Whispers
      description: Whenever your opponent would activate an enemy operative within
        6" of this operative, you can roll one D6 (you cannot do so if you already
        interrupted that operative's activation with this rule or the DIRGEMAW operative's
        Haunting Focus additional rule during this turning point). If the result is
        higher than the enemy operative's APL stat, they cannot activate it during
        this activation. If there are no other enemy operatives eligible to be activated,
        this rule has no effect.
      cost: 0AP
    - name: Oubliex
      description: Whenever this operative is readied, or if this operative incapacitates
        an enemy with its huskblade, its oubliex becomes active. Whenever it's oubliex
        is active and an attack dice would inflict damage on this operative, you can
        roll one D6, on a 5+ ignore the damage inflicted from that attack dice and
        the oubliex is no longer active.
      cost: 0AP
  - name: Abyssal
    stats:
      apl: 2
      mv: 7"
      sv: 5+
      w: 8
    weapons:
    - name: Balesurge (Blast)
      type: Ranged
      a: 5
      bs_ws: 3+
      d: 3/4
      rules:
      - Blast 2"
      - Soulstrike *
    - name: Balesurge (Burn)
      type: Melee
      a: 5
      bs_ws: 3+
      d: 3/4
      rules:
      - Lethal 5+
      - Soulstrike *
    - name: Glimmersteel blade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 4/5
      rules:
      - Lethal 5+
    rules:
    - name: Balefire
      description: Whenever a friendly MANDRAKE operative is shooting an enemy operative
        that has one of your Balefire tokens add 1 to both dmg stats of that friendly
        operative's ranged weapons and they have the Saturate weapon rule. Whenever
        an operative is shooting a friendly MANDRAKE operative that has one of your
        Balefire tokens, subtract 1 from both Dmg stats of that operative's ranged
        weapons (to a minimum of 1).
      cost: 1AP
    - name: Wreathe In Balefire
      description: "\U0001F7E2 Select one operative visible to this operative that\
        \ doesn't have one of your Balefire tokens. Until the start of this operative's\
        \ next activation, until it's incapacitated or until it performs this action\
        \ again (whichever comes first) that selected operative gains one of your\
        \ Balefire tokens. \U0001F534 This operative cannot perform this action while\
        \ within control range of an enemy operative."
      cost: 0AP
  - name: Chooser Of The Flesh
    stats:
      apl: 2
      mv: 7"
      sv: 5+
      w: 8
    weapons:
    - name: Baleblast
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Soulstrike *
    - name: Baleblade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 5/6
      rules:
      - Brutal
      - Lethal 5+
    rules:
    - name: Soul Harvest
      description: Whenever an enemy operative is incapacitated as a result of this
        operative's Part Collector rule or baleblade, you gain 1 Soul Harvest point,
        or two if the enemy operative had an APL stat of 3 or more. Whenever a friendly
        MANDRAKE operative is activated, you can spend 1 of your Soul Harvest points
        to either add 1 to its APL stat until the end of the battle, or to have it
        regain 2D3 lost wounds. Note you can spend your Soul Harvest points even if
        this operative is incapacitated.
      cost: 0AP
    - name: Part Collector
      description: Whenever an enemy operative performs the Fall Back action while
        within control range of this operative, you can use this rule. If you do,
        inflict 2D3 damage on that enemy operative before it moves.
      cost: 0AP
  - name: Dirgemaw
    stats:
      apl: 2
      mv: 7"
      sv: 5+
      w: 8
    weapons:
    - name: Baleblast
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Soulstrike *
    - name: Horrifying scream
      type: Ranged
      a: 5
      bs_ws: 2+
      d: 2/2
      rules:
      - Rng 6"
      - Devastating 2
      - Seek Light
      - Stun
    - name: Glimmersteel blade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 4/5
      rules:
      - Lethal 5+
    rules:
    - name: Haunting Focus
      description: STRATEGIC GAMBIT. Select one enemy operative. Until the ready step
        of the next strategy phase, it gains your Haunting Focus token. The next time
        your opponent would activate an enemy operative that has your Haunting Focus
        token, if this operative is ready, you can activate this operative first (you
        cannot do so if you also rolled to prevent that operative's activation with
        the NIGHTFIEND operative's Harrowing Whispers additional rule during this
        turning point). If you do, during that activation, this operative must fight
        against or shoot against that enemy operative, and cannot do so against any
        other enemy operatives until it does (if this isn't possible, the activation
        is cancelled). After completing this operative's activation, your opponent
        activates that enemy operative (if possible), or activates a different enemy
        operative if they can't.
      cost: 1AP
    - name: Pareidolic Projection
      description: "\U0001F7E2 Select one enemy operative that is a valid target for\
        \ this operative or is WITHIN SHADOW . Until the start of this operative's\
        \ next activation, until it's incapacitated or until it performs this action\
        \ again (whichever comes first), worsen the Hit stat of that enemy operative's\
        \ weapons by 1 and subtract 2\" from its Move stat (these aren't cumulative\
        \ with being injured). \U0001F534 This operative cannot perform this action\
        \ while within control range of an enemy operative, unless the only enemy\
        \ operative it's within control range of is selected for this action."
      cost: 0AP
  - name: Shadoweaver
    stats:
      apl: 2
      mv: 7"
      sv: 5+
      w: 8
    weapons:
    - name: Baleblast
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Soulstrike *
    - name: Glimmersteel blade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 4/5
      rules:
      - Lethal 5+
    rules:
    - name: Shadow Portal
      description: Whenever this operative performs the Reposition action using a
        SHADOW PASSAGE , you can use this rule. If you do so, remove your Shadow Portal
        markers from the killzone (if any), then place one of your Shadow Portal markers
        within this operative's control range before it's removed and one within its
        control range after it's set up. Each friendly MANDRAKE operative can use
        a SHADOW PASSAGE each turning point (taking precedence over one operative
        once per turning point). If one of your Shadow Portal markers is within that
        operative's control range when it's removed, and the other when it's set up.
        Note that friendly operatives can do this even if this operative has been
        incapacitated, and doing so doesn't prevent the operative from using a SHADOW
        PASSAGE in the normal manner.
      cost: 1AP
    - name: Weave Darkness
      description: "\U0001F7E2 Remove your Weave Darkness marker from the killzone\
        \ (if any). Then place your Weave Darkness marker visible to this operative,\
        \ or on Vantage terrain of a feature visible to this operative. That marker\
        \ creates an area of smoke with the same size and effects of a smoke grenade,\
        \ except you don't remove it during the following turning point. If this operative\
        \ is incapacitated, remove your Weave Darkness marker from the killzone. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative."
      cost: 0AP
  - name: Warrior
    stats:
      apl: 2
      mv: 7"
      sv: 5+
      w: 8
    weapons:
    - name: Baleblast
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Soulstrike *
    - name: Glimmersteel blade
      type: Melee
      a: 4
      bs_ws: 3+
      d: 4/5
      rules:
      - Lethal 5+
    rules:
    - name: Shadow Warrior
      description: Whenever this operative is WITHIN SHADOW , add 1 to the Critical
        Dmg stat of its glimmersteel blade.
      cost: 0AP
