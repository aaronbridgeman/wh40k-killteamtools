team:
  name: Exaction Squad
  version: v1.4
  last_updated: 28 Jan 2026
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Guilt Reveals Itself
    cost: 1CP
    description: Whenever you're selecting a valid target for a friendly EXACTION
      SQUAD operative, enemy operatives within 4" of it cannot be in cover (instead
      of 2"). While this can allow such operatives to be targeted (assuming they're
      visible), it doesn't remove their cover save (if any), unless the friendly EXACTION
      SQUAD operative is within 2" as normal.
  - name: Inviolate Jurisdiction
    cost: 1CP
    description: Whenever an operative is shooting a friendly EXACTION SQUAD operative
      that's within 2" of an objective marker or an enemy operative, you can re-roll
      one of your defence dice.
  - name: Dispense Justice
    cost: 1CP
    description: Whenever a friendly EXACTION SQUAD operative is fighting or retaliating,
      if it hasn't moved more than its Move stat during the activation, or if it's
      a counteraction, its melee weapons have the Ceaseless weapon rule.
  - name: Terminal Decree
    cost: 1CP
    description: Whenever a friendly EXACTION SQUAD operative is shooting an enemy
      operative within 6" of it, or whenever a friendly EXACTION SQUAD GUNNER operative
      is shooting, that friendly operative's ranged weapons have the Balanced weapon
      rule.
  firefight_ploys:
  - name: Long Arm Of The Emperor'S Law
    cost: 1CP
    description: Use this firefight ploy when a friendly EXACTION SQUAD operative
      is performing the Shoot action and you select a weapon with the Range x weapon
      rule (excluding frag or krak grenade). Until the end of that action, add 3"
      to x.
  - name: Exact Punishment
    cost: 1CP
    description: Use this firefight ploy after an enemy operative shoots against or
      fights against a friendly EXACTION SQUAD operative within 6" of it, and that
      friendly operative isn't incapacitated as a result. That friendly operative
      can immediately perform either a free Shoot or a free Fight action, but other
      enemy operatives cannot be selected as a valid target or to fight against during
      that action (note that secondary targets from the Blast weapon rule can still
      be targeted).
  - name: Brutal Backup
    cost: 1CP
    description: Use this firefight ploy during a friendly EXACTION SQUAD operative's
      activation, before or after it performs an action. Select one enemy operative
      within its control range. One other friendly EXACTION SQUAD operative can immediately
      perform a free Fight action, but it can only fight against that enemy operative.
  - name: Execution Order
    cost: 1CP
    description: Use this firefight ploy when an enemy operative performs a mission
      action (excluding Operate Hatch ). Alternatively, use it at the end of the Firefight
      phase and select one enemy operative that controls an objective marker. In either
      case, the next time your opponent would activate that enemy operative, you can
      interrupt that activation and activate a ready friendly EXACTION SQUAD operative.
      If you do, during that activation, that friendly operative must fight against
      or shoot against that enemy operative, and cannot do so against any other enemy
      operatives until it does (if this isn't possible, that friendly operative's
      activation is cancelled). After completing that friendly operative's activation,
      continue that enemy operative's activation (if possible). You cannot use this
      ploy again until that enemy operative is activated or incapacitated.
