        \ of a marker, treat the total APL stat of enemy operatives that contest it\
        \ as 1 lower if at least one of those enemy operatives is within 3\" of your\
        \ Nuncio-aquila marker (or this operative if your Nuncio-aquila marker isn't\
        \ in the killzone). Note this isn't a change to the APL stat, so any changes\
        \ are cumulative with this. DEPLOY"
      cost: 0AP
