  name: Ratlings
  version: v1.6
  last_updated: 29 Apr 2026
  archetypes:
  - Infiltration
  - Security
  strategy_ploys:
  - name: Sniper Positions
    cost: 1CP
    description: Whenever a friendly RATLING operative is more than 6" from enemy
      operatives and within 1" of Heavy terrain, the stationary profile of its rifle
      (if any) has the Silent weapon rule.
  - name: Crack Shots
    cost: 1CP
    description: Whenever a friendly RATLING operative is shooting an enemy operative
      more than 6" from it, if that friendly operative hasn't performed the Charge
      , Fall Back or Reposition action during the activation, or it's a counteraction,
      its rifle (if any) has the Balanced weapon rule.
  - name: Shifty
    cost: 1CP
    description: Whenever a friendly RATLING operative (excluding OGRYN or BULLGRYN
      ) has a Conceal order and is in cover, it cannot be selected as a valid target,
      taking precedence over all other rules (e.g. Vantage terrain).
  - name: Frontline Assault
    cost: 1CP
    description: Whenever a friendly RATLING BULLGRYN or friendly RATLING OGRYN operative
      is shooting within, fighting within or retaliating within your opponent's territory
      or within 3" of an objective marker, its weapons have the Balanced weapon rule.
  firefight_ploys:
  - name: Survival Instincts
    cost: 1CP
    description: Use this firefight ploy when an enemy operative is shooting or fighting
      a friendly RATLING operative (excluding OGRYN or BULLGRYN ) and you are allocating
      a dice normal success, it can block one unresolved critical success; block.
      If it's a if it's a critical success, it can block two unresolved successes
      (normal or critical).
  - name: Sharpshot
    cost: 1CP
    description: Use this firefight ploy when a friendly RATLING operative is performing
      the Shoot action with a rifle and you are selecting a valid target. Having other
      friendly RATLING operatives within an enemy operative's control range doesn't
      prevent that enemy operative from being selected.
  - name: Larcenous
    cost: 1CP
    description: Use this firefight ploy during a friendly RATLING operative's activation
      (excluding OGRYN or BULLGRYN ). Until the end of that activation, that operative
      doesn't have to control a marker to perform the Pick Up Marker or mission actions
      that usually require this (taking precedence over that action's conditions -
      it only needs to contest the marker), and having an enemy operative within control
      range of it doesn't prevent it from doing so.
  - name: Shoot And Hide
    cost: 1CP
    description: Use this firefight ploy after a friendly RATLING operative that has
      an Engage order performs the Shoot action with a rifle. If it's more than 3"
      from enemy operatives, or not visible to every enemy operative, you can change
      its order to Conceal.
