      cost: 0AP
    - name: Brute
      description: Whenever your opponent is selecting a valid target, if this operative
        has a Conceal order, it cannot use Light terrain for cover. Whilst this can
        allow this operative to be targeted (if it's visible), it doesn't remove its
        cover save (if any).
      cost: 0AP
    - name: Slow-witted
