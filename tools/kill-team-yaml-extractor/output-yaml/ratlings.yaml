    rules:
    - name: Early Warning
      description: Once per turning point, after an enemy operative performs an action
        in which it moves or is set up, you can interrupt to use this rule. If you
        do, each friendly RATLING operative (excluding OGRYN and BULLGRYN ) within
        6" of this operative and within 2" of that enemy operative can perform a free
        Dash action or a free Fall Back action, but it cannot move more than 3". In
        either case, each one cannot finish that move within 2" of an enemy operative
        unless it's not visible to every enemy operative when it finishes that move
        (if this isn't possible for an operative, it cannot move).
      cost: 0AP
    - name: Beast
      description: This operative cannot perform any actions other than Charge , Dash
        , Fall Back , Fight and Reposition . It cannot use any weapons that aren't
        on its datacard.
      cost: 0AP
