      description: Whenever this operative performs the Charge , Fall Back or Reposition
        action, it can warp jump. If it does, don't move it, instead remove it from
        the killzone and set it back up wholly within 7" of its original location,
      cost: 0AP
    - name: measuring the horizontal distance only (in Killzone
      description: Gallowdark, this distance can be measured through walls). Unless
        it's the Charge action, it cannot be set up within control range of an enemy
        operative.
      cost: 0AP
    - name: Slicing Attack
      description: Whenever this operative performs the Reposition action with a warp
        jump (see Blink Pack), you can use this rule. If you do, after it moves, draw
        an imaginary line 1mm in diameter and up to 7" long between it and its previous
        location. Note this doesn't have to be a straight line. Inflict D3+2 damage
        on one enemy operative that line crosses. You cannot inflict damage on an
        enemy operative that was not visible to this operative at the start of that
        action. A 28mm round marker can be temporarily placed underneath this operative
        before it moves to help determine this.
      cost: 0AP
