      cost: 0AP
    - name: Erudite Hunter
      description: STRATEGIC GAMBIT . Select one enemy operative within 9" of this
        operative. Once during this turning point, during that enemy operative's activation,
        after it performs an action in which it moves, you can interrupt and perform
        either a free Reposition action with this operative (it cannot end that move
        further from that enemy operative) or a free Charge action with this operative
        (you can change its order to do so, and it must end that move within control
        range of that enemy operative).
      cost: 0AP
