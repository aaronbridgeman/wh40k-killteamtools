      description: This operative can perform a 1AP action for free during their activation
        as a result of the Aeldari Raiders rule (instead of the Dash action).
      cost: 0AP
    - name: One Step Ahead
      description: Once per battle, after an enemy operative performs an action, if
        this operative is ready, you can use this rule. If you do so, roll one D6,
        if the result is higher than that enemy operative's APL stat, you can interrupt
        and immediately perform either a free Shoot or a free Fight action with this
        operative, but other enemy operatives cannot be selected as a valid target
        or to fight against during that action (note that secondary targets from the
        Blast weapon rule can still be targeted). After you perform that action, subtract
        1 from this operative's APL stat until the end of its next activation.
      cost: 0AP
