team:
  name: Corsair Voidscarred
  version: v1.4
  last_updated: 28 Jan 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Mobile Engagements
    cost: 1CP
    description: Whenever an operative is shooting a friendly CORSAIR VOIDSCARRED
      operative that performed an action in which it moved during this turning point,
      you can re-roll one of your dice.
  - name: Outcasts
    cost: 1CP
    description: Whenever a friendly CORSAIR VOIDSCARRED operative is more than 5"
      from other friendly operatives, its weapons have the Punishing weapon rule.
  - name: Piratical Profiteers
    cost: 1CP
    description: Whenever a friendly CORSAIR VOIDSCARRED operative is shooting, fighting
      or retaliating, if it or the enemy operative in that sequence contests an objective
      marker or one of your mission markers, that operative's weapons have the Balanced
      weapon rule.
  - name: Plunderers
    cost: 1CP
    description: Up to D3 friendly CORSAIR VOIDSCARRED operatives can immediately
      perform a free Dash action in an order of your choice. This turning point, each
      that does so cannot perform the Dash action during their activation. You cannot
      use this ploy during the first Turning point.
  firefight_ploys:
  - name: Capricious Flight
    cost: 1CP
    description: Use this firefight ploy during a friendly CORSAIR VOIDSCARRED operative's
      activation, before or after it performs an action. During that activation, that
      operative can perform the Fall Back action for 1 less AP.
  - name: Contemptuous Adventurer
    cost: 1CP
    description: Use this firefight ploy when you activate your first friendly CORSAIR
      VOIDSCARRED operative during the turning point, if it's more than 5" from other
      friendly operatives. The first time that operative performs either the Shoot
      or Fight action during that activation, its weapons have the Relentless weapon
      rule. Note this ploy cannot come into effect more than once per activation (you
      cannot use it during both the Shoot and Fight action in the same activation).
  - name: Light Fingers
    cost: 1CP
    description: Use this firefight ploy during a friendly CORSAIR VOIDSCARRED operative's
      activation. Until the end of that activation, having an enemy operative within
      its control range doesn't prevent that friendly operative from performing the
      Pick Up Marker or mission actions.
  - name: Opportunistic Fighters
    cost: 1CP
    description: Use this Firefight ploy when an enemy operative performs the Fall
      Back action. Before it moves, inflict 2D3 damage on that operative for each
      friendly CORSAIR VOIDSCARRED operative within its control range.
