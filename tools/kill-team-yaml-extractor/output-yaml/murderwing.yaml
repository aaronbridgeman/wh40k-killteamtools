      description: Resolve the rule, then this operative gains 1 Damnation point.
      cost: 0AP
    - name: "\u25CF Equal"
      description: Do not resolve the rule.
      cost: 0AP
    - name: "\u25CF Less"
      description: Inflict damage on this operative equal to its number of Damnation
        points and do not resolve the rule. If this operative has 6 Damnation points,
        resolve the rule without rolling. Note that you cannot make an attempt more
        than once per action, regardless of the D6 result.
      cost: 0AP
