team:
  name: Murderwing
  version: v1.2
  last_updated: 29 Apr 2026
  archetypes:
  - Recon
  - Seek & Destroy
  strategy_ploys:
  - name: Predators Above
    cost: 1CP
    description: Whenever a friendly MURDERWING operative is at least 2" higher than
      the killzone floor, its weapons have the Balanced weapon rule. Whenever a friendly
      MURDERWING operative does a BOOST , its weapons have the Balanced weapon rule
      until the end of that activation.
  - name: Cull The Weak
    cost: 1CP
    description: "Whenever a friendly MURDERWING operative is shooting or fighting,\
      \ its weapons have the Punishing weapon rule if any of the following are true\
      \ for the operative that friendly operative is shooting or fighting against:\
      \ \u25CF It's at least 2\" lower than that friendly operative. \u25CF Its APL\
      \ stat is less than normal. \u25CF It was wounded at the start of the activation/counteraction."
  - name: Nightmare On High
    cost: 1CP
    description: Whenever an operative is shooting a friendly MURDERWING operative
      that's at least 2" higher than the killzone floor, or that did a BOOST during
      this turning point, you can re-roll one of your defence dice.
  - name: Instil Fear
    cost: 1CP
    description: Whenever a friendly MURDERWING operative is fighting, Normal Dmg
      of 3 or more inflicts 1 less damage on it.
  firefight_ploys:
  - name: Malicious Narcissism
    cost: 1CP
    description: Use this firefight ploy when it's your turn to activate with a friendly
      operative, if only one friendly MURDERWING operative is ready. Until the end
      of the turning point, whenever you have less ready friendly operatives than
      your opponent, you can skip your activations (in other words, you can delay
      that friendly MURDERWING operative's activation until your opponent has only
      one ready operative). Note that you cannot counteract until that friendly MURDERWING
      operative is expended.
  - name: Murderous Descent
    cost: 1CP
    description: Use this firefight ploy when an enemy operative ends the Charge ,
      Dash , Fall Back or Reposition action within 3" horizontally and more than 2"
      lower than a friendly MURDERWING operative (or in close quarters, within 2"
      and that enemy operative must be in a different room to where it started that
      action). Interrupt that enemy operative's activation/counteraction and immediately
      perform a free Charge action with that friendly operative. It must end that
      action within control range of that enemy operative. If this isn't possible,
      the interruption is cancelled and this rule hasn't been used.
  - name: Long Forgotten Honour
    cost: 1CP
    description: Use this firefight ploy when a friendly MURDERWING operative is fighting
      or retaliating, when you resolve a critical success. Instead of striking or
      blocking, end that sequence (any remaining attack dice are discarded) and immediately
      perform a free Fall Back action up to 3" with that operative (then the Fight
      action ends). That operative can do so even if it's performed an action that
      prevents it from performing the Fall Back action.
  - name: Wings Of Darkness
    cost: 1CP
    description: Use this firefight ploy when a friendly MURDERWING operative is performing
      the Fall Back or Reposition action, when it does a BOOST . That operative can
      be set up an additional 3" away during that BOOST (adding this to the permitted
      move distance), but it cannot perform the Shoot , Fight or Carving Blow (see
      DEPREDATOR operative) action until the next turning point. You cannot use this
      ploy during the first turning point.
