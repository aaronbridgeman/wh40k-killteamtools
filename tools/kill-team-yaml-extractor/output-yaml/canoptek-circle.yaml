team:
  name: Canoptek Circle
  version: v1.4
  last_updated: 29 Apr 2026
  archetypes:
  - Recon
  - Security
  strategy_ploys:
  - name: Hypershielding
    cost: 1CP
    description: Whenever an operative is shooting a friendly CANOPTEK CIRCLE operative,
      if your OBELISK NODE MATRIX is intervening, or that friendly operative is within
      your OBELISK NODE MATRIX , you can re-roll any of your defence dice results
      of one result (e.g. results of 2).
  - name: Transdynamic Amplification
    cost: 1CP
    description: Whenever a friendly CANOPTEK CIRCLE operative is shooting, if your
      OBELISK NODE MATRIX is intervening, or the target is within your OBELISK NODE
      MATRIX , that friendly operative's weapons have the Ceaseless weapon rule.
  - name: Cryptogravitic Repulsion
    cost: 1CP
    description: Once per action, the first time an enemy operative would move within
      your OBELISK NODE MATRIX , the distance is treated as an additional 1". Note
      this means if that enemy operative doesn't have sufficient move distance (e.g.
      it's at the end of its move), that operative cannot move within your OBELISK
      NODE
  - name: Souldrain
    cost: 1CP
    description: Whenever an enemy operative is within your OBELISK NODE MATRIX ,
      or whenever it's fighting or retaliating against a friendly CANOPTEK CIRCLE
      operative that's within your OBELISK NODE MATRIX , subtract 1 from both Dmg
      stats of that enemy operative's melee weapons (to a minimum of 2) until the
      end of the activation/ counteraction. Note this means if the enemy operative
      moves through your OBELISK NODE MATRIX , apply this change at the end of that
      move action until the end of the activation/ counteraction.
  firefight_ploys:
  - name: Animate Obelisk Nodes
    cost: 1CP
    description: Use this firefight ploy when it's your turn to activate or counteract.
      Move any number of your OBELISK NODE markers instead. They can move up to 6"
      horizontally combined, and distances are always rounded up to the nearest inch
      (so if you move a marker 1.5", it's treated as moving it 2"). For example, you
      could move one marker 6", three markers 1" each, or any combination that doesn't
      exceed 6" in total. You can also move them 0" (to effectively skip an activation).
      In any case, your opponent activates as normal afterwards.
  - name: Shield Flare
    cost: 1CP
    description: Use this firefight ploy when an attack dice inflicts Normal Dmg on
      a friendly CANOPTEK CIRCLE operative. If your OBELISK NODE MATRIX is intervening,
      or that friendly operative is within your OBELISK NODE MATRIX , ignore that
      inflicted damage. Note your opponent determines intervening (i.e. where on their
      operative's base to draw the targeting lines from).
  - name: Nodal Response
    cost: 1CP
    description: Use this firefight ploy during a friendly CANOPTEK CIRCLE operative's
      activation, before or after it performs an action. You can either change one
      of the strategy ploys you used during this turning point (only pay additional
      CP if that ploy costs more), or use a strategy ploy now (pay its CP cost as
      normal).
  - name: Sacrificial Thrall
    cost: 1CP
    description: Use this firefight ploy when a friendly CANOPTEK CIRCLE GEOMANCER
      operative is selected as the valid target of a Shoot action or to fight against
      during the Fight action. Select one other friendly CANOPTEK CIRCLE CANOPTEK
      operative visible to and within 3" of that first friendly operative to become
      the valid target or to be fought against (as appropriate) instead (even if it
      wouldn't normally be valid for this). If it's the Fight action, treat that other
      operative as being within the fighting operative's control range for the duration
      of that action. If it's the Shoot action, that other operative is only in cover
      or obscured if the original target was. This ploy has no effect if it's the
      Shoot action and the ranged weapon has the Blast or Torrent weapon rule.
  operatives:
  - name: Geomancer
    stats:
      apl: 3
      mv: 6"
      sv: 3+
      w: 14
    weapons:
    - name: Tremorglaive (Part matter)
      type: Melee
      a: 4
      bs_ws: 3+
      d: 4/5
      rules:
      - Piercing 1
      - Piercing Crits 2
    - name: Tremorglaive (Quake)
      type: Melee
      a: 5
      bs_ws: 3+
      d: 1/2
      rules:
      - Blast 2". Seek Light
      - Stun
    - name: Tremorglaive
      type: Melee
      a: 4
      bs_ws: 4+
      d: 4/5
      rules:
      - Severe
      - Shock
      - Stun
    rules:
    - name: Obelisk Node Control
      description: Whenever this operative would perform a mission action (excluding
        Retrieve , Approved Ops 2025), if it requires this operative to control an
        objective marker, you can instead determine control from one of your OBELISK
        NODE markers (see Obelisk Node Matrix faction rule). Whenever this operative
        would perform the Operate Hatc h action, you can open or close a hatchway
        thats access point is within 1" of one of your OBELISK NODE markers instead.
        Note that you must still fulfil the Operate Hatch action's conditions.
      cost: 1AP
    - name: Geomantic Disturbance
      description: "\U0001F7E2 Select a point on a terrain feature; that point must\
        \ be visible to and within 8\" of this operative. Separately roll 2D6 for\
        \ each operative within 2\" of that point. If the result is higher than that\
        \ operative's remaining wounds, inflict damage on it equal to the difference.\
        \ \U0001F534 This operative cannot perform this action while it has a Conceal\
        \ order, or while within control range of an enemy operative."
      cost: 1AP
    - name: Canoptek Control
      description: "\U0001F7E2 SUPPORT . Select one friendly CANOPTEK CIRCLE CANOPTEK\
        \ operative visible to and within 6\" of this operative. Alternatively, you\
        \ can select one friendly CANOPTEK CIRCLE CANOPTEK operative that's visible\
        \ to this operative and within your OBELISK NODE MATRIX ( SUPPORT doesn't\
        \ apply to this selection). That selected operative can immediately perform\
        \ a 1AP action for free; during that action, it cannot move more than 2\"\
        , or must be set up wholly within 2\" if it's removed and set up again. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative, or while counteracting."
      cost: 1AP
    - name: Molecular Breach
      description: "\U0001F7E2 SUPPORT . Select one friendly CANOPTEK CIRCLE operative\
        \ visible to and within 6\" of this operative. Alternatively, you can select\
        \ one friendly CANOPTEK CIRCLE operative visible to this operative and within\
        \ your OBELISK NODE MATRIX ( SUPPORT doesn't apply to this selection). \U0001F7E2\
        \ The next time the selected operative performs an action in which it moves,\
        \ don't move it. Instead, remove it from the killzone and set it back up wholly\
        \ within a distance equal to its Move stat (or 3\" if it was a Dash ) horizontally\
        \ of its original location (in a killzone that uses"
      cost: 0AP
    - name: the close quarters rules, e.g. Killzone
      description: "Tomb World, this distance can be measured over and through Wall\
        \ terrain and the operative can be set up on the other side). Note that it\
        \ gains no additional distance when performing the Charge action. It must\
        \ be set up in a location it can be placed, and unless it's the Charge action,\
        \ it cannot be set up within control range of an enemy operative. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative."
      cost: 0AP
