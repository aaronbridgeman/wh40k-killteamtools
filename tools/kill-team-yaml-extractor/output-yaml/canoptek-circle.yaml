    rules:
    - name: '* Dimensional Banishment'
      description: After this operative uses this weapon, if you inflicted damage
        or retained any critical successes, if the target wasn't incapacitated, roll
      cost: 0AP
    - name: 2D6
      description: if the result is higher than the target's remaining wounds, the
        target is incapacitated (taking precedence over rules that prevent incapacitation,
        e.g. Medic!, FELLGOR RAVAGER Frenzy) and your opponent cannot place a Reanimation
        marker ( HIEROTEK CIRCLE ) for that operative, if relevant.
      cost: 0AP
    - name: Weapon Sentinel
      description: Whenever your opponent is selecting a valid target, if this operative
        has a Conceal order, it cannot use Light terrain for cover. While this can
        allow this operative to be targeted (assuming it's visible), it doesn't remove
        its cover save (if any).
      cost: 0AP
    - name: Steadfast
      description: Whenever determining control of a marker, you can treat this operative's
        APL stat as 3. If you do, this takes precedence over all other rules, meaning
        any changes to its APL stat are ignored for this.
      cost: 0AP
