    stats:
      apl: 2
      mv: 7"
      sv: 4+
      w: 7
    weapons:
    - name: Atomiser beam
      type: Ranged
      a: 4
      bs_ws: 4+
      d: 3/4
      rules:
      - Rng 6"
      - Lethal 5+
    - name: Claws & tail
      type: Melee
      a: 4
      bs_ws: 4+
      d: 3/4
      rules: []
    rules:
    - name: Reanimate
      description: Once per turning point, when another friendly CANOPTEK CIRCLE operative
        would be incapacitated, if that operative is visible to and within 6" of this
        operative, or if this and that operative are within your OBELISK NODE MATRIX
        , you can use this rule, providing neither this nor that operative is within
        control range of an enemy operative. If you do, that friendly operative isn't
        incapacitated, has 1 wound remaining and cannot be incapacitated for the remainder
        of the action. After that action, that friendly operative can immediately
        perform a free Dash action, but must end that action within this operative's
        control range or within your OBELISK NODE MATRIX . Subtract 1 from this and
        that operative's APL stats until the end of their next activations respectively,
        and if this rule was used during that friendly operative's activation, that
        activation ends. You cannot use this rule if this operative is incapacitated,
        or if it's a Shoot action and this operative would be a primary or secondary
        target.
      cost: 1AP
    - name: Nanoscarab Beam
      description: "\U0001F7E2 Select one friendly CANOPTEK CIRCLE operative visible\
        \ to and within 6\" of this operative. Alternatively, if this operative is\
        \ within your OBELISK NODE MATRIX , you can select one other friendly CANOPTEK\
        \ CIRCLE operative within your OBELISK NODE MATRIX . The selected operative\
        \ regains up to 3D3 lost wounds. It cannot be an operative that the Reanimate\
        \ rule was used on during this turning point. \U0001F534 This operative cannot\
        \ perform this action while within control range of an enemy operative, or\
        \ more than once per turning point."
      cost: 0AP
