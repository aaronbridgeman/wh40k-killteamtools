    rules:
    - name: Shield Generator
      description: "\u25CF This operative ignores the Piercing weapon rule. \u25CF\
        \ Once per turning point, when an attack dice inflicts Normal Dmg on this\
        \ operative, you can ignore that inflicted damage. \u25CF You can use the\
        \ Saviour Protocols firefight ploy for 0CP if this is the specified DRONE\
        \ operative. MV7 MARKER DRONE"
      cost: 0AP
    - name: High-intensity Markerlight
      description: Whenever this operative performs the Markerlight action, the selected
        enemy operative gains two of your Markerlight tokens (instead of one).
      cost: 1AP
    - name: Markerlight
      description: See SHAS'UI . MV31 PULSE ACCELERATOR DRONE
      cost: 1AP
    - name: Pulse Accelerator
      description: "\U0001F7E2 Until the start of this operative's next activation\
        \ or until it's incapacitated (whichever comes first), whenever another friendly\
        \ PATHFINDER operative is shooting with a pulse weapon within 3\" of this\
        \ operative, that weapon has the Lethal 5+ and Severe weapon rules. MV33 GRAV-INHIBITOR\
        \ DRONE"
      cost: 0AP
    - name: Grav-inhibitor
      description: "\u25CF Whenever an enemy operative performs an action in which\
        \ it moves (excluding Dash ), if it would move visible to and within 6\" of\
        \ this operative, treat the distance as an additional 2\" and ignore the additional\
        \ distances from the Obstructing and Accessible terrain rules. \u25CF Whenever\
        \ an enemy operative is fighting or retaliating while visible to and within\
        \ 6\" of this operative, worsen the Hit stat of that enemy operative's melee\
        \ weapons by 1. This is cumulative with being injured. Kill Team Reference\
        \ Sheet by James And The Giant Squig - Version 1.4 (updated 28 Jan 2026) PATHFINDERS"
      cost: 0AP
