team:
  name: Pathfinders
  version: v1.4
  last_updated: 28 Jan 2026
  archetypes:
  - Infiltration
  - Recon
  strategy_ploys:
  - name: Recon Sweep
    cost: 1CP
    description: Select one killzone edge (excluding your own). Each friendly PATHFINDER
      operative that's wholly within 6" of that edge can immediately perform a free
      Dash action in an order of your choice, but each that does so must end that
      move wholly within 6" of a killzone edge (excluding your own). You cannot use
      this ploy during the first turning point.
  - name: Suppressing Fire
    cost: 1CP
    description: Whenever an enemy operative is performing the Shoot action, if the
      target (the primary target if the weapon has the Blast or Torrent weapon rules)
      isn't the closest valid target, your opponent cannot re-roll their attack dice.
      Ignore friendly PATHFINDER operatives that have a Conceal order or are obscured
      when determining this.
  - name: Bonded
    cost: 1CP
    description: Whenever a friendly PATHFINDER operative (excluding DRONE ) is shooting
      or retaliating with a ranged weapon (see Point-Blank Fusillade firefight ploy),
      if it's within 3" of another friendly PATHFINDER operative (excluding DRONE
      ), that first friendly operative's ranged weapons have the Accurate 1 weapon
      rule.
  - name: Take Cover
    cost: 1CP
    description: Whenever an operative is shooting a friendly PATHFINDER operative,
      if you can retain any cover saves, improve that friendly operative's Save stat
      by 1.
  firefight_ploys:
  - name: A Worthy Cause
    cost: 1CP
    description: Use this firefight ploy at the start of the Firefight phase. A friendly
      PATHFINDER operative (excluding DRONE ) can immediately perform a free mission
      action.
  - name: Supporting Fire
    cost: 1CP
    description: Use this firefight ploy when a friendly PATHFINDER operative is performing
      the Shoot action and you're selecting a valid target within 6" of it. Having
      other friendly PATHFINDER operatives within an enemy operative's control range
      doesn't prevent that enemy operative from being selected.
  - name: Saviour Protocols
    cost: 1CP
    description: Use this firefight ploy when a friendly PATHFINDER operative (excluding
      DRONE ) is selected as the valid target of a Shoot action. Select one friendly
      PATHFINDER DRONE operative visible to and within 3" of that first friendly operative
      to become the valid target instead (even if it wouldn't normally be valid for
      this). That friendly DRONE operative is only in cover or obscured if the original
      target was. This ploy has no effect if the ranged weapon has the Blast or Torrent
      weapon rule.
  - name: Point-Blank Fusillade
    cost: 1CP
    description: "Use this firefight ploy when a friendly PATHFINDER operative (excluding\
      \ DRONE ) is retaliating, if it wasn't within control range of enemy operatives\
      \ at the start of that activation/ counteraction. You can use one of its ranged\
      \ weapons as a melee weapon (excluding a weapon that has the word \u2018grenade'\
      \ in its name) during that sequence. If you do, you cannot block during that\
      \ sequence, and the following weapon rules have no effect on its weapons until\
      \ the end of that sequence: Devastating, Piercing, Torrent. If that friendly\
      \ operative is ready, has an Engage order and is retaliating with a pulse weapon,\
      \ you resolve the first attack dice (i.e. defender instead of attacker)."
