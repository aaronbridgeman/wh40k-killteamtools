      - Rending
    rules:
    - name: Mandiblasters
      description: (see STRIKING SCORPION EXARCH above). Kill Team Reference Sheet
        by James And The Giant Squig - v1.5 (updated 29 Apr 2026) BLADES OF KHAINE
        DIRE AVENGERS - ASPECT TECHNIQUES THE SLICING HURRICANE Use this ASPECT TECHNIQUE
        when a friendly DIRE AVENGER operative is performing the Reposition action.
        That operative can perform the Shoot action during that action (it must do
        so in a location it can be placed, and any remaining move distance it had
        from that Reposition action can be used after it does so). You must select
        its shuriken catapult, shuriken pistol or twin shuriken catapult for that
        Shoot action. DEATH OF A THOUSAND BLADES Use this ASPECT TECHNIQUE when a
        friendly DIRE AVENGER operative is performing the Shoot action and you select
        a shuriken catapult or twin shuriken catapult. Until the end of that action,
        that weapon has the Torrent 2" weapon rule, but you cannot select more than
        one secondary target. VIGILANCE OF THE AVENGER Use this ASPECT TECHNIQUE when
        a friendly DIRE AVENGER operative is performing the Shoot action and you select
        a shuriken catapult or twin shuriken catapult. Until the end of that action,
        that weapon has the Lethal 5+ weapon rule. UNSTINTING, IMMOVABLE Use this
        ASPECT TECHNIQUE when an operative is shooting a friendly DIRE AVENGER operative,
        and you've rolled two or more fails. You can discard one of them to retain
        the other as a normal success instead. RAGING HEAT OF THE DYING FLAME Use
        this ASPECT TECHNIQUE during a friendly DIRE AVENGER operative's activation.
        Until the start of that operative's next activation, you can ignore any changes
        to its stats from being injured (including its weapons' stats).
      cost: 0AP
