    - name: Defence Tactics
      description: Whenever this operative contests an objective marker or one of
        your mission markers, or whenever it's shooting an enemy operative that does,
        this operative's weapons have the Balanced weapon rule. HOWLING BANSHEES -
        ASPECT TECHNIQUES THE WOE Use this ASPECT TECHNIQUE during a friendly HOWLING
        BANSHEE operative's activation, after it's performed the Charge action and
        incapacitated an enemy operative during the Fight action, and is no longer
        within control range of enemy operatives. That friendly operative can immediately
        perform a free Charge action using any remaining move distance it had from
        that first Charge action. That operative can perform two Charge actions during
        its activation to do so. The operative cannot have performed any other actions
        during this activation (but can do so after resolving this ASPECT TECHNIQUE
        ). RAIN OF TEARS Use this ASPECT TECHNIQUE when a friendly HOWLING BANSHEE
        operative is fighting, after you strike with a critical success, if the enemy
        operative isn't incapacitated. End that sequence (any remaining attack dice
        are discarded) and immediately perform a free Fall Back action up to 3" with
        that operative (then the Fight action ends). That operative can do so even
        if it's performed an action that prevents it from performing the Fall Back
        action. SHRIEK-THAT-KILLS Use this ASPECT TECHNIQUE when a friendly HOWLING
        BANSHEE operative is performing the Shoot action. Until the end of that action,
        that operative can use
      cost: 0AP
    - name: the following ranged weapon
      description: "Use this ASPECT TECHNIQUE when a friendly HOWLING BANSHEE operative\
        \ performs an action in which it moves. Until the end of the action, that\
        \ operative: \u25CF Can ignore all vertical distances whenever it drops and\
        \ climbs. \u25CF Can move through enemy operatives, move within control range\
        \ of them, and during the Charge action can leave their control range (it\
        \ must still end the move following all requirements for that move). \u25CF\
        \ Cannot move more than its Move stat if it's the Charge action. SCREAM-THAT-KILLS\
        \ Use this ASPECT TECHNIQUE when a friendly HOWLING BANSHEE operative is fighting\
        \ or retaliating, at the start of the Resolve Attack Dice step. You can resolve\
        \ one of your successes before the normal order. If you do, that success must\
        \ be used to block."
      cost: 0AP
