team:
  name: Blades Of Khaine
  version: v1.5
  last_updated: 29 Apr 2026
  archetypes:
  - Seek And Destroy*
  strategy_ploys:
  - name: Forewarned
    cost: 1CP
    description: Whenever an operative is shooting a ready friendly BLADES OF KHAINE
      operative, you can re-roll any of your defence dice results of one result (e.g.
      results of 2).
  - name: Ruthless Poise
    cost: 1CP
    description: Whenever a friendly BLADES OF KHAINE operative is fighting a ready
      enemy operative, that friendly operative's melee weapons have the Ceaseless
      weapon rule.
  - name: Khaine'S Vengeance
    cost: 1CP
    description: Whenever a friendly BLADES OF KHAINE operative is shooting an expended
      enemy operative, that friendly operative's ranged weapons have the Ceaseless
      weapon rule.
  - name: Dance Of Death
    cost: 1CP
    description: Select two friendly BLADES OF KHAINE operatives visible to and within
      6" of each other. Remove them both from the killzone and set them back up in
      each other's previous locations (in other words, swap their positions).
  firefight_ploys:
  - name: Bladewind
    cost: 1CP
    description: Use this firefight ploy during a friendly BLADES OF KHAINE operative's
      activation. During that activation, that operative can perform two Fight actions.
  - name: Starfall
    cost: 1CP
    description: Use this firefight ploy during a friendly BLADES OF KHAINE operative's
      activation. During that activation, that operative can perform two Shoot actions.
  - name: Fading Light
    cost: 1CP
    description: Use this firefight ploy during a friendly BLADES OF KHAINE operative's
      activation, before or after it performs an action. During that activation, that
      operative can perform the Fall Back action for 1 less AP.
  - name: Contempt
    cost: 1CP
    description: Use this firefight ploy when a friendly BLADES OF KHAINE operative
      is retaliating or an enemy operative is shooting it, after your opponent rolls
      their attack dice, but before rerolls. Until the end of the sequence, your opponent
      cannot re-roll their attack dice (if your opponent declared the use of any firefight
      ploys during that sequence that would allow them to re-roll, that ploy is cancelled
      and the CP spent on it is refunded).
  operatives:
  - name: Striking Scorpion Exarch
    stats:
      apl: 3
      mv: 7"
      sv: 3+
      w: 9
    weapons:
