      d: 3/4
      rules:
      - Rng 8"
      - Ceaseless
      - Rending
    - name: Biting blade
      type: Melee
      a: 5
      bs_ws: 3+
      d: 5/6
      rules:
      - Rending
    - name: Scorpion's claw and chainsword
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/6
      rules:
      - Brutal
      - Lethal 5+
    - name: Twin chainswords
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/5
      rules:
      - Ceaseless
      - Rending
    rules:
    - name: Exarch
      description: Can perform two Fight or two Shoot actions during its activation.
      cost: 0AP
    - name: Mandiblasters
      description: Whenever this operative performs the Fight action, at the start
        of the Roll Attack Dice step, inflict 2 damage on the enemy operative in that
        sequence.
      cost: 0AP
  - name: Striking Scorpion Warrior
    stats:
      apl: 3
      mv: 7"
