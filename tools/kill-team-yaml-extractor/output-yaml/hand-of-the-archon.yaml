team:
  name: Hand Of The Archon
  version: v1.4.1
  last_updated: 11 Feb 2026
  archetypes:
  - Recon
  - Seek And Destroy
  strategy_ploys:
  - name: Blade Artists
    cost: 1CP
    description: Friendly HAND OF THE ARCHON operatives' melee weapons have the Rending
      weapon rule.
  - name: Merciless Sadists
    cost: 1CP
    description: Whenever a friendly HAND OF THE ARCHON operative is shooting against
      or fighting against a wounded enemy operative, that friendly operative's weapons
      have the Balanced weapon rule.
  - name: From Darkness, Death
    cost: 1CP
    description: Whenever a friendly HAND OF THE ARCHON operative is activated, before
      you determine its order, you can select one enemy operative that friendly operative
      isn't a valid target for. Until the end of that activation, the first time that
      friendly operative is shooting against or fighting against that enemy operative,
      you can retain one of your normal successes as a critical success instead.
  - name: Denizens Of Night
    cost: 1CP
    description: Whenever an enemy operative is shooting a friendly HAND OF THE ARCHON
      operative that's more than 2" from enemy operatives, if Heavy or Light terrain
      is intervening, or any part of that friendly operative's base is underneath
      Vantage terrain, you can re-roll one of your defence dice.
  firefight_ploys:
  - name: Cruel Deception
    cost: 1CP
    description: Use this firefight ploy during a friendly HAND OF THE ARCHON operative's
      activation, before or after it performs an action.. During that activation,
      that operative can perform the Fall Back action for 1 less AP.
  - name: Devious Scheme
    cost: 1CP
    description: Use this firefight ploy after an opponent uses a firefight ploy (excluding
      one that costs 0CP). The next time they would use that ploy, they must spend
      1 additional CP to do so (at which point this effect ends). You cannot use this
      ploy again during the battle until its effect has ended.
  - name: Heinous Arrogance
    cost: 1CP
    description: Use this firefight ploy when it's your turn to activate a friendly
      operative. You can skip that activation.
  - name: Prey On The Wounded
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      HAND OF THE ARCHON operative, if it's shooting against or fighting against a
      wounded enemy operative. You can re-roll any of your attack dice.
