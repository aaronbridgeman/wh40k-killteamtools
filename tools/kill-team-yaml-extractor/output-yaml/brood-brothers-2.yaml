team:
  name: Brood Brothers
  version: v1.5
  last_updated: 29 October 2025
  archetypes:
  - Infiltration
  - Security
  strategy_ploys:
  - name: Cult Devotion
    cost: 1CP
    description: Whenever a friendly BROOD BROTHER operative (excluding PATRIARCH
      ) is incapacitated when fighting or retaliating, if you have any unresolved
      attack dice, you can roll one D6. If the result is a success as if it were the
      Roll Attack Dice step of that sequence (i.e, using the same weapon, but with
      no re-rolls), you can strike the enemy operative in that sequence with one of
      your unresolved normal successes, or any of your successes instead if the D6
      result is a critical success. In either case, that friendly operative is removed
      from the killzone afterwards.
  - name: Embedded
    cost: 1CP
    description: Whenever an enemy operative is shooting a friendly BROOD BROTHER
      operative, if you can retain any cover saves as a result of Heavy terrain, you
      can retain one additional cover save.
  - name: Pervasive
    cost: 1CP
    description: During friendly BROOD BROTHER operative's activation, you can ignore
      the first vertical distance of 2" they move during one climb up.
  - name: Uprising
    cost: 1CP
    description: The first time each friendly BROOD BROTHER operative performs either
      the Shoot or Fight action during each of its activations, if its order was changed
      from Conceal to Engage at the start of that activation, the enemy operative
      selected as the valid target or to fight against gains one of your Crossfire
      tokens as soon as it's selected (instead of after resolving your attack dice).
      This ploy has no effect if that friendly operative was activated within control
      range of an enemy operative. Note this ploy cannot come into effect more than
      once per activation (you cannot use it during both the Shoot and the Fight action
      in the same activation).
  firefight_ploys:
  - name: Idolisation
    cost: 1CP
    description: Use this firefight ploy when a friendly BROOD BROTHER operative (excluding
      LEADER ) within 6" of a friendly BROOD BROTHER LEADER or friendly BROOD BROTHER
      ICONWARD operative is shooting, fighting or retaliating, in the Roll Attack
      Dice Step. You can retain one of your fails as a normal success instead of discarding
      it, or retain one of your normal successes as a critical success instead.
  - name: Insidious
    cost: 1CP
    description: Use this firefight ploy after an activation. Before the next activation,
      you can perform a free Dash action with one BROOD BROTHER operative, as long
      as it's not a valid target for an enemy operative when it starts and ends that
      action. You cannot use this ploy during the first turning point.
  - name: Ruthless Coordination
    cost: 1CP
    description: Use this firefight ploy when selecting a valid target for a BROOD
      BROTHER operative. Until the end of the action, determine invisibility as normal,
      but you can instead determine intervening (for cover and obscured) from another
      BROOD BROTHER operative that both that friendly operative and the potential
      valid target are visible to, but that isn't itself within control range of enemy
      operatives. Note the friendly operative doesn't gain the additional benefits
      of Vantage terrain if the other operative is on it (e.g, to target an enemy
      operative that has a Conceal order that's in cover provided by only Light terrain.
  - name: Unquestioning Loyalty
    cost: 1CP
    description: Use this firefight ploy when a friendly BROOD BROTHER LEADER operative
      is selected as the valid target of a Shoot action or to fight against during
      the Fight action. Select one other friendly BROOD BROTHER BROODGUARD operative
      (excluding LEADER ) visible to and within 3" of that LEADER operative to become
      the valid target or to be fought against (as appropriate) instead (even if it
      normally wouldn't be valid for this). If it's the Fight action, treat that other
      operative as being within the fighting operative's control range for the duration
      of that action. If Shoot action, that other operative is only in cover or obscured
      if the original target was. This ploy has no effect if it's the Shoot action
      and the ranged weapon has the Blast or Torrent weapon rule.
