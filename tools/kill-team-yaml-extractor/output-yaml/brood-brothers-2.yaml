      description: STRATEGIC GAMBIT if this operative is in the killzone. Select one
        of the following for friendly BROOD BROTHER operatives to have until the end
        of the turning point or until this operative is incapacitated (whichever comes
      cost: 0AP
    - name: first)
      description: "\u25CF Whenever an enemy operative is shooting a friendly BROOD\
        \ BROTHER operative, ignore the Piercing weapon rule. \u25CF You can ignore\
        \ any changes to friendly BROOD BROTHER operative's stats from being injured\
        \ (including their weapon's stats). \u25CF You can ignore any changes to the\
        \ APL stats of BROOD BROTHER operatives. TELEPATHIC"
      cost: 1AP
    - name: Overload
      description: "\U0001F7E2 PSYCHIC . Select one enemy operative visible to this\
        \ operative. Until the end of that operative's next activation, subtract 1\
        \ from its APL stat. \U0001F534 This operative cannot perform this action\
        \ while within control range of an enemy operative."
      cost: 1AP
    - name: Mental Onslaught
      description: "\U0001F7E2 PSYCHIC . Select one enemy operative that's a valid\
        \ target to this operative. Inflict 2 damage on it, or 4 damage instead if\
        \ it's within 6\" of this operative. Then roll one D6, if the result is higher\
        \ than that enemy's APL stat, inflict an additional 2 damage on it, or 4 damage\
        \ instead if it's within 6\" of this operative. Keep rolling one D6 in this\
        \ manner until you roll equal to or less than that enemy operative's APL stat,\
        \ until it's incapacitated, or until you inflict 8 damage on it during this\
        \ action (whichever comes first). \U0001F534 This operative cannot perform\
        \ this action while within control range of an enemy operative."
      cost: 0AP
