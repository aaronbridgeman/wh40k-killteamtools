      bs_ws: 3+
      d: 4/5
      rules:
      - Rending
    rules:
    - name: Neuropredatory Crest
      description: Whenever determining control of a marker, treat the total APL stat
        of enemy operatives that contest it as 1 lower if at least one of those enemy
        operatives is within 3" of this operative. Note this isn't a change to the
        APL stat, so any changes are cumulative with this. Whenever an enemy operative
        is
      cost: 0AP
    - name: within 3" of this operative
      description: "\u25CF Your opponent must spend 1 additional AP for that enemy\
        \ operative to perform the Pick Up Marker and mission actions. \u25CF Your\
        \ opponent cannot re-roll their attack or defence dice for that operative."
      cost: 0AP
    - name: Synaptic Link
      description: STRATEGIC GAMBIT if this operative isn't incapacitated. Roll one
        D6 and compare the result to the number of the current turning point; if the
        result
      cost: 0AP
    - name: "\u25CF Twice as high or higher"
      description: "you gain 1CP. \u25CF Less, inflict damage on this operative equal\
        \ to the result. \u25CF Any other result, nothing happens."
      cost: 0AP
