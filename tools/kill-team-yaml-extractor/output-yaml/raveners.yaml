team:
  name: Raveners
  version: v1.3
  last_updated: 19 November 2025
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: Death From Below
    cost: 1CP
    description: "Whenever a friendly RAVENER operative is fighting: \u25CF If it's\
      \ performed the Burrow action during that activation/counteraction, its melee\
      \ weapons have the Balanced weapon rule. \u25CF If it's on your TUNNEL , its\
      \ melee weapons have the Ceaseless weapon rule."
  - name: Whipcord Emergence
    cost: 1CP
    description: "Whenever an operative is shooting a friendly RAVENER operative:\
      \ \u25CF If that friendly operative has performed the Burrow action during that\
      \ turning point, you can re-roll one of your defence dice. \u25CF If that friendly\
      \ operative is on your TUNNEL , you can re-roll any of your defence dice."
  - name: Writhe Out Of Sight
    cost: 1CP
    description: Select one friendly RAVENER operative. That friendly operative can
      immediately perform a free Burrow action. If it's within 2" of your TUNNEL ,
      it can immediately perform a free Fall Back or Reposition action before it does
      so.
  - name: Tunnel Lurkers
    cost: 1CP
    description: Whenever a friendly RAVENER operative is on your TUNNEL it's in cover,
      unless it's within 2" of the active operative. Treat this as cover provided
      by Light terrain (therefore it's affected by rules that prevent this, e.g. Seek
      Light and Vantage terrain).
  firefight_ploys:
  - name: Slithering Evasion
    cost: 1CP
    description: "Use this firefight ploy during a friendly RAVENER operative's activation\
      \ or counteraction, before or after it performs an action. During that activation/\
      \ counteraction, that operative can: \u25CF Perform the Fall Back action for\
      \ 1 less AP. \u25CF Perform the Charge action while within control range of\
      \ an enemy operative, and can leave that operative's control range to do so\
      \ (but then normal requirements for that move apply)."
  - name: Subterranean Horror
    cost: 1CP
    description: Use this firefight ploy when an enemy operative is performing the
      Fight action and selects a friendly RAVENER operative on your TUNNEL to fight
      against. In the Resolve Attack Dice step of that sequence, you resolve the first
      attack dice (i.e. defender instead of attacker).
  - name: Burrowing Strike
    cost: 1CP
    description: Use this firefight ploy when a friendly RAVENER operative performs
      the Burrow action. Before that operative is removed from the killzone, or after
      setting it up on your TUNNEL , inflict D3+1 damage on each enemy operative within
      its control range (roll separately for each). You cannot use this ploy in the
      Strategy phase, or during a FELLTALON operative's activation or counteraction
      if it performs the Toxic Lunge action (and vice versa).
  - name: Death Frenzy
    cost: 1CP
    description: Use this firefight ploy when a friendly RAVENER operative is incapacitated.
      Before that operative is removed from the killzone, inflict D3 damage on each
      enemy operative within its control range (roll separately for each). If that
      friendly operative is a VENOMSPITTER that's currently benefitting from the effects
      of its Distend Dorsal Sac action, inflict 2D3 damage instead.
  operatives:
