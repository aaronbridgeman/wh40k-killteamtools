      - Silent
    - name: Toxic glands
      type: Ranged
      a: 4
      bs_ws: 3+
      d: 3/4
      rules:
      - Rng 6"
      - Silent
      - Poison *
    - name: Toxic scythes
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/5
      rules:
      - Lethal 5+
      - Shock
      - Poison *
    rules:
    - name: '* Poison'
      description: In the Resolve Attack Dice step, if you inflict damage with any
        critical successes, the operative this weapon is being used against gains
        one of your Poison tokens (if it doesn't already have one). Whenever an operative
        that has one of your Poison tokens is activated, inflict D3 damage on it.
      cost: 1AP
    - name: Toxic Lunge
      description: "\U0001F7E2 Select one enemy operative within 2\" of this operative.\
        \ Alternatively, if this operative is underground, select one enemy operative\
        \ on your TUNNEL . Inflict D3+2 damage on that enemy operative and it gains\
        \ one of your Poison tokens (if it doesn't already have one). \U0001F534 This\
        \ operative can perform this action while underground (this takes precedence\
        \ over the normal Burrow rules)."
      cost: 0AP
  - name: Tremorscythe
    stats:
      apl: 3
      mv: 7"
      sv: 5+
      w: 20
    weapons:
    - name: Pincer tail
      type: Ranged
      a: 4
      bs_ws: 3+
