    - name: Scything talons & rending claws
      type: Melee
      a: 5
      bs_ws: 3+
      d: 4/5
      rules:
      - Rending
    rules:
    - name: Subterranean Ambush
      description: Once per turning point in the Firefight phase, after an enemy operative
        performs an action in which it moves more than 2" and ends within 2" of your
        TUNNEL , if this operative is underground and is either ready or hasn't counteracted
        during this turning point, you can interrupt to use this rule. If you do,
        activate or counteract with this operative (as appropriate), but during its
        activation/ counteraction it must shoot against or fight against that enemy
        operative, and cannot do so against any other enemy operatives until it does
        (if this isn't possible, this operative's activation/ counteraction is cancelled
        and this rule hasn't been used). After completing this operative's activation/counteraction,
        continue that enemy operative's activation/counteraction (if possible and
        relevant).
      cost: 0AP
    - name: Hypersensory Hunter
      description: This operative can perform the Charge action while it has a Conceal
        order if it performed the Burrow action during the same activation/ counteraction.
      cost: 0AP
