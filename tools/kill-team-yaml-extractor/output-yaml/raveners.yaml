      rules:
      - Crush *
    rules:
    - name: Reinforced Carapace
      description: Normal and Critical Dmg of 4 or more inflicts 1 less damage on
        this operative.
      cost: 0AP
    - name: '* Crush'
      description: Whenever you strike, you and your opponent roll-off, adding 1 to
