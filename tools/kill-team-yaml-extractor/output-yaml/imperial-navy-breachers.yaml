team:
  name: Imperial Navy Breachers
  version: v1.5
  last_updated: 28 Jan 2026
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Attack Order
    cost: 1CP
    description: Place your Attack Order marker in the killzone. Whenever a friendly
      IMPERIAL NAVY BREACHER operative within 3" of that marker is shooting, fighting
      or retaliating, its weapons have the Ceaseless weapon rule. In the Ready step
      of the next Strategy phase, remove that marker. You cannot use this ploy and
      the Defence Order strategy ploy in the same Strategy phase.
  - name: Defence Order
    cost: 1CP
    description: Place your Defence Order marker in the killzone. Whenever an operative
      is shooting a friendly IMPERIAL NAVY BREACHER operative that's within 3" of
      that marker, you can re-roll any of your defence dice results of one result
      (e.g. results of 2). In the Ready step of the next Strategy phase, remove that
      marker. You cannot use this ploy and Attack Order strategy ploy in the same
      Strategy phase.
  - name: Close Assault
    cost: 1CP
    description: "Whenever a friendly IMPERIAL NAVY BREACHER operative is fighting\
      \ or shooting an operative within 3\" of it: \u25CF Add 1 to both Dmg stats\
      \ of Navis shotguns or Navis heavy shotguns (if any). \u25CF If you roll two\
      \ or more fails, you can discard one of them to retain another as a normal success\
      \ instead."
  - name: Brace For Counterattack
    cost: 1CP
    description: Whenever an operative is shooting against, fighting against or retaliating
      against a friendly IMPERIAL NAVY BREACHER operative that's within your territory
      or that hasn't performed the Charge , Fall Back or Reposition action during
      this turning point, Normal and Critical Dmg of 3 or more inflicts 1 less damage
      on that friendly operative.
  firefight_ploys:
  - name: Overwhelm Target
    cost: 1CP
    description: Use this firefight ploy when you use the Breach and Clear faction
      rule. Select one of those friendly IMPERIAL NAVY BREACHER operatives. Until
      the end of that operative's activation, add 1 to its APL stat.
  - name: Blitz
    cost: 1CP
    description: Use this firefight ploy when a friendly IMPERIAL NAVY BREACHER operative
      performs the Shoot or Fight action, and you select an enemy operative within
      6" of it as a valid target or to fight against. If it's the first friendly operative
      to perform either of those actions during this turning point, its weapons have
      the Accurate 1 weapon rule for that action. If it's the first friendly operative
      to be activated during this turning point, its weapons also have the Severe
      weapon rule for that action.
  - name: Lock It Down
    cost: 1CP
    description: Use this firefight ploy when a friendly IMPERIAL NAVY BREACHER operative
      is activated. Select one objective marker. Until the end of the battle or until
      you use this ploy again (whichever comes first), when determining control of
      that objective marker, treat that friendly operative's APL stat as 1 higher.
      Note this isn't a change to the APL stat, so any changes are cumulative with
      this.
  - name: Deck Hand
    cost: 1CP
    description: Use this firefight ploy during a friendly IMPERIAL NAVY BREACHER
      operative's activation, before or after it performs an action. That operative
      can move through one Accessible terrain feature without it counting as an additional
      1" and/or perform a free Operate Hatch action during its activation, and can
      do so during the Charge or Fall Back action. You cannot use this ploy if the
      access point has been welded shut (see HATCHCUTTER ) unless it's a friendly
      HATCHCUTTER operative's activation.
  operatives:
  - name: C.A.T. Unit
    stats:
      apl: 2
      mv: 8"
      sv: 5+
      w: 5
    weapons: []
    rules:
    - name: Machine
      description: "\u25CF This operative cannot be activated or perform actions if\
        \ it's within control range of an enemy operative, or if a friendly IMPERIAL\
        \ NAVY BREACHER SURVEYOR operative has been incapacitated. The turning point\
        \ can end even if this operative is still ready. \u25CF This operative cannot\
        \ perform any actions other than Charge , Dash , Fall Back , Reposition and\
        \ Spot . \u25CF It cannot retaliate, assist in a fight, climb or jump. \u25CF\
        \ Whenever determining control of a marker, treat this operative's APL stat\
        \ as 1 lower. Note this isn't a change to its APL stat, so any changes are\
        \ cumulative with this. \u25CF Whenever this operative has a Conceal order\
        \ and is in cover, it cannot be selected as a valid target, taking precedence\
        \ over all other rules (e.g. Seek, Vantage terrain) except being within 2\"\
        . \u25CF Whenever determining what's visible to this operative, draw the line\
        \ from any part of the miniature."
      cost: 0AP
    - name: Expendable
      description: "This operative is ignored for your opponent's kill/elimination\
        \ op (when it's incapacitated, and when determining your starting number of\
        \ operatives). It's also ignored for victory conditions and scoring VPs if\
        \ either require operatives to \u2018escape', \u2018survive' or be incapacitated\
        \ by enemy operatives (if it escapes/survives/is incapacitated, determining\
        \ how many operatives must escape/survive/be incapacitated, etc.)."
      cost: 1AP
    - name: Spot
      description: "\U0001F7E2 Select one enemy operative visible to this operative.\
        \ Until the end of the turning point, until that enemy operative is no longer\
        \ visible to this operative or until this operative performs this action again\
        \ (whichever comes first), whenever a friendly IMPERIAL NAVY BREACHER operative\
        \ is shooting that enemy operative,"
      cost: 0AP
    - name: you can use this effect. If you do
      description: "\u25CF That friendly operative's ranged weapons have the Seek\
        \ Light weapon rule. \u25CF That enemy operative cannot be obscured. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative."
      cost: 0AP
