    rules:
    - name: Veteran Adventurer
      description: In the Ready step of each Strategy phase after the first, if this
        operative is in the killzone and isn't within control range of enemy operatives,
        you gain 1 Resourceful point. .
      cost: 0AP
    - name: Outright Conviction
      description: The first time this operative would be incapacitated during the
        battle, it's not incapacitated, has 1 wound remaining and cannot be incapacitated
        for the remainder of the action. All remaining attack dice are discarded (Including
        yours, if this operative is fighting or retaliating).
      cost: 0AP
