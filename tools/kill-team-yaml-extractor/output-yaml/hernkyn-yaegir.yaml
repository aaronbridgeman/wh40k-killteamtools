team:
  name: Hernkyn Yaegir
  version: v1.3
  last_updated: 29 October 2025
  archetypes:
  - Infiltration
  - Seek And Destroy
  strategy_ploys:
  - name: Hidden Engagement
    cost: 1CP
    description: Whenever a friendly HERNKYN YAEGIR operative is shooting, if it's
      in cover from the target's perspective, its weapons have the Balanced weapon
      rule. Note that your opponent still determines the targeting lines for this
      (i.e, they decide which point of their operative's base targeting lines are
      drawn from).
  - name: In Position
    cost: 1CP
    description: Whenever a friendly HERNKYN YAEGIR operative has a Conceal order
      and is in cover, it cannot be selected as a valid target, taking precedence
      over all other rules (e.g. Seek, Vantage terrain) except being within 2".
  - name: Masterful Bladework
    cost: 1CP
    description: Whenever a friendly HERNKYN YAEGIR operative is fighting, or has
      a Conceal order and is retaliating, add 1 to the Atk stat of its melee weapons
      (to a maximum of 4) and they have the Balanced weapon rule; if the weapon already
      has that weapon rule, it has the Ceaseless weapon rule instead of Balanced.
  - name: Tough Survivalists
    cost: 1CP
    description: The first time an attack dice inflicts damage on each friendly HERNKYN
      YAEGIR operative during the turning point in the Resolve Attack Dice step, you
      can halve that inflicted damage (rounding up, to a minimum of 2).
  firefight_ploys:
  - name: Bonds That Bind
    cost: 1CP
    description: Use this firefight ploy when a friendly HERNKYN YAEGIR operative
      is activated. Select one other ready friendly HERNKYN YAEGIR operative visible
      to and within 3" of that operative. When that first friendly operative is expended,
      you can activate that other friendly operative before your opponent activates.
      Neither operative can be a BOMBAST operative if its Wroughtlock Negotiation
      STRATEGIC GAMBIT has been used this turning point.
  - name: No Kin Left Behind
    cost: 1CP
    description: Use this firefight ploy when a friendly HERNKYN YAEGIR operative
      is incapacitated. Before that operative is removed from the killzone, remove
      your Fallen Kin marker from the Killzone (if any), then place it within that
      operative's control range. That operative is then incapacitated as normal. Whenever
      a friendly HERNKYN YAEGIR operative within 3" of your Fallen Kin marker is shooting,
      fighting or retaliating, in the Roll Attack Dice step, you can retain one of
      your fails as a normal success instead of discarding it, or retain one of your
      normal successes as a critical success instead.
  - name: Stalwart Defence
    cost: 1CP
    description: "Use this firefight ploy when an enemy operative ends a move within\
      \ control range of a friendly HERNKYN YAEGIR operative. Select one other friendly\
      \ HERNKYN YAEGIR operative visible to and within 6\" of that friendly operative,\
      \ but that isn't itself within control range of enemy operatives. The selected\
      \ operative can perform a Shoot action. During that action: \u25CF It can target\
      \ that enemy operative even though it's within control range of a friendly operative.\
      \ \u25CF Other enemy operatives cannot be selected as a valid target. \u25CF\
      \ You cannot select a frag or krak grenade, or a weapon with the Blast or x\"\
      \ Devastating x weapon rule (i.e, Devastating with a distance)."
  - name: Sturdy
    cost: 1CP
    description: Use this firefight ploy when an enemy operative is shooting a friendly
      HERNKYN YAEGIR operative, when you collect your defence dice. Change the attacker's
      retained critical successes to normal successes (any weapon rules they've already
      resolved aren't affected, e.g, Piercing Crits).
