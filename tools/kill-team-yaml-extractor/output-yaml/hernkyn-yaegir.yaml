    rules:
    - name: Minefield
      description: You have five Minefield markers for the battle. On the reverse
        side, three of them are Hy-Pex mines and two are blank. Set up all your Minefield
        markers as if they were one item of equipment. Each must be set up reverse-side
        down (their specifics aren't revealed), more than 2" from other markers, access
        points and Accessible terrain, and more than 6" from your opponent's drop
        zone and your other Minefield markers. Whenever this operative is readied,
        if it's not within control range of enemy operatives, you can reset one of
        your flipped Minefield markers that's within its control range (flip the marker
        back over again).
      cost: 0AP
    - name: Hy-Pex Mines
      description: Whenever one of your reverse-side down Minefield markers is both
        within an enemy operative's control range and not within a friendly HERNKYN
        YAEGIR operative's control range, flip the marker over. If it's blank, there's
        no effect. If it's a Hy-Pex mine, inflict 3 damage on that enemy operative
        and roll one D6. If the result is less than that enemy operative's Save stat,
        inflict additional damage on it equal to the dice result. If it isn't incapacitated,
        end its action (if any), even if that action's effects aren't fulfilled. If
        it cannot be placed, move it the minimum amount of distance to do so. Regardless,
        that marker isn't removed.
      cost: 0AP
