      cost: 0AP
    - name: Brazen Killer
      description: Whenever this operative incapacitates an enemy operative with its
        Wroughtlock Revolvers, roll one d6 separately for each other enemy operative
        visible to and within 2" of that enemy operative. If the result is higher
        than that other enemy operative's APL stat, subtract 1 from its APL stat until
