team:
  name: Celestian Insidiants
  version: v1.0.2
  last_updated: 13 Apr 2026
  archetypes:
  - Security
  - Seek & Destroy
  strategy_ploys:
  - name: Suspect & Eliminate
    cost: 1CP
    description: Select one enemy operative or marker. If you select an enemy operative,
      that operative and each other enemy operative visible to and within 2" of it
      gains one of your Suspicion tokens until the end of the turning point. If you
      selected a marker, each enemy operative contesting that marker gains one of
      your Suspicion tokens until the end of the turning point. Whenever a friendly
      CELESTIAN INSIDIANT operative is shooting against or fighting against an operative
      that has one of your Suspicion tokens, that friendly operative's weapons have
      the Punishing weapon rule.
  - name: Wrathful Determination
    cost: 1CP
    description: Whenever an operative is shooting a friendly CELESTIAN INSIDIANT
      operative that has an Engage order, you can re-roll one of your defence dice.
  - name: Suffering & Sacrifice
    cost: 1CP
    description: Whenever a wounded friendly CELESTIAN INSIDIANT operative is shooting
      against, fighting against or retaliating against an enemy operative, its weapons
      have the Balanced weapon rule.
  - name: Holy Resilience
    cost: 1CP
    description: Whenever an INSPIRING friendly CELESTIAN INSIDIANT operative is fighting
      or retaliating, Normal and Critical Dmg of 4 or more inflicts 1 less damage
      on that friendly operative.
  firefight_ploys:
  - name: Glory To The Martyrs
    cost: 1CP
    description: Use this firefight ploy when a friendly CELESTIAN INSIDIANT operative
      is incapacitated while fighting or retaliating. You can strike the enemy operative
      in that sequence with one of your unresolved successes before it's removed from
      the killzone. If that enemy operative is incapacitated as a result, that friendly
      operative becomes INSPIRING before it's removed from the killzone and you can
      resolve the Martyrdom faction rule.
  - name: Faith & Fury
    cost: 1CP
    description: Use this firefight ploy when a friendly CELESTIAN INSIDIANT operative
      is fighting and you strike the enemy operative in that sequence with a critical
      success. After resolving that strike, also inflict D3 damage on each other enemy
      operative visible to and within 2" of that friendly operative in an order of
      your choice (roll separately for each). Note that the friendly operative would
      become INSPIRING if any enemy operatives with a Wounds stat of 6 or more are
      incapacitated as a result of this damage.
  - name: Unshakeable Pursuit
    cost: 1CP
    description: Use this firefight ploy during a friendly CELESTIAN INSIDIANT operative's
      activation, before or after it performs an action. Until the end of that operative's
      activation, you can ignore any changes to its Move stat. If that operative is
      INSPIRING , add 1" to its Move stat until the end of that activation. If that
      operative becomes INSPIRING by performing the Charge action, you can use this
      ploy before it moves to gain the additional movement (this takes precedence
      over stats not changing during an action).
  - name: Fervent Hate
    cost: 1CP
    description: Use this firefight ploy after rolling your attack dice for a friendly
      CELESTIAN INSIDIANT operative, if it's shooting against, fighting against or
      retaliating against an enemy operative that doesn't have the IMPERIUM keyword.
      That friendly operative's weapons have the Ceaseless weapon rule until the end
      of that sequence; if that enemy operative also has the CHAOS and/or PSYKER keyword,
      that friendly operative's weapons have the Relentless weapon rule until the
      end of that sequence instead.
