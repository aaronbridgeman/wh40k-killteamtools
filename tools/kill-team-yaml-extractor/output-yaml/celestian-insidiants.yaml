    - name: Spiritual Mentor
      description: "\U0001F7E2 SUPPORT . Select one friendly CELESTIAN INSIDIANT operative\
        \ visible to and within 6\" of this operative. That operative becomes INSPIRING\
        \ . \U0001F534 This operative cannot perform this action while within control\
        \ range of an enemy operative, or more than once per turning point."
