      - Lethal 5+
      - Brutal
    rules:
    - name: Zealous Ultimatum
      description: 'Once per battle STRATEGIC GAMBIT . Select one enemy operative
        within 8" of this operative and issue an ultimatum to it. Your opponent must
        accept or decline that ultimatum (if it''s a non-player operative, roll one
        D6: on a 4+, the ultimatum is accepted, otherwise it''s declined). If the
        ultimatum is accepted, whenever this operative is fighting against or retaliating
        against that enemy operative, add 1 to the Atk stat of this operative''s blessed
        broadsword. The first time this operative incapacitates that enemy operative
        while fighting or retaliating during the battle, add 1 to the Atk stat of
        this operative''s blessed broadsword until the end of the battle. In either
        case, this is to a maximum of 5. If the ultimatum is declined, whenever that
        enemy operative is fighting against or retaliating against a friendly CELESTIAN
        INSIDIANT operative, subtract 1 from the Atk stat of that enemy operative''s
        weapons.'
      cost: 0AP
    - name: Bladed Stance
      description: Whenever this operative is fighting or retaliating, you can resolve
        one of your successes before the normal order. If you do, that success must
        be used to block.
      cost: 0AP
