      cost: 0AP
    - name: Null Field
      description: This operative starts the battle with a null range of 1". Whenever
        an enemy operative is within null range of this operative, subtract 2" from
        the Move stat of that enemy operative and worsen the Hit stat of its weapons
        by 1 (this isn't cumulative with being injured).
      cost: 1AP
    - name: Nullifying Ritual
      description: "\U0001F7E2 Add 1 to this operative's null range (to a maximum\
        \ of 5\"). Nullification tokens in the marker/token guide are numbered, so\
        \ use the numbered token equal to this operative's null range. \U0001F534\
        \ This operative cannot perform this action while within control range of\
        \ an enemy operative, or more than once per turning point."
      cost: 0AP
