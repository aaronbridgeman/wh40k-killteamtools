      d: 4/6
      rules:
      - Lethal 5+
    rules:
    - name: '* Shield'
      description: Whenever this operative is fighting or retaliating with this weapon
        profile, each of your blocks can be allocated to block two unresolved successes
        (instead of one).
      cost: 0AP
    - name: Holy Defender
      description: Once per turning point, when a friendly CELESTIAN INSIDIANT operative
        visible to and within 2" of this operative is selected as the valid target
        of a Shoot action or to fight against during the Fight action, you can use
        this rule. If you do, this operative becomes the valid target or is fought
        against (as appropriate) instead (even if it wouldn't normally be valid for
        this). If it's the Fight action, treat this operative as being within the
        fighting operative's control range for the duration of that action. If it's
        the Shoot action, this operative is only in cover or obscured if the original
        target was. This rule has no effect if it's the Shoot action and the ranged
        weapon has the Blast or Torrent weapon rule.
      cost: 0AP
