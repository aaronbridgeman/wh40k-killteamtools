# Core Rules NPO operatives for Solo/Joint Ops catalog generation.
# Source: 2024 edition Kill Team core rules – Joint Ops mission pack.
# Six standard profiles: three Brawlers (melee) and three Marksmen (ranged).
#
# Regenerate the app catalog after editing this file:
#   npm run generate:solo-catalog

npo_operatives:
  - name: Brawler Trooper
    stats:
      apl: 2
      mv: 6"
      sv: 5+
      w: 7
    weapons:
      - name: Brawler Weapon
        type: Melee
        a: 3
        bs_ws: 4+
        d: 2/3
        rules: []
    rules:
      - name: Behaviour
        description: >-
          This NPO will move towards the enemy to fight them, but will seek
          cover on its way. When activated, if it can perform either of its
          first two actions during that activation, give it an Engage order.
          If it cannot, give it a Conceal order.
          1. Fight .
          2. Charge the closest player operative via the shortest possible route.
          3. Reposition towards the closest player operative, to cover if
          possible (a subsequent Dash action can fulfil this, if able).
          4. Dash towards the closest player operative, to cover if possible.
        cost: 0AP

