        type: Ranged
        a: 4
        bs_ws: 4+
        d: 2/3
        rules: []
    rules:
      - name: Behaviour
        description: >-
          This NPO will move to an ideal position to shoot the enemy. When
          activated, if it can perform the Shoot action during that activation,
          give it an Engage order. If it cannot, give it a Conceal order.
          1. Fall Back to cover. If possible, to a location where there is a
          valid target that is not obscured.
          2. Shoot . Prioritise targets out of cover or with an objective.
          3. Reposition to cover. If possible, to a location where there is a
          valid target that is not obscured (a subsequent Dash action can
          fulfil this, if able).
          4. Dash to cover. If possible, to a location where there is a valid
          target that is not obscured.
        cost: 0AP

