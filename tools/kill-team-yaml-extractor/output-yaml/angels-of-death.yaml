team:
  name: Angels Of Death
  version: v1.3
  last_updated: 28 Jan 2026
  archetypes:
  - Security
  - Seek And Destroy
  strategy_ploys:
  - name: Combat Doctrine
    cost: 1CP
    description: "Select one COMBAT DOCTRINE from those presented below. Whenever\
      \ a friendly ANGEL OF DEATH operative is x, its weapons have the Balanced weapon\
      \ rule. X is the COMBAT DOCTRINE you selected. \u25CF Devastator Doctrine :\
      \ Shooting an operative more than 6\" from it. \u25CF Tactical Doctrine : Shooting\
      \ an operative within 6\" of it. \u25CF Assault Doctrine : Fighting or retaliating."
  - name: And They Shall Know No Fear
    cost: 1CP
    description: You can ignore any changes to the stats of friendly ANGEL OF DEATH
      operatives from being injured (including their weapons' stats).
  - name: Adaptive Tactics
    cost: 1CP
    description: Change your secondary CHAPTER TACTIC . Note this ploy only lasts
      until the end of the turning point, at which point your original secondary CHAPTER
      TACTIC returns.
  - name: Indomitus
    cost: 1CP
    description: Whenever an operative is shooting a friendly ANGEL OF DEATH operative,
      if you roll two or more fails, you can discard one of them to retain another
      as a normal success instead.
  firefight_ploys:
  - name: Adjust Doctrine
    cost: 1CP
    description: Use this firefight ploy during a friendly ANGEL OF DEATH operative's
      activation, before or after it performs an action. If you've used the Combat
      Doctrine strategy ploy during this turning point, change the COMBAT DOCTRINE
      you selected.
  - name: Transhuman Physiology
    cost: 1CP
    description: Use this firefight ploy when an operative is shooting a friendly
      ANGEL OF DEATH operative, in the Roll Defence Dice step. You can retain one
      of your normal successes as a critical success instead.
  - name: Shock Assault
    cost: 1CP
    description: "Use this firefight ploy when a friendly ANGEL OF DEATH operative\
      \ is performing the Fight action during an activation in which it performed\
      \ the Charge action, at the start of the Resolve Attack Dice step. Until the\
      \ end of that action: \u25CF Its melee weapon has the Shock weapon rule. \u25CF\
      \ The first time you strike during that sequence, inflict 1 additional damage\
      \ (to a maximum of 7)."
  - name: Wrath Of Vengeance
    cost: 1CP
    description: Use this firefight ploy when a friendly ANGEL OF DEATH operative
      is counteracting. It can perform an additional 1AP action for free during that
      counteraction, but both actions must be different.
