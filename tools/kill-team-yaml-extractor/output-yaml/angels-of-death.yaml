    - name: Heroic Leader
      description: "Once per turning point, you can do one of the following: \u25CF\
        \ Use a firefight ploy for 0CP if this is the specified ANGEL OF DEATH operative\
        \ (excluding Command Re-roll). \u25CF Use the Combat Doctrine strategy ploy\
        \ when you activate a friendly ANGEL OF DEATH operative if this operative\
        \ is in the killzone and isn't within control range of enemy operatives (pay\
        \ its CP cost as normal). Note that you cannot do so if you've already used\
        \ that ploy during this turning point. \u25CF Use the Adjust Doctrine firefight\
        \ ploy for 0CP if this operative is in the killzone and isn't within control\
        \ range of enemy operatives."
      cost: 0AP
    - name: Iron Halo
      description: Once per battle, when an attack dice inflicts Normal Dmg on this
        operative, you can ignore that inflicted damage.
      cost: 0AP
